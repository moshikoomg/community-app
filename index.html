<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>אפליקציית הרגלים</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3",
        "@formkit/auto-animate": "https://esm.sh/@formkit/auto-animate@0.8.2"
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #F0F2F5; font-family: 'Rubik', system-ui, -apple-system, sans-serif; }
    .btn-google { background: white; color: #1f2937; transition: all 0.2s; border: 1px solid #e5e7eb; }
    .btn-google:hover { background: #f9fafb; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    
    @keyframes badge-float-scale {
      0%, 100% { transform: translateY(0px) scale(1.25); }
      50% { transform: translateY(-8px) scale(1.35); }
    }
    .animate-badge-current { animation: badge-float-scale 2.5s ease-in-out infinite; }
    
    @keyframes halo-oppose-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0.15; }
      50% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
    }
    .animate-halo-current { animation: halo-oppose-pulse 2.5s ease-in-out infinite; }

    @keyframes pop-in {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes spark {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(1.5) translateY(-20px) rotate(45deg); opacity: 0; }
    }
    .sparkle { position: absolute; width: 6px; height: 6px; border-radius: 50%; opacity: 0; z-index: 20; pointer-events: none; }
    .sparkle-1 { background: #FFCC00; animation: spark 0.6s ease-out forwards; top: 10px; right: 10px; }
    .sparkle-2 { background: #007AFF; animation: spark 0.6s ease-out forwards 0.1s; bottom: 10px; left: 10px; }
    .sparkle-3 { background: #34C759; animation: spark 0.6s ease-out forwards 0.2s; top: 20px; left: 20px; }
    .sparkle-4 { background: #FF9500; animation: spark 0.6s ease-out forwards 0.05s; bottom: 20px; right: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { createClient } from '@supabase/supabase-js';
    import autoAnimate from '@formkit/auto-animate';
    import { 
      Star, Check, Lightbulb, Trophy, Crown, Medal, Award, Users, ArrowLeft, TrendingUp, Menu, Plus, Clock, Trash2, GripVertical, ArrowUpToLine, ArrowDownAZ, Sun, Sunset, Moon, AlignLeft, ChevronDown, ChevronUp, Lock, Target, Send, Sparkles, PartyPopper, Search, AlertCircle, Move, Droplet, Zap, Edit3, Minus, Calendar, Camera, Settings, ArrowRight, User, Palette, CreditCard, Wrench, Share2, ChevronLeft, Flag, Loader2, Cloud, CloudOff, Shield, Flame, UserPlus, RefreshCw
    } from 'lucide-react';

    const SUPABASE_URL = 'https://igpzawemolsajreiuxck.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlncHphd2Vtb2xzYWpyZWl1eGNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTE3MTIsImV4cCI6MjA5MTEyNzcxMn0.b3Q1nlHddqAgg8AJS4gV73USVvujno0-HRpLFPny7Ww';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const MOCK_TEST_USERS = [
      {
        id: 'admin',
        isAdmin: true,
        user: { name: 'משה (אדמין)', level: 35, xp: 0, shields: 3, perfectDaysStreak: 120, lastLoginDate: new Date().toISOString().split('T')[0] },
        habits: [{ id: 1, title: 'בדיקת המערכת', targetValue: 1, unit: 'פעם', bestTime: '08:00', streak: 120 }],
        tasks: [{ id: 't1', text: 'להעלות תמונות חדשות', date: '', time: '', notes: '', isDone: false, color: 'bg-white' }],
        visionBoard: { text: 'לנהל את האפליקציה בהצלחה!', imageUrl: null }
      }
    ];

    const INITIAL_HABITS_DATA = [
      { id: 1, title: 'שכיבות סמיכה', targetValue: 15, unit: 'חזרות', bestTime: '09:00', streak: 0 },
      { id: 2, title: 'שתיית מים', targetValue: 8, unit: 'כוסות', bestTime: '12:00', streak: 0 }
    ];

    const getTodayDate = () => new Date().toISOString().split('T')[0];

    const BADGE_NAMES = [
      'יסוד', 'מומנטום', 'קצב', 'רצף', 'שגרה', 'משמעת',
      'מיקוד', 'עקביות', 'החלטה', 'נחישות', 'רצון', 'חוסן',
      'יציבות', 'כוח', 'סיבולת', 'התמדה', 'עיקשות', 'אחיזה',
      'מסירות', 'מחויבות', 'שורשים', 'עוגן', 'אמונה', 'אופי',
      'חציבה', 'ברזל', 'איתנות', 'זרימה', 'דרך', 'נוכחות',
      'הגשמה', 'עוצמה', 'שליטה', 'מומחיות', 'פסגה'
    ];
    
    const INITIAL_BADGES = BADGE_NAMES.map((name, idx) => ({
      id: idx + 1, completed: idx === 0, label: name, imageUrl: null, characterImageUrl: null
    }));

    const NLP_QUESTIONS = ["אילו הרגלים תרצה לרכוש?", "איך ייראה יום אידיאלי?", "מהו הצעד הקטן ביותר היום?"];

    const CURRENT_DAY = 10;
    const TARGET_DAY = 17;

    const ALL_DAYS = Array.from({ length: 35 }, (_, i) => {
      const date = i + 1;
      const labels = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];
      const status = date < CURRENT_DAY ? 'past' : (date === CURRENT_DAY ? 'today' : 'future');
      return { date, label: labels[(date - 1) % 7], status, isToday: date === CURRENT_DAY, isTarget: date === TARGET_DAY };
    });

    const LoginScreen = ({ onGuestLogin }) => {
      const [isLoading, setIsLoading] = useState(false);
      const handleLogin = async () => {
        setIsLoading(true);
        try {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
            if (error) throw error;
        } catch (error) {
            console.error("Login error:", error);
            setIsLoading(false);
        }
      };
      return (
        <div className="min-h-screen bg-[#F0F2F5] flex items-center justify-center font-sans" dir="rtl">
          <div className="w-full h-screen md:h-[844px] md:max-w-[390px] bg-white md:rounded-[3rem] shadow-2xl flex flex-col items-center justify-center p-8">
            <Trophy className="w-20 h-20 text-[#007AFF] mb-6 drop-shadow-lg" />
            <h1 className="text-3xl font-black mb-2 text-center text-gray-900">אפליקציית הרגלים</h1>
            <p className="text-gray-500 text-center mb-10 px-4">התחבר כדי לסנכרן את ההתקדמות שלך מהדאטה-בייס.</p>
            <button onClick={handleLogin} disabled={isLoading} className="btn-google w-full flex items-center justify-center gap-3 px-6 py-4 rounded-2xl font-bold text-lg shadow-sm mb-4">
              {isLoading ? <Loader2 className="w-6 h-6 animate-spin" /> : <img src="https://www.google.com/favicon.ico" className="w-6 h-6" alt="G" />}
              התחברות עם Google
            </button>
            <button onClick={() => onGuestLogin(true)} className="w-full py-4 bg-blue-50 text-blue-600 rounded-2xl font-bold text-sm border border-blue-100 hover:bg-blue-100 transition-colors">
              כניסת מנהל מערכת (Admin)
            </button>
          </div>
        </div>
      );
    };

    function App() {
      const [session, setSession] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [isGuest, setIsGuest] = useState(false); 
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [loadError, setLoadError] = useState(null);
      const [isSaveAllowed, setIsSaveAllowed] = useState(false); 
      const [syncStatus, setSyncStatus] = useState('synced');
      
      const [habitsStatus, setHabitsStatus] = useState({});
      const [habits, setHabits] = useState(INITIAL_HABITS_DATA);
      const [isTaskDrawerOpen, setIsTaskDrawerOpen] = useState(false);
      const [tasks, setTasks] = useState([]);
      const [user, setUser] = useState({ level: 1, xp: 0, shields: 0, perfectDaysStreak: 0, name: 'טוען...', lastLoginDate: getTodayDate() });
      const [badges, setBadges] = useState(INITIAL_BADGES);
      const [theme, setTheme] = useState({ primary: '#007AFF', gold: '#FFCC00', accent: '#FF9500', dark: '#1C1C1E', bgStart: '#F4F7F9', bgEnd: '#FFFFFF' });
      const [avatars, setAvatars] = useState({ start: null });
      const [visionBoard, setVisionBoard] = useState({ text: '', imageUrl: null });
      
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [settingsView, setSettingsView] = useState('main');
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [isScrolled, setIsScrolled] = useState(false);
      const [showVisionPopup, setShowVisionPopup] = useState(false);
      const [animatingHabitId, setAnimatingHabitId] = useState(null);

      const calendarRef = useRef(null);
      const badgesRef = useRef(null); 

      const checkIsAdmin = (email) => {
          if (!email) return false;
          const e = email.toLowerCase().trim();
          return e.includes('mosheally') || e.includes('moshally') || e.includes('moshe.ally');
      };

      // פונקציית טעינה מרכזית - לא נכנסים לאפליקציה בלי תשובה מהשרת
      const startup = async (currentSession, asAdminManual = false) => {
          setIsDataLoaded(false);
          setIsSaveAllowed(false);
          setLoadError(null);

          try {
              // 1. קריאה לנתוני האדמין (חובה לכולם)
              const { data: globalData, error: globalErr } = await supabase
                .from('user_data')
                .select('app_data')
                .eq('user_id', 'GLOBAL_ADMIN_DATA')
                .maybeSingle();

              if (globalErr) throw new Error("לא ניתן להתחבר לשרת הנתונים הגלובליים.");

              if (globalData?.app_data) {
                  const g = globalData.app_data;
                  if (g.theme) setTheme(prev => ({ ...prev, ...g.theme }));
                  if (g.badges) {
                      setBadges(INITIAL_BADGES.map(b => {
                          const saved = g.badges.find(gb => gb.id === b.id);
                          return saved ? { ...b, characterImageUrl: saved.characterImageUrl, badgeImageUrl: saved.badgeImageUrl, imageUrl: saved.imageUrl } : b;
                      }));
                  }
              }

              // 2. קריאה לנתוני המשתמש
              if (currentSession || asAdminManual) {
                  const uid = asAdminManual ? 'admin_test_id' : currentSession.user.id;
                  const { data: userData, error: userErr } = await supabase
                    .from('user_data')
                    .select('app_data')
                    .eq('user_id', uid)
                    .maybeSingle();

                  if (userErr) throw new Error("שגיאה במשיכת נתוני המשתמש מהענן.");

                  if (userData?.app_data) {
                      const d = userData.app_data;
                      if (d.habits) setHabits(d.habits);
                      if (d.habitsStatus) setHabitsStatus(d.habitsStatus);
                      if (d.tasks) setTasks(d.tasks);
                      if (d.user) setUser(prev => ({ ...prev, ...d.user }));
                      if (d.avatars) setAvatars(prev => ({ ...prev, ...d.avatars }));
                      if (d.visionBoard) setVisionBoard(d.visionBoard);
                  } else {
                      // משתמש חדש לגמרי
                      const name = asAdminManual ? 'משה (אדמין)' : (currentSession?.user?.user_metadata?.full_name?.split(' ')[0] || 'משתמש');
                      setUser({ level: 1, xp: 0, shields: 0, perfectDaysStreak: 0, name, lastLoginDate: getTodayDate() });
                  }
              }

              setIsDataLoaded(true);
              // פתיחת מנעול השמירה רק אחרי 3 שניות של יציבות
              setTimeout(() => setIsSaveAllowed(true), 3000);

          } catch (err) {
              console.error(err);
              setLoadError(err.message);
          }
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session: s } }) => {
          if (s) {
              setSession(s);
              setIsAdmin(checkIsAdmin(s.user.email));
              startup(s);
          }
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, s) => {
          if (s) {
              setSession(s);
              setIsAdmin(checkIsAdmin(s.user.email));
              startup(s);
          } else {
              setSession(null);
              setIsAdmin(false);
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      const handleGuestLogin = (asAdmin = false) => {
          setIsGuest(true);
          setIsAdmin(asAdmin);
          startup(null, asAdmin);
      };

      // מנגנון שמירה אוטומטי - חסום עד שהמידע נטען במלואו
      useEffect(() => {
        if (!isDataLoaded || !isSaveAllowed) return;
        if (!session && !isAdmin) return;

        setSyncStatus('saving');
        const timer = setTimeout(async () => {
           try {
               let hasError = false;
               if (session) {
                   const { error } = await supabase.from('user_data').upsert({ 
                       user_id: session.user.id, 
                       app_data: { habits, habitsStatus, tasks, user, avatars, visionBoard } 
                   });
                   if (error) hasError = true;
               }
               if (isAdmin) {
                   const { error } = await supabase.from('user_data').upsert({ 
                       user_id: 'GLOBAL_ADMIN_DATA', 
                       app_data: { badges, theme } 
                   });
                   if (error) hasError = true;
               }
               setSyncStatus(hasError ? 'error' : 'synced');
           } catch(e) { setSyncStatus('error'); }
        }, 3000); 
        return () => clearTimeout(timer);
      }, [habits, habitsStatus, tasks, user, theme, badges, avatars, visionBoard]);

      // רנדור מסכי טעינה ושגיאה
      if (loadError) return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-white p-8 text-center">
            <AlertCircle className="w-16 h-16 text-red-500 mb-4" />
            <h2 className="text-2xl font-black mb-2">בעיית חיבור לענן</h2>
            <p className="text-gray-500 mb-8">{loadError}</p>
            <button onClick={() => window.location.reload()} className="bg-dark text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-2">
                <RefreshCw className="w-5 h-5" /> נסה להתחבר שוב
            </button>
        </div>
      );

      if (!session && !isGuest) return <LoginScreen onGuestLogin={handleGuestLogin} />;
      
      if (!isDataLoaded) return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-[#F0F2F5] text-gray-500 font-bold gap-4">
           <Loader2 className="w-12 h-12 animate-spin text-blue-500"/>
           <div className="text-center">
              <p className="text-lg mb-1">יוצר קשר עם הענן...</p>
              <p className="text-[10px] font-normal opacity-60">האפליקציה ממתינה לסנכרון נתונים מלא כדי למנוע כפילויות</p>
           </div>
        </div>
      );

      // משתני עזר לתצוגה
      const currentLevel = user.level || 1;
      const currentBadge = badges.find(b => b.id === currentLevel);
      const activeCharacterImg = currentBadge?.characterImageUrl || avatars.start; 
      const headerAvatar = currentBadge?.badgeImageUrl || activeCharacterImg; 
      const activeTasks = tasks?.filter(t => !t.isDone) || [];

      return (
        <div className="min-h-screen bg-[#F0F2F5] flex items-center justify-center font-sans" dir="rtl">
          <style>{`
            .theme-bg-gradient { background: linear-gradient(180deg, ${theme.bgStart} 0%, ${theme.bgEnd} 100%) !important; }
            .c-primary { color: ${theme.primary} !important; }
            .bg-primary { background-color: ${theme.primary} !important; }
            .c-dark { color: ${theme.dark} !important; }
            .bg-dark { background-color: ${theme.dark} !important; }
          `}</style>

          <div className="w-full h-screen md:h-[844px] md:max-w-[390px] bg-white md:rounded-[3rem] md:shadow-2xl md:border-[12px] md:border-[#1C1C1E] relative overflow-hidden flex flex-col transition-all">
            
            {/* Header */}
            <div className={`absolute top-0 left-0 w-full z-[150] px-4 py-3 flex items-center justify-between transition-all duration-300 ${isScrolled ? 'bg-white/95 backdrop-blur-xl border-b border-gray-100 shadow-sm' : 'bg-transparent'}`}>
              <button onClick={() => setIsSettingsOpen(true)} className="flex items-center gap-2">
                <div className="w-10 h-10 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center overflow-hidden shrink-0">
                  {headerAvatar ? <img src={headerAvatar} className="w-full h-full object-cover" /> : <User className="w-5 h-5 text-gray-400" />}
                </div>
                <div className="flex flex-col text-right bg-white/40 px-2 py-0.5 rounded-lg backdrop-blur-sm">
                  <span className="text-[13px] font-black c-dark leading-tight">{user.name}</span>
                  <span className="text-[10px] font-bold text-gray-700 mt-0.5">רמה {currentLevel}</span>
                </div>
              </button>

              <div className="flex items-center gap-1 bg-white/40 rounded-full backdrop-blur-sm px-1">
                 {syncStatus === 'saving' ? (
                   <div className="p-1.5"><Loader2 className="w-4 h-4 animate-spin text-blue-500"/></div>
                 ) : syncStatus === 'error' ? (
                   <div className="p-1.5"><AlertCircle className="w-4 h-4 text-red-500"/></div>
                 ) : (
                   <div className="p-1.5"><Cloud className="w-4 h-4 text-green-500"/></div>
                 )}
              </div>
            </div>

            {/* Main Content */}
            <div onScroll={(e) => setIsScrolled(e.target.scrollTop > 20)} className="flex-1 overflow-y-auto theme-bg-gradient c-dark no-scrollbar relative">
              <div className="w-full px-4 pb-24 pt-20">
                {activeCharacterImg && (
                  <div className="relative w-full h-[300px] mb-2 flex items-center justify-center animate-in zoom-in-95 duration-700">
                     <img src={activeCharacterImg} alt="Avatar" className="relative z-10 max-h-full object-contain drop-shadow-2xl" />
                  </div>
                )}

                {/* Badge Row */}
                <div className="relative w-full z-20 -mt-12 mb-4">
                  <div className="flex flex-row-reverse w-full overflow-x-auto no-scrollbar snap-x snap-mandatory py-4">
                    <div className="flex-shrink-0 w-[calc(50%-45px)]" />
                    {badges.map((badge) => {
                      const isCompleted = currentLevel >= badge.id;
                      const isCurrent = currentLevel === badge.id;
                      const displayBadgeImage = badge.badgeImageUrl || badge.imageUrl;
                      return (
                        <div key={badge.id} className="snap-center flex-shrink-0 w-[90px] flex flex-col items-center justify-center">
                          <div className="relative w-16 h-16 flex items-center justify-center mb-2">
                            {isCurrent && <div className="absolute w-20 h-20 rounded-full animate-halo-current" style={{ background: 'radial-gradient(circle, #FFCC00 20%, transparent 70%)' }}></div>}
                            <div className={`relative z-10 w-full h-full transition-all duration-500 ${isCurrent ? 'animate-badge-current drop-shadow-xl' : isCompleted ? 'scale-100' : 'opacity-40 grayscale scale-90'}`}>
                              {displayBadgeImage ? <img src={displayBadgeImage} className="w-full h-full object-contain" /> : <div className="w-[80%] h-[80%] rounded-full border-2 border-dashed border-gray-300 opacity-50 mx-auto mt-2"></div>}
                            </div>
                          </div>
                          <span className={`text-[12px] font-black ${isCurrent ? 'c-primary scale-110' : 'text-gray-400'}`}>{badge.label}</span>
                        </div>
                      );
                    })}
                    <div className="flex-shrink-0 w-[calc(50%-45px)]" />
                  </div>
                </div>

                {/* Habit List */}
                <section className="space-y-4 mt-6">
                  <div className="flex justify-between items-center px-1">
                    <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest">הרגלים</h3>
                  </div>
                  {habits.map((habit) => (
                    <div key={habit.id} className="bg-white border-gray-100 shadow-sm p-4 rounded-2xl flex flex-row-reverse items-center justify-between">
                        <div className="text-right flex-1 pr-2">
                            <h4 className="font-black text-sm c-dark">{habit.title}</h4>
                        </div>
                        <div className="w-10 h-10 rounded-full border-2 border-gray-100 flex items-center justify-center">
                            <Check className="w-5 h-5 text-gray-200" />
                        </div>
                    </div>
                  ))}
                </section>
              </div>
            </div>

            {/* Menu Buttons */}
            <button onClick={() => setIsMenuOpen(true)} className="absolute bottom-6 left-6 z-[100] w-14 h-14 bg-dark text-white rounded-full shadow-2xl flex items-center justify-center active:scale-95 transition-all"><Menu className="w-6 h-6"/></button>

            {/* Drawers & Modals (Simplified for stability) */}
            <div className={`absolute inset-0 bg-black/40 z-[2000] transition-opacity ${isSettingsOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsSettingsOpen(false)} />
            <div className={`absolute top-0 right-0 h-full w-[85%] max-w-[320px] bg-[#F8F9FB] z-[2100] shadow-2xl transition-transform flex flex-col ${isSettingsOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                 <div className="p-5 bg-white border-b flex items-center justify-between"><h2 className="font-black text-lg c-dark">הגדרות</h2><button onClick={() => setIsSettingsOpen(false)} className="p-2 bg-gray-50 rounded-full"><ArrowRight className="w-4 h-4"/></button></div>
                 <div className="flex-1 p-4 space-y-3 overflow-y-auto no-scrollbar pb-20">
                     {isAdmin && (
                       <button onClick={() => setSettingsView('design')} className="w-full bg-white p-4 rounded-xl border flex items-center gap-3">
                         <Palette className="text-blue-500" /> <span className="font-bold">ניהול שלבים (אדמין)</span>
                       </button>
                     )}
                     <div className="mt-8 pt-4 border-t">
                        {session?.user?.email && <p className="text-[10px] text-gray-400 mb-2">מחובר כ: {session.user.email}</p>}
                        <button onClick={() => window.location.reload()} className="w-full py-3 bg-red-50 text-red-500 rounded-xl font-bold">התנתק / רענן</button>
                     </div>
                 </div>
                 
                 {settingsView === 'design' && (
                   <div className="absolute inset-0 bg-white z-[2200] flex flex-col p-5">
                      <button onClick={() => setSettingsView('main')} className="mb-4 text-blue-500 font-bold">חזור</button>
                      <h2 className="font-black text-xl mb-4">ניהול 35 שלבים</h2>
                      <div className="flex-1 overflow-y-auto space-y-4">
                        {badges.map(b => (
                          <div key={b.id} className="p-3 bg-gray-50 rounded-xl border flex items-center justify-between">
                            <span className="font-bold text-xs">רמה {b.id}: {b.label}</span>
                            <div className="flex gap-2">
                               <input type="file" className="hidden" id={`up-c-${b.id}`} onChange={(e) => handleBadgeImageUpload(b.id, 'characterImageUrl', e)} />
                               <label htmlFor={`up-c-${b.id}`} className="bg-white border p-2 rounded text-[10px] cursor-pointer">דמות</label>
                               <input type="file" className="hidden" id={`up-b-${b.id}`} onChange={(e) => handleBadgeImageUpload(b.id, 'badgeImageUrl', e)} />
                               <label htmlFor={`up-b-${b.id}`} className="bg-white border p-2 rounded text-[10px] cursor-pointer">סמל</label>
                            </div>
                          </div>
                        ))}
                      </div>
                   </div>
                 )}
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
