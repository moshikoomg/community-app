<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>צנצנת ההרגלים שלי - חוויית זריקה רציפה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --primary-color: #239B62;
            --danger-color: #ef4444;
            --admin-color: #3b82f6;
            --text-main: #1e293b;
            --jar-shadow: rgba(0, 0, 0, 0.06);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Heebo', sans-serif;
            background-color: #cbd5e1;
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden;
            touch-action: manipulation;
        }

        .app-container {
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        @media (min-width: 420px) {
            .app-container {
                width: 390px; height: 844px; max-height: 92vh; 
                border-radius: 48px; 
                box-shadow: 0 40px 80px rgba(0,0,0,0.25); 
            }
        }

        /* --- Header UI --- */
        .header-ui {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 15px 20px; box-sizing: border-box;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 70; pointer-events: none;
        }

        .user-pill {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 5px 12px 5px 6px;
            border-radius: 20px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.7);
            pointer-events: auto; cursor: pointer;
        }
        .user-pill .name { font-weight: 800; font-size: 13px; color: var(--text-main); }
        .user-avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #f1f5f9, #e2e8f0); display: flex; align-items: center; justify-content: center; }

        .stage-badge {
            background: var(--text-main); color: white;
            padding: 3px 10px; border-radius: 10px;
            font-size: 11px; font-weight: 900;
        }

        /* --- Day Indicator --- */
        .day-display {
            position: absolute; top: 15px; left: 0; width: 100%;
            text-align: center; pointer-events: none; z-index: 5;
            display: flex; flex-direction: column; align-items: center;
        }
        .day-label { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: -4px; }
        .big-day-number {
            font-size: 24px; font-weight: 900; color: rgba(0,0,0,0.2);
            user-select: none; letter-spacing: -1px;
        }
        .day-progress-sub { font-size: 9px; font-weight: 800; color: #cbd5e1; margin-top: -4px; }

        .top-section { flex: 1; position: relative; width: 100%; height: 100%; overflow: hidden; }

        .jars-slider {
            display: flex; width: 100%; height: 100%; overflow-x: auto;
            scroll-snap-type: x mandatory; align-items: center; scrollbar-width: none;
            direction: ltr; scroll-behavior: smooth;
        }
        .jars-slider::-webkit-scrollbar { display: none; }

        .jar-slide { 
            flex: 0 0 95%; height: 100%; display: flex; justify-content: center; 
            align-items: center; scroll-snap-align: center; position: relative; 
            box-sizing: border-box; padding-bottom: 180px;
            transition: opacity 0.5s ease;
            background-size: cover; background-position: center;
        }
        .jar-slide::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, var(--bg-color) 0%, rgba(248, 250, 252, 0.05) 50%, var(--bg-color) 100%);
            z-index: 1; pointer-events: none;
        }

        .jar-wrapper { position: relative; width: 340px; height: 480px; direction: rtl; z-index: 2; }
        canvas#physics-canvas { position: absolute; top: 0; left: 0; z-index: 10; touch-action: none; }

        /* --- Jar Design + Lid Animation --- */
        .jar-glass-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        
        .jar-cap-detail {
            position: absolute; top: 32px; left: 85px; width: 170px; height: 22px;
            background: linear-gradient(180deg, #ffffff 0%, #e2e8f0 45%, #94a3b8 100%);
            border-radius: 10px; z-index: 25;
            box-shadow: 0 6px 12px rgba(0,0,0,0.12), inset 0 -3px 4px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: left center;
        }
        .jar-cap-detail.open { transform: translateY(-50px) rotate(-30deg); }

        .jar-opening {
            position: absolute; top: 44px; left: 92px; width: 156px; height: 24px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.6); z-index: 24;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.08); border: 1.5px solid rgba(255,255,255,0.4);
        }
        .jar-neck {
            position: absolute; top: 50px; left: 100px; width: 140px; height: 50px;
            border-radius: 8px 8px 0 0;
            background: linear-gradient(to right, rgba(255,255,255,0.5), rgba(255,255,255,0.1) 20%, rgba(255,255,255,0.1) 80%, rgba(255,255,255,0.5));
            box-shadow: inset 0 0 20px rgba(255,255,255,0.3); z-index: 19;
        }
        .jar-body {
            position: absolute; top: 90px; left: 30px; width: 280px; height: 340px;
            border-radius: 70px 70px 65px 65px;
            box-shadow: inset 20px 0 40px rgba(255,255,255,0.6), inset -20px -20px 40px var(--jar-shadow), 0 20px 50px rgba(0,0,0,0.08); 
            background: rgba(255, 255, 255, 0.02); border: 1.5px solid rgba(255,255,255,0.25);
        }

        /* --- Drawer --- */
        .bottom-section {
            background: #ffffff; border-radius: 36px 36px 0 0; 
            box-shadow: 0 -12px 40px rgba(0,0,0,0.06); 
            z-index: 100; display: flex; flex-direction: column; align-items: center; 
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 220px; box-sizing: border-box;
            transition: height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        .bottom-section.edit-mode { height: 400px; }
        .bottom-section::before {
            content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            width: 44px; height: 5px; background-color: #f1f5f9; border-radius: 4px;
        }

        .drawer-view { width: 100%; display: none; flex-direction: column; align-items: center; flex: 1; }
        .drawer-view.active { display: flex; }

        .edit-btn { position: absolute; top: 25px; right: 25px; color: #cbd5e1; cursor: pointer; padding: 6px; z-index: 110; }
        
        .picker-top { display: flex; flex-direction: column; align-items: center; user-select: none; margin-top: -42px; min-height: 100px; }
        .active-icon-bg { 
            width: 84px; height: 84px; background: #ffffff; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; position: relative; 
            z-index: 1; box-shadow: 0 -4px 15px rgba(0,0,0,0.03); 
        }
        .active-icon-bg::before { content: ''; position: absolute; bottom: 42px; left: -12px; width: 16px; height: 12px; background: radial-gradient(circle at 0% 0%, transparent 12px, #ffffff 12.5px); z-index: -1; }
        .active-icon-bg::after { content: ''; position: absolute; bottom: 42px; right: -12px; width: 16px; height: 12px; background: radial-gradient(circle at 100% 0%, transparent 12px, #ffffff 12.5px); z-index: -1; }

        #marble-drop-zone { width: 60px; height: 60px; pointer-events: none; }
        
        #floating-marble { 
            position: absolute; z-index: 1000; cursor: grab; touch-action: none; 
            transform-origin: center center; pointer-events: auto;
        }
        #floating-marble.dragging { cursor: grabbing; animation: none !important; }
        
        @keyframes marblePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }
        .marble-pulse { animation: marblePulse 2.8s ease-in-out infinite; }

        .habit-scroller { display: flex; align-items: center; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; width: 100%; padding: 5px 0; }
        .habit-scroller::before, .habit-scroller::after { content: ''; flex: 0 0 calc(50% - 45px); }
        .habit-item { flex: 0 0 auto; scroll-snap-align: center; padding: 10px 20px; font-size: 22px; color: #cbd5e1; font-weight: 700; transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); white-space: nowrap; }
        .habit-item.active { font-size: 34px; color: var(--text-main); font-weight: 900; }

        .dots-container { display: flex; gap: 8px; margin-top: 5px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #e2e8f0; transition: 0.4s; }
        .dot.active { width: 22px; background: var(--text-main); border-radius: 4px; }

        /* --- Popups --- */
        .popup-backdrop { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .popup-backdrop.active { opacity: 1; pointer-events: all; }
        .popup-content { background: #ffffff; width: 90%; max-width: 360px; border-radius: 28px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); transform: scale(0.9); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); max-height: 85vh; overflow-y: auto; position: relative; }
        .close-popup-btn { position: absolute; top: 15px; left: 15px; background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="header-ui">
            <div id="stage-badge" class="stage-badge">שלב 1</div>
            <div class="user-pill" onclick="openProfilePopup()">
                <div class="name" id="display-profile-name">ישראל</div>
                <div class="user-avatar">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
            </div>
        </div>

        <!-- Days Display -->
        <div class="day-display">
            <div class="day-label">יום</div>
            <div id="bg-day-indicator" class="big-day-number">1</div>
            <div id="day-progress-sub" class="day-progress-sub">מתוך 5</div>
        </div>

        <div class="top-section" id="clickable-top-section">
            <div class="jars-slider" id="jars-slider"></div>
            <canvas id="physics-canvas"></canvas>
        </div>

        <!-- Drawer -->
        <div class="bottom-section" id="bottom-drawer">
            <div id="drawer-normal-view" class="drawer-view active">
                <div class="edit-btn" onclick="openEditMode()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></div>
                <div class="picker-top">
                    <div class="active-icon-bg"><div id="marble-drop-zone"></div></div>
                    <div id="picker-time" style="color:#94a3b8; font-size:13px; font-weight:700; margin-top:2px;"></div>
                </div>
                <div class="habit-scroller" id="habit-scroller"></div>
                <div class="dots-container" id="picker-dots"></div>
            </div>

            <div id="drawer-edit-view" class="drawer-view">
                <div style="padding: 25px; width: 100%; box-sizing: border-box;">
                    <div style="font-size: 18px; font-weight: 900; margin-bottom: 20px; text-align: center;">עריכת הרגל</div>
                    <div style="display:flex; gap:12px; text-align: right;">
                        <div style="flex:3;"><label style="display:block; font-size:12px; margin-bottom:4px;">שם</label><input type="text" id="input-habit-name" style="width:100%; padding:12px; border:1.5px solid #e2e8f0; border-radius:12px;"></div>
                        <div style="flex:1.2;"><label style="display:block; font-size:12px; margin-bottom:4px;">צבע</label><input type="color" id="input-habit-color" style="width:100%; height:48px; border-radius:12px; border:1.5px solid #e2e8f0; padding:2px;"></div>
                    </div>
                    <div style="margin-top:15px; text-align: right;"><label style="display:block; font-size:12px; margin-bottom:4px;">יעד</label><input type="text" id="input-habit-time" style="width:100%; padding:12px; border:1.5px solid #e2e8f0; border-radius:12px;"></div>
                    <div style="display:flex; gap:12px; margin-top:20px;"><button style="flex:2; background:var(--primary-color); color:white; border:none; padding:15px; border-radius:14px; font-weight:800;" onclick="saveHabitChanges()">שמור</button><button style="flex:1; background:#f1f5f9; border:none; padding:15px; border-radius:14px;" onclick="closeEditMode()">ביטול</button></div>
                    <button style="width:100%; margin-top:15px; color:var(--danger-color); background:none; border:1px solid var(--danger-color); padding:12px; border-radius:12px; font-weight:800;" onclick="deleteCurrentHabit()">מחק הרגל</button>
                </div>
            </div>
        </div>

        <canvas id="floating-marble" width="60" height="60"></canvas>

        <!-- Popups -->
        <div class="popup-backdrop" id="profile-popup" onclick="handleBackdropClick(event, 'profile-popup')">
            <div class="popup-content">
                <button class="close-popup-btn" onclick="closeProfilePopup()">✕</button>
                <div style="font-size:22px; font-weight:900; margin-bottom:20px;">החשבון שלי</div>
                <div style="display:flex; gap:12px; margin-bottom:25px;">
                    <div style="flex:1; background:#f8fafc; padding:15px; border-radius:18px; text-align:center;"><span style="display:block; font-size:22px; font-weight:900; color:var(--primary-color);" id="stat-days-active">1</span><span style="font-size:11px; color:#94a3b8;">ימים</span></div>
                    <div style="flex:1; background:#f8fafc; padding:15px; border-radius:18px; text-align:center;"><span style="display:block; font-size:22px; font-weight:900; color:var(--primary-color);" id="stat-total-habits">0</span><span style="font-size:11px; color:#94a3b8;">גולות</span></div>
                </div>
                <div style="text-align: right;"><label style="font-size:13px; font-weight:700; color:#64748b;">שם תצוגה</label><input type="text" id="input-profile-name" style="width:100%; padding:12px; border:1.5px solid #e2e8f0; border-radius:12px; margin-top:5px;" onkeyup="updateProfileName(this.value)"></div>
                <button id="admin-dashboard-btn" style="display:none; width:100%; margin-top:20px; padding:14px; border-radius:14px; border:1.5px solid var(--admin-color); color:var(--admin-color); background:none; font-weight:800;" onclick="openAdminDashboard()">ניהול שלבים</button>
            </div>
        </div>

        <div class="popup-backdrop" id="admin-popup" onclick="handleBackdropClick(event, 'admin-popup')">
            <div class="popup-content" style="max-width:400px;">
                <button class="close-popup-btn" onclick="closeAdminDashboard()">✕</button>
                <div style="font-size:22px; font-weight:900; margin-bottom:20px; color:var(--admin-color);">ניהול שלבים</div>
                <div style="text-align: right;"><label style="font-size:12px;">שלב 1 (1-5)</label><input type="text" id="bg-url-1" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:10px; margin-bottom:10px;" onchange="saveAllBgs()"></div>
                <div style="text-align: right;"><label style="font-size:12px;">שלב 2 (5-10)</label><input type="text" id="bg-url-2" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:10px; margin-bottom:10px;" onchange="saveAllBgs()"></div>
                <div style="text-align: right;"><label style="font-size:12px;">שלב 3 (10-21)</label><input type="text" id="bg-url-3" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:10px; margin-bottom:10px;" onchange="saveAllBgs()"></div>
                <div style="text-align: right;"><label style="font-size:12px;">שלב 4+ (קפיצות 21)</label><input type="text" id="bg-url-generic" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:10px; margin-bottom:10px;" onchange="saveAllBgs()"></div>
                <button style="width:100%; background:var(--admin-color); color:white; padding:15px; border-radius:14px; border:none; font-weight:800; margin-top:10px;" onclick="closeAdminDashboard()">סיום</button>
            </div>
        </div>
    </div>

    <script>
        const STAGE_GAP = 21;
        const TOTAL_DISPLAY_DAYS = 63; 
        const ADMIN_EMAIL = "mosheally@gmail.com";
        const currentUser = { displayName: "משה עלי", email: "mosheally@gmail.com" };

        let unlockedDays = 1, currentDayView = 0, currentHabitIndex = 1;
        let habitsData = [
            { id: 1, name: 'לנשום', time: '10 דקות', color: '#42b6c7' },
            { id: 2, name: 'לרוץ', time: '5 דקות', color: '#e86a92' },
            { id: 3, name: 'לשחק', time: '15 דקות', color: '#f3c13a' },
            { id: 4, name: 'לקרוא', time: '20 דקות', color: '#7bc043' },
            { id: 5, name: 'לשתות', time: '1 כוס', color: '#8e44ad' }
        ];

        let stageBackgrounds = JSON.parse(localStorage.getItem('stage_bgs_v7')) || {};

        function getStageInfo(day) {
            day = day + 1; 
            if (day <= 5) return { stage: 1, maxDays: 5 };
            if (day <= 10) return { stage: 2, maxDays: 10 };
            if (day <= 21) return { stage: 3, maxDays: 21 };
            let base = 21, stageCount = 3;
            while (day > base) { base += STAGE_GAP; stageCount++; if (day <= base) break; }
            return { stage: stageCount, maxDays: base };
        }

        const userStats = { daysData: [] };
        function initStats(idx) {
            if(!userStats.daysData[idx]) userStats.daysData[idx] = { habits: {}, balls: [] };
            habitsData.forEach(h => { if(!userStats.daysData[idx].habits[h.id]) userStats.daysData[idx].habits[h.id] = { min: 0, breakthrough: 0 }; });
        }
        for(let i=0; i<TOTAL_DISPLAY_DAYS; i++) initStats(i);

        const slider = document.getElementById('jars-slider');
        function buildJars() {
            slider.innerHTML = '';
            for(let i=0; i<TOTAL_DISPLAY_DAYS; i++) {
                const info = getStageInfo(i);
                const slide = document.createElement('div');
                slide.className = `jar-slide ${i >= unlockedDays ? 'locked' : ''}`;
                slide.dataset.index = i;
                const bg = stageBackgrounds[info.stage] || stageBackgrounds['generic'];
                if (bg) slide.style.backgroundImage = `url('${bg}')`;
                slide.innerHTML = `
                    <div class="jar-wrapper" id="jar-wrapper-${i}">
                        <div class="jar-glass-overlay">
                            <div class="jar-cap-detail" id="lid-${i}"></div>
                            <div class="jar-opening"></div>
                            <div class="jar-neck"></div>
                            <div class="jar-body"></div>
                        </div>
                    </div>`;
                slider.appendChild(slide);
            }
        }
        buildJars();

        const { Engine, Bodies, Composite, Mouse, MouseConstraint } = Matter;
        const engine = Engine.create(), world = engine.world;
        let currentBalls = [];
        const canvas = document.getElementById('physics-canvas'), ctx = canvas.getContext('2d');
        canvas.width = 340; canvas.height = 480;

        const wallOptions = { isStatic: true, friction: 0.1, restitution: 0.4 };
        Composite.add(world, [
            Bodies.rectangle(170, 420, 200, 40, wallOptions),
            Bodies.rectangle(75, 400, 80, 40, { ...wallOptions, angle: Math.PI / 5 }),
            Bodies.rectangle(265, 400, 80, 40, { ...wallOptions, angle: -Math.PI / 5 }),
            Bodies.rectangle(35, 260, 20, 240, wallOptions),
            Bodies.rectangle(305, 260, 20, 240, wallOptions),
            Bodies.rectangle(70, 115, 80, 20, { ...wallOptions, angle: -Math.PI / 4.5 }),
            Bodies.rectangle(270, 115, 80, 20, { ...wallOptions, angle: Math.PI / 4.5 }),
            Bodies.rectangle(105, 70, 20, 60, wallOptions),
            Bodies.rectangle(235, 70, 20, 60, wallOptions)
        ]);
        Composite.add(world, MouseConstraint.create(engine, { mouse: Mouse.create(canvas), constraint: { stiffness: 0.2, render: { visible: false } } }));
        document.getElementById('jar-wrapper-0').insertBefore(canvas, document.getElementById('jar-wrapper-0').firstChild);

        const scroller = document.getElementById('habit-scroller');
        function initScroller() {
            scroller.innerHTML = '';
            habitsData.forEach((h, i) => { 
                const el = document.createElement('div'); el.className = 'habit-item'; el.innerText = h.name; 
                el.onclick = () => el.scrollIntoView({ behavior: 'smooth', inline: 'center' }); 
                scroller.appendChild(el); 
            });
            renderDots();
        }

        function renderDots() {
            const dotsContainer = document.getElementById('picker-dots');
            dotsContainer.innerHTML = '';
            habitsData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `dot ${index === currentHabitIndex ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });
        }
        initScroller();

        function updateStatsUI() {
            if(!habitsData[currentHabitIndex]) return;
            const h = habitsData[currentHabitIndex], stats = userStats.daysData[currentDayView].habits[h.id];
            const timeEl = document.getElementById('picker-time');
            if(stats && stats.min > 0) { timeEl.innerText = '+' + h.time; timeEl.style.color = h.color; } 
            else { timeEl.innerText = h.time; timeEl.style.color = '#94a3b8'; }
        }

        const fm = document.getElementById('floating-marble');
        function renderActiveHabit() {
            const h = habitsData[currentHabitIndex]; if(!h) return;
            document.querySelectorAll('.habit-item').forEach((it, i) => it.classList.toggle('active', i === currentHabitIndex));
            const uctx = fm.getContext('2d'); uctx.clearRect(0,0,60,60); 
            drawMarble(uctx, 30, 30, 26, 0, h.color);
            if(fm.style.display !== 'none' && !isAnimatingJump) {
                fm.style.display = 'block'; fm.style.opacity = '1'; fm.style.transform = 'scale(1)';
                fm.style.filter = `drop-shadow(0 0 18px ${h.color}77) drop-shadow(0 8px 16px rgba(0,0,0,0.12))`;
                updateFloatingPosition();
            }
            updateStatsUI(); renderDots();
        }

        let lastIdx = -1;
        scroller.addEventListener('scroll', () => {
            const center = scroller.getBoundingClientRect().left + scroller.offsetWidth/2;
            let closest = -1, min = Infinity;
            document.querySelectorAll('.habit-item').forEach((it, i) => { const d = Math.abs(center - (it.getBoundingClientRect().left + it.offsetWidth/2)); if(d < min){ min = d; closest = i; } });
            if(closest !== -1 && closest !== lastIdx) { lastIdx = closest; currentHabitIndex = closest; popMarble(); }
        });

        function popMarble() {
            if(fm.style.display === 'none' || isAnimatingJump) return;
            fm.classList.remove('marble-pulse');
            fm.style.transition = 'none';
            fm.style.transform = 'scale(0.1) translateY(40px) rotate(-45deg)';
            fm.style.opacity = '0';
            requestAnimationFrame(() => {
                renderActiveHabit(); 
                fm.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.7, 0.64, 1.1), opacity 0.3s'; 
                fm.style.transform = 'scale(1) translateY(0) rotate(0deg)'; fm.style.opacity = '1';
                setTimeout(() => { if(!isDrag && !isAnimatingJump) fm.classList.add('marble-pulse'); }, 500);
            });
        }

        function moveCanvas(idx) {
            if(currentDayView === idx) return;
            const wrap = document.getElementById(`jar-wrapper-${idx}`);
            if(wrap) wrap.insertBefore(canvas, wrap.firstChild);
            userStats.daysData[currentDayView].balls = [...currentBalls];
            currentBalls.forEach(b => Composite.remove(world, b));
            currentBalls = userStats.daysData[idx].balls || [];
            currentBalls.forEach(b => Composite.add(world, b));
            currentDayView = idx;
            const info = getStageInfo(idx);
            document.getElementById('stage-badge').innerText = `שלב ${info.stage}`;
            document.getElementById('bg-day-indicator').innerText = (idx + 1);
            document.getElementById('day-progress-sub').innerText = `מתוך ${info.maxDays}`;
            updateStatsUI();
        }

        const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) moveCanvas(parseInt(e.target.dataset.index)); }), { threshold:0.6, root:slider });
        function reobserve() { document.querySelectorAll('.jar-slide').forEach(s => obs.observe(s)); }
        reobserve();

        function updateFloatingPosition() {
            const dz = document.getElementById('marble-drop-zone'), cont = document.querySelector('.app-container');
            if(!dz || !cont || fm.style.display === 'none' || isAnimatingJump) return;
            const r = dz.getBoundingClientRect(), cr = cont.getBoundingClientRect();
            fm.style.left = (r.left - cr.left + r.width/2 - 30) + 'px';
            fm.style.top = (r.top - cr.top + r.height/2 - 30) + 'px';
        }
        window.addEventListener('resize', updateFloatingPosition);

        function handleBackdropClick(e, id) { if(e.target.id === id) closeModal(id); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function openProfilePopup() {
            document.getElementById('stat-days-active').innerText = unlockedDays;
            let total = 0; userStats.daysData.forEach(d => total += d.balls.length);
            document.getElementById('stat-total-habits').innerText = total;
            document.getElementById('input-profile-name').value = currentUser.displayName;
            document.getElementById('admin-dashboard-btn').style.display = (currentUser.email === ADMIN_EMAIL) ? 'block' : 'none';
            document.getElementById('profile-popup').classList.add('active');
        }
        function closeProfilePopup() { closeModal('profile-popup'); }
        function openAdminDashboard() { closeProfilePopup(); document.getElementById('admin-popup').classList.add('active'); }
        function closeAdminDashboard() { closeModal('admin-popup'); }

        function saveAllBgs() {
            for(let i=1; i<=3; i++) stageBackgrounds[i] = document.getElementById(`bg-url-${i}`).value;
            stageBackgrounds['generic'] = document.getElementById('bg-url-generic').value;
            localStorage.setItem('stage_bgs_v7', JSON.stringify(stageBackgrounds));
            buildJars(); reobserve();
        }

        function updateProfileName(v) { 
            currentUser.displayName = v.trim() || "ישראל";
            document.getElementById('display-profile-name').innerText = currentUser.displayName.split(' ')[0]; 
        }

        function openEditMode() {
            const h = habitsData[currentHabitIndex]; if(!h) return;
            document.getElementById('input-habit-name').value = h.name;
            document.getElementById('input-habit-time').value = h.time;
            document.getElementById('input-habit-color').value = h.color;
            document.getElementById('bottom-drawer').classList.add('edit-mode');
            document.getElementById('drawer-normal-view').classList.remove('active');
            document.getElementById('drawer-edit-view').classList.add('active');
            fm.style.display = 'none';
        }

        function closeEditMode() {
            document.getElementById('bottom-drawer').classList.remove('edit-mode');
            document.getElementById('drawer-edit-view').classList.remove('active');
            document.getElementById('drawer-normal-view').classList.add('active');
            setTimeout(() => {
                fm.style.display = 'block';
                if (document.querySelectorAll('.habit-item')[currentHabitIndex]) { 
                    document.querySelectorAll('.habit-item')[currentHabitIndex].scrollIntoView({ behavior: 'auto', inline: 'center' }); 
                    popMarble(); 
                }
            }, 10);
        }

        function saveHabitChanges() {
            const h = habitsData[currentHabitIndex];
            h.name = document.getElementById('input-habit-name').value.trim() || h.name;
            h.time = document.getElementById('input-habit-time').value.trim() || h.time;
            h.color = document.getElementById('input-habit-color').value;
            closeEditMode(); initScroller();
        }

        function deleteCurrentHabit() {
            if(habitsData.length <= 1) return;
            if(confirm("למחוק?")){ habitsData.splice(currentHabitIndex, 1); currentHabitIndex = 0; closeEditMode(); initScroller(); }
        }

        const animateLid = (open) => {
            const lid = document.getElementById(`lid-${currentDayView}`);
            if (lid) {
                if (open) lid.classList.add('open');
                else lid.classList.remove('open');
            }
        };

        let isDrag = false, sx, sy, tx=0, ty=0, isAnimatingJump = false;

        function performNaturalJump(fromX = null, fromY = null) {
            if (isAnimatingJump) return;
            isAnimatingJump = true; 
            fm.classList.remove('marble-pulse');
            
            const contRect = document.querySelector('.app-container').getBoundingClientRect();
            const jr = document.getElementById(`jar-wrapper-${currentDayView}`).getBoundingClientRect();
            
            const startX = fromX !== null ? fromX : (parseFloat(fm.style.left) + 30);
            const startY = fromY !== null ? fromY : (parseFloat(fm.style.top) + 30);
            
            const targetX = jr.left - contRect.left + jr.width / 2;
            const targetY = jr.top - contRect.top + 45; 
            
            const distance = Math.sqrt(Math.pow(targetX - startX, 2) + Math.pow(targetY - startY, 2));
            const duration = Math.max(300, Math.min(700, distance * 1.5)); 
            const startTime = performance.now();

            animateLid(true);

            function animate(currentTime) {
                const elapsed = currentTime - startTime, p = Math.min(elapsed / duration, 1);
                
                const curX = startX + (targetX - startX) * p;
                
                const distY = Math.abs(targetY - startY);
                const jumpH = Math.max(60, distY * 0.4 + 20);
                const curY = startY + (targetY - startY) * p - Math.sin(p * Math.PI) * jumpH;
                
                const rot = p * 360;
                
                fm.style.left = (curX - 30) + 'px'; 
                fm.style.top = (curY - 30) + 'px';
                fm.style.transform = `scale(1) rotate(${rot}deg)`;
                
                if (p < 1) requestAnimationFrame(animate);
                else {
                    const canvasRect = canvas.getBoundingClientRect();
                    const physicsX = (contRect.left + targetX) - canvasRect.left;
                    const physicsY = (contRect.top + targetY) - canvasRect.top;
                    
                    fm.style.visibility = 'hidden'; 
                    dropBall(physicsX, physicsY); 
                    
                    setTimeout(() => animateLid(false), 150);
                    
                    // מחכים עד שהכדור יסיים ליפול לחלוטין לפני שיוצרים כדור חדש במגירה
                    setTimeout(() => { 
                        fm.style.transform = 'scale(0)'; 
                        fm.style.visibility = 'visible';
                        isAnimatingJump = false;
                        popMarble(); 
                    }, 1200);
                }
            }
            requestAnimationFrame(animate);
        }

        fm.addEventListener('pointerdown', e => { 
            if(document.getElementById('drawer-edit-view').classList.contains('active') || isAnimatingJump) return; 
            isDrag=true; fm.classList.add('dragging'); fm.classList.remove('marble-pulse');
            sx=e.clientX; sy=e.clientY; tx=0; ty=0; fm.setPointerCapture(e.pointerId); 
        });

        fm.addEventListener('pointermove', e => { 
            if(!isDrag) return; 
            tx=e.clientX-sx; ty=e.clientY-sy; 
            fm.style.transform=`translate(${tx}px, ${ty}px) scale(1.1)`; 
            const jr = document.getElementById(`jar-wrapper-${currentDayView}`).getBoundingClientRect();
            if (e.clientY < jr.top + 120) animateLid(true); else animateLid(false);
        });

        // סגירת מגירת עריכה בלחיצה מחוצה לה
        document.getElementById('clickable-top-section').addEventListener('click', () => { 
            if(document.getElementById('bottom-drawer').classList.contains('edit-mode')) closeEditMode(); 
        });

        fm.addEventListener('pointerup', e => {
            if(!isDrag) return; isDrag=false; fm.classList.remove('dragging'); fm.releasePointerCapture(e.pointerId);
            
            const jr = document.getElementById(`jar-wrapper-${currentDayView}`).getBoundingClientRect();
            const r = fm.getBoundingClientRect();
            const cx = r.left + 30;
            const cy = r.top + 30;
            
            const contRect = document.querySelector('.app-container').getBoundingClientRect();
            const isInside = cx > jr.left - 40 && cx < jr.right + 40 && cy < jr.bottom && cy > jr.top - 120;
            
            const dist = Math.sqrt(tx * tx + ty * ty);
            
            if (dist < 10) {
                // לחיצה פשוטה ללא גרירה - הכדור ייזרק מהמגירה ישר לצנצנת
                tx = 0; ty = 0;
                fm.style.transform = `translate(0px, 0px) scale(1)`;
                performNaturalJump();
            } else if (isInside) {
                tx = 0; ty = 0;
                performNaturalJump(cx - contRect.left, cy - contRect.top);
            } else {
                magnetBack();
                animateLid(false);
            }
        });

        function magnetBack() {
            fm.style.transition = 'transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; 
            fm.style.transform = 'translate(0,0) scale(1)'; 
            setTimeout(() => { if (!isDrag && !isAnimatingJump) fm.classList.add('marble-pulse'); }, 450);
        }

        function dropBall(x, y) {
            if(currentDayView >= unlockedDays || !habitsData[currentHabitIndex]) return false;
            const h = habitsData[currentHabitIndex], stats = userStats.daysData[currentDayView].habits[h.id];
            if(stats.min===0) stats.min=1; else stats.breakthrough++; updateStatsUI();
            
            const b = Bodies.circle(x, y, 26, { restitution:0.6, friction:0.05, density:0.04, label:'habit-ball', render:{fillStyle:h.color} });
            Matter.Body.setVelocity(b, { x: 0, y: 7 });
            
            currentBalls.push(b); Composite.add(world, b); return true;
        }

        function drawMarble(c, x, y, r, a, col) {
            c.save(); c.translate(x, y); c.rotate(a);
            c.beginPath(); c.arc(0,0,r,0,Math.PI*2);
            let g = c.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r); 
            g.addColorStop(0,'rgba(255,255,255,0.98)'); g.addColorStop(0.5,'rgba(240,240,240,0.85)'); g.addColorStop(1,'rgba(180,180,180,0.5)');
            c.fillStyle=g; c.fill();
            c.save(); c.globalAlpha=0.8; c.beginPath(); c.moveTo(0,r*0.7); 
            c.quadraticCurveTo(r*0.6,0,0,-r*0.6); c.quadraticCurveTo(-r*0.3,0,0,r*0.7); 
            c.fillStyle=col; c.fill(); c.restore();
            c.lineWidth=1; c.strokeStyle='rgba(255,255,255,0.5)'; c.stroke();
            c.beginPath(); c.arc(-r*0.3,-r*0.3,r*0.2,0,Math.PI*2); c.fillStyle='rgba(255,255,255,0.7)'; c.fill(); c.restore();
        }

        function loop() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            Composite.allBodies(world).forEach(b => { if(b.label==='habit-ball') drawMarble(ctx, b.position.x, b.position.y, b.circleRadius, b.angle, b.render.fillStyle); });
            Engine.update(engine, 1000/60); requestAnimationFrame(loop);
        }
        loop(); 
        
        document.getElementById('display-profile-name').innerText = currentUser.displayName.split(' ')[0];
        setTimeout(() => { scroller.scrollTo({left:0}); lastIdx=1; renderActiveHabit(); fm.classList.add('marble-pulse'); }, 150);
    </script>
</body>
