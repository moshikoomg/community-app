<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>צנצנת ההרגלים שלי - שלבים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        :root {
            --bg-color: #f4f6f8;
            --jar-glass: rgba(255, 255, 255, 0.4);
            --jar-highlight: rgba(255, 255, 255, 0.9);
            --jar-shadow: rgba(0, 0, 0, 0.08);
            --primary-color: #239B62;
            --danger-color: #e86a92;
            --admin-color: #4a90e2;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Heebo', sans-serif;
            background-color: #d1d8e0;
            background-image: radial-gradient(circle at top right, #e2e8f0, #cbd5e1); 
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden;
            touch-action: manipulation;
        }

        .app-container {
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        @media (min-width: 420px) {
            .app-container {
                width: 390px; height: 844px; max-height: 90vh; 
                border-radius: 40px; 
                box-shadow: 0 30px 60px rgba(0,0,0,0.2); 
            }
            .app-container::before {
                content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
                width: 80px; height: 16px; background-color: rgba(0,0,0,0.04);
                border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; z-index: 1000;
            }
        }

        /* --- פרופיל --- */
        .profile-header {
            position: absolute; top: 15px; right: 15px;
            z-index: 50; display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.7); padding: 4px 10px 4px 4px;
            border-radius: 20px; backdrop-filter: blur(10px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8);
            cursor: pointer; transition: transform 0.2s;
        }
        .profile-header:active { transform: scale(0.95); }
        .profile-avatar {
            width: 20px; height: 20px; border-radius: 50%;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex; justify-content: center; align-items: center; color: #555;
        }
        .profile-name { font-size: 11px; font-weight: 800; color: #444; }

        /* --- מחוון שלבים ויום --- */
        .stage-info-container {
            position: absolute; top: 50px; left: 0; width: 100%;
            text-align: center; z-index: 5; pointer-events: none;
        }
        .stage-label { font-size: 14px; font-weight: 800; color: #777; letter-spacing: 1px; text-transform: uppercase; }
        .bg-day-indicator {
            font-size: 80px; font-weight: 800; color: rgba(0, 0, 0, 0.04);
            user-select: none; letter-spacing: -2px; margin-top: -10px;
        }

        .top-section { flex: 1; position: relative; width: 100%; height: 100%; overflow: hidden; }

        /* --- סליידר צנצנות - מרכוז מדויק --- */
        .jars-slider {
            display: flex; width: 100%; height: 100%; overflow-x: auto;
            scroll-snap-type: x mandatory; align-items: center; scrollbar-width: none;
            direction: ltr; scroll-behavior: smooth;
        }
        .jars-slider::-webkit-scrollbar { display: none; }

        .jar-slide { 
            flex: 0 0 95%; /* 95% רוחב כדי להשאיר 5% הצצה מימין */
            height: 100%; display: flex; justify-content: center; 
            align-items: center; scroll-snap-align: center; position: relative; 
            box-sizing: border-box; padding-bottom: 180px;
            transition: opacity 0.5s;
            background-size: cover;
            background-position: center;
        }
        
        .jar-slide::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.8) 100%);
            z-index: 1; pointer-events: none;
        }
        
        .jar-slide.locked { filter: grayscale(100%); opacity: 0.4; }
        .jar-wrapper { position: relative; width: 340px; height: 480px; direction: rtl; z-index: 2; }

        canvas#physics-canvas { position: absolute; top: 0; left: 0; z-index: 10; touch-action: none; }

        /* --- עיצוב משופר לצנצנת ולמכסה --- */
        .jar-glass-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        
        .jar-neck {
            position: absolute; top: 50px; left: 100px; width: 140px; height: 50px;
            border-radius: 12px 12px 0 0;
            background: linear-gradient(to right, 
                rgba(255,255,255,0.4) 0%, 
                rgba(255,255,255,0.1) 20%, 
                rgba(255,255,255,0.1) 80%, 
                rgba(255,255,255,0.4) 100%);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.3);
            z-index: 19;
        }
        
        /* מכסה עם הצללות משופרות */
        .jar-cap-detail {
            position: absolute; top: 38px; left: 88px; width: 164px; height: 18px;
            background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 40%, #dcdcdc 100%);
            border-radius: 10px;
            z-index: 23;
            box-shadow: 
                0 4px 8px rgba(0,0,0,0.15), 
                inset 0 -3px 4px rgba(0,0,0,0.1),
                inset 0 2px 2px rgba(255,255,255,0.8);
            border-bottom: 1px solid #bbb;
        }

        .jar-body {
            position: absolute; top: 90px; left: 30px; width: 280px; height: 340px;
            border-radius: 70px 70px 60px 60px;
            box-shadow: 
                inset 15px 0 35px rgba(255,255,255,0.6), 
                inset -15px -15px 35px var(--jar-shadow),
                0 15px 45px rgba(0,0,0,0.08); 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .jar-opening {
            position: absolute; top: 44px; left: 95px; width: 150px; height: 20px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4); 
            z-index: 22;
            box-shadow: 
                inset 0 4px 10px rgba(0,0,0,0.1),
                0 2px 4px rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* --- המגירה --- */
        .bottom-section {
            background: #FDFBF7; border-radius: 30px 30px 0 0; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.08); 
            z-index: 100; display: flex; flex-direction: column; align-items: center; 
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 210px; box-sizing: border-box;
            transition: height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        .bottom-section.edit-mode { height: 380px; }
        .bottom-section::before {
            content: ''; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 4px; background-color: #E2DFD9; border-radius: 4px;
        }

        .drawer-view { width: 100%; display: none; flex-direction: column; align-items: center; flex: 1; }
        .drawer-view.active { display: flex; }

        .edit-btn { position: absolute; top: 22px; right: 22px; color: #D0D0D0; cursor: pointer; padding: 5px; z-index: 15; transition: color 0.2s; }
        .edit-btn:hover { color: #A0A0A0; }

        .picker-top { display: flex; flex-direction: column; align-items: center; user-select: none; margin-top: -38px; min-height: 90px; }
        .active-icon-bg {
            width: 76px; height: 76px; background: #FDFBF7; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; position: relative; z-index: 1; 
        }
        .active-icon-bg::before { content: ''; position: absolute; bottom: 37px; left: -12px; width: 14px; height: 12px; background: radial-gradient(circle at 0% 0%, transparent 11.5px, #FDFBF7 12px); z-index: -1; }
        .active-icon-bg::after { content: ''; position: absolute; bottom: 37px; right: -12px; width: 14px; height: 12px; background: radial-gradient(circle at 100% 0%, transparent 11.5px, #FDFBF7 12px); z-index: -1; }

        #marble-drop-zone { width: 55px; height: 55px; pointer-events: none; }
        
        #floating-marble {
            position: absolute; z-index: 1000; cursor: grab; touch-action: none; transform-origin: center center;
            transition: none; 
            pointer-events: auto;
        }
        #floating-marble.dragging { cursor: grabbing; }

        .habit-time { color: #999; font-size: 14px; font-weight: 600; margin-top: -2px; margin-bottom: 5px; }

        .habit-scroller-mask {
            width: 100%; overflow: hidden; position: relative;
            mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
        }
        .habit-scroller { display: flex; align-items: center; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; padding-bottom: 5px; }
        .habit-scroller::-webkit-scrollbar { display: none; }
        .habit-scroller::before, .habit-scroller::after { content: ''; flex: 0 0 calc(50% - 40px); }
        .habit-item { flex: 0 0 auto; scroll-snap-align: center; padding: 10px 20px; font-size: 20px; color: #B0B0B0; font-weight: 600; transition: 0.2s; cursor: pointer; white-space: nowrap; }
        .habit-item.active { font-size: 32px; color: #111; font-weight: 800; }

        .picker-dots { display: flex; gap: 8px; margin-top: 5px; align-items: center; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
        .dot.active { width: 22px; background: #333; border-radius: 4px; }

        /* --- עריכה --- */
        .drawer-edit-content { width: 100%; padding: 25px; box-sizing: border-box; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 600; color: #666; font-size: 14px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; font-family: inherit; box-sizing: border-box; background: #fff; }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-primary, .btn-secondary, .btn-danger { flex: 1; padding: 12px; border-radius: 12px; font-size: 15px; font-weight: 800; border: none; cursor: pointer; transition: 0.1s; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: #E2DFD9; color: #444; }
        .btn-danger { background: var(--danger-color); color: white; width: 100%; margin-top: 10px; }

        /* --- פופ-אפ פרופיל וניהול --- */
        .popup-backdrop {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .popup-backdrop.active { opacity: 1; pointer-events: all; }
        .popup-content {
            background: #FDFBF7; width: 88%; max-width: 340px; border-radius: 28px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25); transform: scale(0.9); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative;
            max-height: 80vh; overflow-y: auto;
        }
        .popup-backdrop.active .popup-content { transform: scale(1); }
        .close-popup-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.05); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold;}
        
        .admin-section {
            border-top: 1px solid #eee; margin-top: 20px; padding-top: 20px; display: none;
        }
        .admin-section.visible { display: block; }
        .admin-badge { background: var(--admin-color); color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 800; vertical-align: middle; margin-right: 5px; }

        .stats-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- פרופיל -->
        <div class="profile-header" onclick="openProfilePopup()">
            <div class="profile-name" id="display-profile-name">הפרופיל שלי</div>
            <div class="profile-avatar"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
        </div>

        <div class="top-section" id="clickable-top-section">
            <div class="stage-info-container">
                <div id="stage-label" class="stage-label">שלב 1</div>
                <div id="bg-day-indicator" class="bg-day-indicator">1 / 5</div>
            </div>
            
            <div class="jars-slider" id="jars-slider"></div>
            <canvas id="physics-canvas"></canvas>
        </div>

        <div class="bottom-section" id="bottom-drawer">
            <div id="drawer-normal-view" class="drawer-view active">
                <div class="edit-btn" onclick="openEditMode()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></div>
                <div class="picker-top">
                    <div class="active-icon-bg"><div id="marble-drop-zone"></div></div>
                    <div class="habit-time" id="picker-time"></div>
                </div>
                <div class="habit-scroller-mask"><div class="habit-scroller" id="habit-scroller"></div></div>
                <div class="picker-dots" id="picker-dots"></div>
            </div>

            <div id="drawer-edit-view" class="drawer-view">
                <div class="drawer-edit-content">
                    <div style="font-size: 18px; font-weight: 800; margin-bottom: 15px; text-align: center;">עריכת הרגל</div>
                    <div style="display:flex; gap:10px;">
                        <div class="form-group" style="flex:2;"><label>שם</label><input type="text" id="input-habit-name" class="form-control"></div>
                        <div class="form-group" style="flex:1;"><label>צבע</label><input type="color" id="input-habit-color" class="form-control" style="height:45px; padding:2px;"></div>
                    </div>
                    <div class="form-group"><label>יעד</label><input type="text" id="input-habit-time" class="form-control"></div>
                    <div class="btn-row"><button class="btn-primary" onclick="saveHabitChanges()">שמור</button><button class="btn-secondary" onclick="closeEditMode()">ביטול</button></div>
                    <button class="btn-danger" onclick="deleteCurrentHabit()">מחק</button>
                </div>
            </div>
        </div>

        <canvas id="floating-marble" width="55" height="55"></canvas>

        <div class="popup-backdrop" id="profile-popup" onclick="handleBackdropClick(event, 'profile-popup')">
            <div class="popup-content">
                <button class="close-popup-btn" onclick="closeProfilePopup()">✕</button>
                <div style="font-size:22px; font-weight:800; margin-bottom:15px;">החשבון שלי <span id="admin-badge" class="admin-badge" style="display:none;">ADMIN</span></div>
                
                <div class="stats-grid">
                    <div class="stat-box"><span style="display:block; font-size:20px; font-weight:800; color:var(--primary-color);" id="stat-days-active">1</span><span style="font-size:11px; color:#999;">ימים</span></div>
                    <div class="stat-box"><span style="display:block; font-size:20px; font-weight:800; color:var(--primary-color);" id="stat-total-habits">0</span><span style="font-size:11px; color:#999;">גולות</span></div>
                </div>

                <div class="form-group"><label>אימייל (לגישת ניהול)</label><input type="email" id="input-profile-email" class="form-control" value="user@example.com" onchange="checkAdminStatus()"></div>
                <div class="form-group"><label>שם תצוגה</label><input type="text" id="input-profile-name" class="form-control" value="הפרופיל שלי" onkeyup="updateProfileName(this.value)"></div>
                
                <div id="admin-panel" class="admin-section">
                    <div style="font-size:16px; font-weight:800; margin-bottom:10px; color:var(--admin-color);">הגדרות רקע לשלבים</div>
                    <div class="form-group">
                        <label id="admin-stage-label">רקע לשלב הנוכחי (1)</label>
                        <input type="text" id="input-stage-bg" class="form-control" placeholder="הכנס URL של תמונה..." onchange="updateStageBackground()">
                    </div>
                </div>

                <div style="margin-top:20px; text-align:center; color:#999; font-size:12px; cursor:pointer;" onclick="location.reload()">🚪 התנתקות</div>
            </div>
        </div>
    </div>

    <script>
        const STAGE_GAP = 21;
        const TOTAL_DISPLAY_DAYS = 63; 
        const ADMIN_EMAIL = "mosheally@gmail.com";

        let unlockedDays = 1, currentDayView = 0, currentHabitIndex = 1;
        let habitsData = [
            { id: 1, name: 'לנשום', time: '10 דקות', color: '#42b6c7' },
            { id: 2, name: 'לרוץ', time: '5 דקות', color: '#e86a92' },
            { id: 3, name: 'לשחק', time: '15 דקות', color: '#f3c13a' },
            { id: 4, name: 'לקרוא', time: '20 דקות', color: '#7bc043' },
            { id: 5, name: 'לשתות', time: '1 כוס', color: '#8e44ad' }
        ];

        let stageBackgrounds = JSON.parse(localStorage.getItem('stage_bgs')) || {};

        function getStageInfo(day) {
            day = day + 1; 
            if (day <= 5) return { stage: 1, maxDays: 5, start: 1 };
            if (day <= 10) return { stage: 2, maxDays: 10, start: 6 };
            if (day <= 21) return { stage: 3, maxDays: 21, start: 11 };
            
            let base = 21;
            let stageCount = 3;
            while (day > base) {
                base += STAGE_GAP;
                stageCount++;
                if (day <= base) break;
            }
            return { stage: stageCount, maxDays: base, start: base - STAGE_GAP + 1 };
        }

        const userStats = { daysData: [] };
        function initStats(idx) {
            if(!userStats.daysData[idx]) userStats.daysData[idx] = { habits: {}, balls: [] };
            habitsData.forEach(h => { if(!userStats.daysData[idx].habits[h.id]) userStats.daysData[idx].habits[h.id] = { min: 0, breakthrough: 0 }; });
        }
        for(let i=0; i<TOTAL_DISPLAY_DAYS; i++) initStats(i);

        const slider = document.getElementById('jars-slider');
        function buildJars() {
            slider.innerHTML = '';
            for(let i=0; i<TOTAL_DISPLAY_DAYS; i++) {
                const info = getStageInfo(i);
                const slide = document.createElement('div');
                slide.className = `jar-slide ${i >= unlockedDays ? 'locked' : ''}`;
                slide.dataset.index = i;
                
                if (stageBackgrounds[info.stage]) {
                    slide.style.backgroundImage = `url('${stageBackgrounds[info.stage]}')`;
                }

                slide.innerHTML = `
                    <div class="jar-wrapper" id="jar-wrapper-${i}">
                        <div class="jar-glass-overlay">
                            <div class="jar-cap-detail"></div>
                            <div class="jar-opening"></div>
                            <div class="jar-neck"></div>
                            <div class="jar-body"></div>
                        </div>
                    </div>`;
                slider.appendChild(slide);
            }
        }
        buildJars();

        const { Engine, Bodies, Composite, Mouse, MouseConstraint } = Matter;
        const engine = Engine.create(), world = engine.world;
        let currentBalls = [];
        const canvas = document.getElementById('physics-canvas'), ctx = canvas.getContext('2d');
        canvas.width = 340; canvas.height = 480;

        const wallOptions = { isStatic: true, friction: 0.1, restitution: 0.3 };
        Composite.add(world, [
            Bodies.rectangle(170, 420, 200, 40, wallOptions),
            Bodies.rectangle(75, 400, 80, 40, { ...wallOptions, angle: Math.PI / 5 }),
            Bodies.rectangle(265, 400, 80, 40, { ...wallOptions, angle: -Math.PI / 5 }),
            Bodies.rectangle(35, 260, 20, 240, wallOptions),
            Bodies.rectangle(305, 260, 20, 240, wallOptions),
            Bodies.rectangle(70, 115, 80, 20, { ...wallOptions, angle: -Math.PI / 4.5 }),
            Bodies.rectangle(270, 115, 80, 20, { ...wallOptions, angle: Math.PI / 4.5 }),
            Bodies.rectangle(105, 70, 20, 60, wallOptions),
            Bodies.rectangle(235, 70, 20, 60, wallOptions)
        ]);
        Composite.add(world, MouseConstraint.create(engine, { mouse: Mouse.create(canvas), constraint: { stiffness: 0.2, render: { visible: false } } }));
        document.getElementById('jar-wrapper-0').insertBefore(canvas, document.getElementById('jar-wrapper-0').firstChild);

        const scroller = document.getElementById('habit-scroller');
        function initScroller() {
            scroller.innerHTML = '';
            habitsData.forEach((h, i) => { 
                const el = document.createElement('div'); 
                el.className = 'habit-item'; el.innerText = h.name; 
                el.onclick = () => el.scrollIntoView({ behavior: 'smooth', inline: 'center' }); 
                scroller.appendChild(el); 
            });
            renderDots();
        }

        function renderDots() {
            const dotsContainer = document.getElementById('picker-dots');
            if(!dotsContainer) return;
            dotsContainer.innerHTML = '';
            habitsData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `dot ${index === currentHabitIndex ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });
        }
        initScroller();

        function updateStatsUI() {
            if(!habitsData[currentHabitIndex]) return;
            const h = habitsData[currentHabitIndex], stats = userStats.daysData[currentDayView].habits[h.id];
            const timeEl = document.getElementById('picker-time');
            if(stats && stats.min > 0) {
                timeEl.innerText = '+' + h.time; timeEl.style.color = h.color;
            } else { timeEl.innerText = h.time; timeEl.style.color = '#999'; }
        }

        function renderActiveHabit() {
            const h = habitsData[currentHabitIndex];
            if(!h) return;
            const fm = document.getElementById('floating-marble');
            document.querySelectorAll('.habit-item').forEach((it, i) => it.classList.toggle('active', i === currentHabitIndex));
            
            const uctx = fm.getContext('2d'); 
            uctx.clearRect(0,0,55,55); 
            drawMarble(uctx, 27.5, 27.5, 24, 0, h.color);
            
            if(fm.style.display !== 'none' && !isAnimatingJump) {
                fm.style.display = 'block';
                fm.style.opacity = '1';
                fm.style.transform = 'scale(1)';
                fm.style.filter = `drop-shadow(0 0 15px ${h.color}88) drop-shadow(0 6px 12px rgba(0,0,0,0.15))`;
                updateFloatingPosition();
            }
            updateStatsUI(); 
            renderDots();
        }

        let lastIdx = -1;
        scroller.addEventListener('scroll', () => {
            const center = scroller.getBoundingClientRect().left + scroller.offsetWidth/2;
            let closest = -1, min = Infinity;
            document.querySelectorAll('.habit-item').forEach((it, i) => { const d = Math.abs(center - (it.getBoundingClientRect().left + it.offsetWidth/2)); if(d < min){ min = d; closest = i; } });
            if(closest !== -1 && closest !== lastIdx) { lastIdx = closest; currentHabitIndex = closest; popMarble(); if(navigator.vibrate) navigator.vibrate(10); }
        });

        function popMarble() {
            const fm = document.getElementById('floating-marble');
            if(fm.style.display === 'none' || isAnimatingJump) return;
            fm.style.transition = 'none';
            fm.style.transform = 'scale(0.1) rotate(-45deg)';
            fm.style.opacity = '0';
            requestAnimationFrame(() => {
                renderActiveHabit(); 
                fm.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.8, 0.64, 1), opacity 0.3s'; 
                fm.style.transform = 'scale(1) rotate(0deg)'; 
                fm.style.opacity = '1';
            });
        }

        function moveCanvas(idx) {
            if(currentDayView === idx) return;
            const wrap = document.getElementById(`jar-wrapper-${idx}`);
            if(wrap) wrap.insertBefore(canvas, wrap.firstChild);
            userStats.daysData[currentDayView].balls = [...currentBalls];
            currentBalls.forEach(b => Composite.remove(world, b));
            currentBalls = userStats.daysData[idx].balls || [];
            currentBalls.forEach(b => Composite.add(world, b));
            currentDayView = idx;

            const info = getStageInfo(idx);
            document.getElementById('stage-label').innerText = `שלב ${info.stage}`;
            document.getElementById('bg-day-indicator').innerText = `${idx + 1} / ${info.maxDays}`;
            
            updateStatsUI();
        }

        const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) moveCanvas(parseInt(e.target.dataset.index)); }), { threshold:0.6, root:slider });
        function reobserve() { document.querySelectorAll('.jar-slide').forEach(s => obs.observe(s)); }
        reobserve();

        function advanceDay() { if(unlockedDays < TOTAL_DISPLAY_DAYS){ unlockedDays++; buildJars(); reobserve(); const s = document.querySelector(`.jar-slide[data-index="${unlockedDays-1}"]`); s.scrollIntoView({ behavior:'smooth', inline:'center'}); } }

        function updateFloatingPosition() {
            const dz = document.getElementById('marble-drop-zone'), cont = document.querySelector('.app-container'), fm = document.getElementById('floating-marble');
            if(!dz || !cont || !fm || fm.style.display === 'none' || isAnimatingJump) return;
            const r = dz.getBoundingClientRect(), cr = cont.getBoundingClientRect();
            fm.style.left = (r.left - cr.left - cont.clientLeft + r.width/2 - 27.5) + 'px';
            fm.style.top = (r.top - cr.top - cont.clientTop + r.height/2 - 27.5) + 'px';
        }
        window.addEventListener('resize', updateFloatingPosition);

        document.getElementById('clickable-top-section').addEventListener('click', (e) => { 
            if(e.target.id === 'clickable-top-section' && document.getElementById('drawer-edit-view').classList.contains('active')) closeEditMode(); 
        });
        
        function handleBackdropClick(e, id) { if(e.target.id === id) closeModal(id); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function checkAdminStatus() {
            const email = document.getElementById('input-profile-email').value.trim();
            const isAdmin = email === ADMIN_EMAIL;
            document.getElementById('admin-panel').classList.toggle('visible', isAdmin);
            document.getElementById('admin-badge').style.display = isAdmin ? 'inline-block' : 'none';
            
            if (isAdmin) {
                const info = getStageInfo(currentDayView);
                document.getElementById('admin-stage-label').innerText = `רקע לשלב הנוכחי (${info.stage})`;
                document.getElementById('input-stage-bg').value = stageBackgrounds[info.stage] || '';
            }
        }

        function updateStageBackground() {
            const info = getStageInfo(currentDayView);
            const url = document.getElementById('input-stage-bg').value.trim();
            if (url) stageBackgrounds[info.stage] = url;
            else delete stageBackgrounds[info.stage];
            
            localStorage.setItem('stage_bgs', JSON.stringify(stageBackgrounds));
            buildJars(); 
            reobserve();
        }

        function openProfilePopup() {
            document.getElementById('stat-days-active').innerText = unlockedDays;
            let totalBalls = 0; 
            userStats.daysData.forEach(d => totalBalls += d.balls.length);
            document.getElementById('stat-total-habits').innerText = totalBalls;
            checkAdminStatus();
            document.getElementById('profile-popup').classList.add('active');
        }
        function closeProfilePopup() { closeModal('profile-popup'); }
        function updateProfileName(v) { document.getElementById('display-profile-name').innerText = v.trim() || "הפרופיל שלי"; }

        function openEditMode() {
            const h = habitsData[currentHabitIndex]; if(!h) return;
            document.getElementById('input-habit-name').value = h.name;
            document.getElementById('input-habit-time').value = h.time;
            document.getElementById('input-habit-color').value = h.color;
            document.getElementById('bottom-drawer').classList.add('edit-mode');
            document.getElementById('drawer-normal-view').classList.remove('active');
            document.getElementById('drawer-edit-view').classList.add('active');
            document.getElementById('floating-marble').style.display = 'none';
        }

        function closeEditMode() {
            document.getElementById('bottom-drawer').classList.remove('edit-mode');
            document.getElementById('drawer-edit-view').classList.remove('active');
            document.getElementById('drawer-normal-view').classList.add('active');
            
            const originalIndex = currentHabitIndex;
            const items = document.querySelectorAll('.habit-item');
            setTimeout(() => {
                document.getElementById('floating-marble').style.display = 'block';
                if (items[originalIndex]) {
                    items[originalIndex].scrollIntoView({ behavior: 'auto', inline: 'center' });
                    popMarble();
                }
            }, 10);
        }

        function saveHabitChanges() {
            const h = habitsData[currentHabitIndex];
            h.name = document.getElementById('input-habit-name').value.trim() || h.name;
            h.time = document.getElementById('input-habit-time').value.trim() || h.time;
            h.color = document.getElementById('input-habit-color').value;
            closeEditMode(); initScroller();
        }

        function deleteCurrentHabit() {
            if(habitsData.length <= 1) return;
            if(confirm("למחוק?")){ habitsData.splice(currentHabitIndex, 1); currentHabitIndex = 0; closeEditMode(); initScroller(); }
        }

        const fm = document.getElementById('floating-marble');
        let isDrag = false, sx, sy, tx=0, ty=0, isAnimatingJump = false;

        function performNaturalJump() {
            if (isAnimatingJump) return;
            isAnimatingJump = true;
            const container = document.querySelector('.app-container');
            const contRect = container.getBoundingClientRect();
            const targetX = contRect.width / 2;
            const targetY = 80; 
            const currentPosLeft = parseFloat(fm.style.left) + 27.5;
            const currentPosTop = parseFloat(fm.style.top) + 27.5;
            const duration = 650; 
            const startTime = performance.now();
            fm.style.transition = 'transform 0.1s ease-in';
            fm.style.transform = 'scale(0.85, 1.1) translateY(10px)';
            
            setTimeout(() => {
                fm.style.transition = 'none'; 
                function animate(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const curX = currentPosLeft + (targetX - currentPosLeft) * progress;
                    const jumpHeight = 160;
                    const curY = currentPosTop + (targetY - currentPosTop) * progress - Math.sin(progress * Math.PI) * jumpHeight;
                    const scale = 1 + Math.sin(progress * Math.PI) * 0.4;
                    const rot = progress * 120;
                    fm.style.left = (curX - 27.5) + 'px';
                    fm.style.top = (curY - 27.5) + 'px';
                    fm.style.transform = `scale(${scale}) rotate(${rot}deg)`;
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        dropBall(170, 50); 
                        fm.style.opacity = '0';
                        isAnimatingJump = false;
                        setTimeout(() => { fm.style.transform = 'scale(0)'; popMarble(); }, 200);
                    }
                }
                requestAnimationFrame(animate);
            }, 100);
        }

        fm.addEventListener('pointerdown', e => { if(document.getElementById('drawer-edit-view').classList.contains('active') || isAnimatingJump) return; isDrag=true; fm.classList.add('dragging'); sx=e.clientX; sy=e.clientY; tx=0; ty=0; fm.setPointerCapture(e.pointerId); });
        fm.addEventListener('pointermove', e => { if(!isDrag) return; tx=e.clientX-sx; ty=e.clientY-sy; fm.style.transform=`translate(${tx}px, ${ty}px) scale(1.1)`; });
        fm.addEventListener('pointerup', e => {
            if(!isDrag) return; isDrag=false; fm.classList.remove('dragging'); fm.releasePointerCapture(e.pointerId);
            const dist = Math.sqrt(tx*tx+ty*ty);
            if(dist < 10) { performNaturalJump(); } 
            else {
                const jr = document.getElementById(`jar-wrapper-${currentDayView}`).getBoundingClientRect();
                const r = fm.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
                if(cx > jr.left-20 && cx < jr.right+20 && cy > jr.top-80 && cy < jr.bottom){
                    const cr = canvas.getBoundingClientRect(); 
                    if(dropBall(cx-cr.left, cy-cr.top)){ 
                        fm.style.transition='none'; fm.style.opacity='0'; fm.style.transform='scale(0)'; 
                        setTimeout(popMarble, 500); 
                    } else fm.style.transform='scale(1)';
                } else { 
                    fm.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)'; 
                    fm.style.transform='translate(0,0) scale(1)'; 
                }
            }
        });

        function dropBall(x=170+(Math.random()*40-20), y=-30) {
            if(currentDayView >= unlockedDays || !habitsData[currentHabitIndex]) return false;
            const h = habitsData[currentHabitIndex], stats = userStats.daysData[currentDayView].habits[h.id];
            if(stats.min===0) stats.min=1; else stats.breakthrough++; updateStatsUI();
            const b = Bodies.circle(x, y, 22, { restitution:0.6, friction:0.05, density:0.04, label:'habit-ball', render:{fillStyle:h.color} });
            currentBalls.push(b); Composite.add(world, b); return true;
        }

        function drawMarble(c, x, y, r, a, col) {
            c.save(); c.translate(x, y); c.rotate(a);
            c.beginPath(); c.arc(0,0,r,0,Math.PI*2);
            let g = c.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r); 
            g.addColorStop(0,'rgba(255,255,255,0.95)'); 
            g.addColorStop(0.5,'rgba(240,240,240,0.8)'); 
            g.addColorStop(1,'rgba(180,180,180,0.5)');
            c.fillStyle=g; c.fill();
            c.save(); c.globalAlpha=0.85; c.beginPath(); c.moveTo(0,r*0.7); 
            c.quadraticCurveTo(r*0.6,0,0,-r*0.6); c.quadraticCurveTo(-r*0.3,0,0,r*0.7); 
            c.fillStyle=col; c.fill(); c.restore();
            c.lineWidth=1; c.strokeStyle='rgba(255,255,255,0.6)'; c.stroke();
            c.beginPath(); c.arc(-r*0.3,-r*0.3,r*0.2,0,Math.PI*2); 
            c.fillStyle='rgba(255,255,255,0.7)'; c.fill(); c.restore();
        }

        function loop() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            Composite.allBodies(world).forEach(b => { 
                if(b.label==='habit-ball') drawMarble(ctx, b.position.x, b.position.y, b.circleRadius, b.angle, b.render.fillStyle); 
            });
            Engine.update(engine, 1000/60); requestAnimationFrame(loop);
        }
        loop(); 
        
        setTimeout(() => { 
            scroller.scrollTo({left:0}); 
            lastIdx=1; 
            renderActiveHabit(); 
            const info = getStageInfo(0);
            document.getElementById('stage-label').innerText = `שלב ${info.stage}`;
            document.getElementById('bg-day-indicator').innerText = `1 / ${info.maxDays}`;
        }, 100);
    </script>
</body>
</html>
