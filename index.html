<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אפליקציית קהילה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:'Segoe UI',system-ui,sans-serif}
    .card{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15)}
    .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);transition:all .2s}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(102,126,234,0.4)}
    .btn-danger{background:linear-gradient(135deg,#f093fb,#f5576c);transition:all .2s}
    .btn-green{background:linear-gradient(135deg,#11998e,#38ef7d);transition:all .2s}
    .entry-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);transition:all .2s}
    .entry-card:hover{background:rgba(255,255,255,0.1);transform:translateX(-4px)}
  </style>
</head>
<body class="bg-gray-950 min-h-screen text-white">
  <div class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center text-lg">&#127968;</div>
      <div>
        <h1 class="font-bold text-lg leading-none">Community App</h1>
        <p class="text-xs text-gray-400">פלטפורמה קהילתית מאובטחת</p>
      </div>
    </div>
    <div id="header-user" class="hidden flex items-center gap-3">
      <p id="header-email" class="text-sm font-medium"></p>
      <button id="signout-btn" class="btn-danger text-white text-sm px-4 py-2 rounded-xl font-medium">יציאה</button>
    </div>
  </div>

  <div class="max-w-2xl mx-auto p-6 space-y-6">
    <div id="auth-section">
      <div class="card rounded-2xl p-8 space-y-5">
        <div class="text-center mb-6">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-500 to-blue-600 flex items-center justify-center text-3xl mx-auto mb-3">&#128274;</div>
          <h2 class="text-2xl font-bold">ברוכים הבאים</h2>
          <p class="text-gray-400 text-sm mt-1">התחברו כדי להמשיך</p>
        </div>
        <input id="email" type="email" placeholder="כתובת אימייל" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition">
        <input id="password" type="password" placeholder="סיסמה (מינימום 6 תווים)" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition">
        <div id="auth-error" class="hidden text-red-400 text-sm bg-red-900/30 border border-red-800 rounded-xl p-3"></div>
        <div class="grid grid-cols-2 gap-3">
          <button id="signin-btn" class="btn-primary text-white py-3 rounded-xl font-semibold">התחבר</button>
          <button id="signup-btn" class="btn-green text-white py-3 rounded-xl font-semibold">הרשם</button>
        </div>
      </div>
    </div>

    <div id="app-section" class="hidden space-y-6">
      <div class="card rounded-2xl p-6 space-y-4">
        <h2 class="font-bold text-lg">&#9997;&#65039; הוסף רשומה חדשה</h2>
        <textarea id="content" placeholder="מה תרצה לשמור? כתוב כאן..." rows="4" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition resize-none"></textarea>
        <button id="submit-btn" class="btn-primary w-full text-white py-3 rounded-xl font-semibold">&#128640; שמור רשומה</button>
      </div>
      <div class="card rounded-2xl p-6">
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-bold text-lg">&#128197; ההיסטוריה שלך</h2>
          <span id="count-badge" class="bg-purple-600 text-white text-xs px-3 py-1 rounded-full font-medium">0 רשומות</span>
        </div>
        <div id="history-items" class="space-y-3 max-h-96 overflow-y-auto">
          <div class="text-center text-gray-500 py-8"><p>אין רשומות עדיין. הוסף את הראשונה!</p></div>
        </div>
      </div>
    </div>

    <div id="loading" class="text-center py-16">
      <div class="inline-block w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-gray-400 mt-3 text-sm">מתחבר לשרת...</p>
    </div>
  </div>

<script>
  const SUPABASE_URL = 'https://igpzawemolsajreiuxck.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlncHphd2Vtb2xzYWpyZWl1eGNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTE3MTIsImV4cCI6MjA5MTEyNzcxMn0.b3Q1nlHddqAgg8AJS4gV73USVvujno0-HRpLFPny7Ww';
  const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = id => document.getElementById(id);

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    $('loading').classList.add('hidden');
    if (session) { showApp(session.user); } else { $('auth-section').classList.remove('hidden'); }
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN') { $('auth-section').classList.add('hidden'); showApp(session.user); }
      if (event === 'SIGNED_OUT') { $('app-section').classList.add('hidden'); $('header-user').classList.add('hidden'); $('auth-section').classList.remove('hidden'); }
    });
  }

  function showApp(user) {
    $('app-section').classList.remove('hidden');
    $('header-user').classList.remove('hidden');
    $('header-email').textContent = user.email;
    loadHistory();
    subscribeRealtime();
  }

  $('signup-btn').addEventListener('click', async () => {
    const email = $('email').value.trim();
    const password = $('password').value;
    $('auth-error').classList.add('hidden');
    const { error } = await supabase.auth.signUp({ email, password });
    if (error) { $('auth-error').textContent = error.message; $('auth-error').classList.remove('hidden'); }
    else { $('auth-error').style.color='#34d399'; $('auth-error').textContent = 'נשלח אימייל אימות - בדוק את תיבת הדואר!'; $('auth-error').classList.remove('hidden'); }
  });

  $('signin-btn').addEventListener('click', async () => {
    const email = $('email').value.trim();
    const password = $('password').value;
    $('auth-error').classList.add('hidden');
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { $('auth-error').textContent = error.message; $('auth-error').classList.remove('hidden'); }
  });

  $('signout-btn').addEventListener('click', () => supabase.auth.signOut());

  $('submit-btn').addEventListener('click', async () => {
    const content = $('content').value.trim();
    if (!content) return;
    $('submit-btn').disabled = true;
    $('submit-btn').textContent = 'שומר...';
    const { error } = await supabase.from('history').insert({ content });
    $('submit-btn').disabled = false;
    $('submit-btn').textContent = 'שמור רשומה';
    if (error) alert('שגיאה: ' + error.message);
    else $('content').value = '';
  });

  async function loadHistory() {
    const { data } = await supabase.from('history').select('*').order('created_at', { ascending: false });
    const items = data || [];
    $('count-badge').textContent = items.length + ' רשומות';
    if (items.length === 0) {
      $('history-items').innerHTML = '<div class="text-center text-gray-500 py-8"><p>אין רשומות עדיין.</p></div>';
      return;
    }
    $('history-items').innerHTML = items.map(item => `
      <div class="entry-card rounded-xl p-4">
        <p class="text-white text-sm leading-relaxed">${item.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
        <div class="flex items-center justify-between mt-3">
          <span class="text-xs text-gray-500">${new Date(item.created_at).toLocaleString('he-IL')}</span>
          <button onclick="deleteEntry('${item.id}')" class="text-xs text-red-400 hover:text-red-300 transition">מחק</button>
        </div>
      </div>
    `).join('');
  }

  async function deleteEntry(id) {
    if (!confirm('למחוק רשומה זו?')) return;
    await supabase.from('history').delete().eq('id', id);
    loadHistory();
  }

  function subscribeRealtime() {
    supabase.channel('history-ch').on('postgres_changes',
      { event: '*', schema: 'public', table: 'history' },
      () => loadHistory()
    ).subscribe();
  }

  init();
</script>
</body>
</html>
