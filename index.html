    body { margin: 0; padding: 0; background-color: #F0F2F5; font-family: 'Rubik', system-ui, -apple-system, sans-serif; }

    .animate-badge-current { animation: badge-float-scale 2.5s ease-in-out infinite; }
    
    @keyframes halo-oppose-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0.15; }
      50% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
    }
    .animate-halo-current { animation: halo-oppose-pulse 2.5s ease-in-out infinite; }

    @keyframes pop-in {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes spark {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(1.5) translateY(-20px) rotate(45deg); opacity: 0; }
    }
    .sparkle { position: absolute; width: 6px; height: 6px; border-radius: 50%; opacity: 0; z-index: 20; pointer-events: none; }
    .sparkle-1 { background: #FFCC00; animation: spark 0.6s ease-out forwards; top: 10px; right: 10px; }
    .sparkle-2 { background: #007AFF; animation: spark 0.6s ease-out forwards 0.1s; bottom: 10px; left: 10px; }
    .sparkle-3 { background: #34C759; animation: spark 0.6s ease-out forwards 0.2s; top: 20px; left: 20px; }

    const ALL_DAYS = Array.from({ length: 35 }, (_, i) => {
      const date = i + 1;
      const labels = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];
      const status = date < CURRENT_DAY ? 'past' : (date === CURRENT_DAY ? 'today' : 'future');
      let completionLevel = 'none';
      if (status === 'past') {
        if (date % 4 === 0) completionLevel = 'all_extra';
        else if (date % 3 === 0) completionLevel = 'some_extra';
        else if (date % 2 === 0) completionLevel = 'all_done';
        else completionLevel = 'partial';
      }
      return { date, label: labels[(date - 1) % 7], status, isToday: date === CURRENT_DAY, isTarget: date === TARGET_DAY, completionLevel };
    });

    const HEADER_TABS = [

    function App() {
      const [session, setSession] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [isGuest, setIsGuest] = useState(false); 
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [syncStatus, setSyncStatus] = useState('synced');
      
      const [headerView, setHeaderView] = useState('daily'); 
      const [habitsStatus, setHabitsStatus] = useState({});
      const [habits, setHabits] = useState(INITIAL_HABITS_DATA);
      const [isTaskDrawerOpen, setIsTaskDrawerOpen] = useState(false);
      const [editingTaskId, setEditingTaskId] = useState(null);
      
      const [animatingHabitId, setAnimatingHabitId] = useState(null);

      const calendarRef = useRef(null);
      const badgesRef = useRef(null); 
      const scrollRef = useRef(null);
      const isAutoScrolling = useRef(false);
      
      const calendarTimeoutRef = useRef(null);
      const badgesTimeoutRef = useRef(null);
      const isAnimatingRef = useRef(false);
      const isAnimatingBadgesRef = useRef(false);
      const animationFrameRef = useRef(null);
      
      const [user, setUser] = useState({ level: 1, xp: 0, shields: 0, perfectDaysStreak: 0, name: 'אורח', lastLoginDate: getTodayDate() });
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [settingsView, setSettingsView] = useState('main'); 
      const [badges, setBadges] = useState(INITIAL_BADGES);
      const [theme, setTheme] = useState({ primary: '#007AFF', gold: '#FFCC00', accent: '#FF9500', dark: '#1C1C1E', bgStart: '#F4F7F9', bgEnd: '#FFFFFF' });
      const [avatars, setAvatars] = useState({ start: null, firstAction: null, day10: null, levelUp: null });
      const [isHabitWizardOpen, setIsHabitWizardOpen] = useState(false);
      const [wizardStep, setWizardStep] = useState(1);
      const [newHabitData, setNewHabitData] = useState({ action: '', quantityValue: 1, quantityUnit: 'דקות', bestTime: '10:00' });
      const [wizardError, setWizardError] = useState('');
      const [tasks, setTasks] = useState([
          { id: '1', text: 'לקרוא 5 עמודים בספר', date: getTodayDate(), time: '09:00', notes: '', isDone: false, color: 'bg-white' },

      ]);
      const [newTaskText, setNewTaskText] = useState('');
      const [newTaskColor, setNewTaskColor] = useState('bg-white');
      const [draggedIdx, setDraggedIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);
      const [visionAnswer, setVisionAnswer] = useState('');
      const [nlpQuestionIdx, setNlpQuestionIdx] = useState(0);
      const [showCommunityPopup, setShowCommunityPopup] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [isScrolled, setIsScrolled] = useState(false);
      
      const [showVisionPopup, setShowVisionPopup] = useState(false);
      const [visionBoard, setVisionBoard] = useState({ text: '', imageUrl: null });

      const tasksListRef = useRef(null);
      const completedTasksListRef = useRef(null);

      useEffect(() => {
          if (tasksListRef.current) autoAnimate(tasksListRef.current, { duration: 300, easing: 'ease-in-out' });
          if (completedTasksListRef.current) autoAnimate(completedTasksListRef.current, { duration: 300, easing: 'ease-in-out' });
      }, [tasksListRef, completedTasksListRef]);

      const checkIsAdmin = (email) => {
          if (!email) return false;
          const e = email.toLowerCase();
          return e === 'mosheally@gmail.com' || e === 'moshally@gmail.com';
      };

      useEffect(() => {
        try {
            supabase.auth.getSession().then(({ data: { session } }) => {
              setSession(session);
              if (session) {
                  setIsAdmin(checkIsAdmin(session.user.email));
                  loadUserData(session);
              }
            });
            const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
              setSession(session);
              if (session) {
                  setIsAdmin(checkIsAdmin(session.user.email));
                  loadUserData(session);
              } else {
                  setIsAdmin(false);
              }
            });
            return () => subscription.unsubscribe();
        } catch (e) { console.error("Supabase init error:", e); }
      }, []);

      const loadGlobalAdminData = async () => {
          try {
              const { data } = await supabase.from('user_data').select('app_data').eq('user_id', 'GLOBAL_ADMIN_DATA').single();
              if (data && data.app_data) return data.app_data;
          } catch (e) { console.error("No global admin data yet", e); }
          return null;
      };

      const handleGuestLogin = async (asAdmin = false) => { 
          setIsGuest(true); 
          setIsAdmin(asAdmin);
          
          if (asAdmin) {
              const adminMock = MOCK_TEST_USERS.find(u => u.id === 'admin');
              if (adminMock) {
                  setUser(adminMock.user);
                  setHabits(adminMock.habits);
                  setTasks(adminMock.tasks);
                  setVisionBoard(adminMock.visionBoard);
              }
          }

          const globalData = await loadGlobalAdminData();
          if (globalData) {
              if (globalData.theme) setTheme(prev => ({ ...prev, ...globalData.theme }));
              // מיזוג חכם למקרה שבעבר נשמרו פחות מ-35 שלבים
              if (globalData.badges) {
                  setBadges(INITIAL_BADGES.map(b => {
                      const saved = globalData.badges.find(gb => gb.id === b.id);
                      return saved ? { ...b, characterImageUrl: saved.characterImageUrl, badgeImageUrl: saved.badgeImageUrl, imageUrl: saved.imageUrl } : b;
                  }));
              }
          }
          setIsDataLoaded(true); 
          checkNewDayAndShields(); 
      };
      
      const todayFormatted = useMemo(() => new Intl.DateTimeFormat('he-IL', { day: 'numeric', month: 'long' }).format(new Date()), []);

      const loadUserData = async (currentSession) => {
        try {
            const [userRes, globalData] = await Promise.all([
                supabase.from('user_data').select('app_data').eq('user_id', currentSession.user.id).single(),
                loadGlobalAdminData()
            ]);
            
            // תמיד דורסים עיצוב מקומי עם הנתונים העדכניים של האדמין!
            if (globalData) {
                if (globalData.theme) setTheme(prev => ({ ...prev, ...globalData.theme }));
                if (globalData.badges) {
                    setBadges(INITIAL_BADGES.map(b => {
                        const saved = globalData.badges.find(gb => gb.id === b.id);
                        return saved ? { ...b, characterImageUrl: saved.characterImageUrl, badgeImageUrl: saved.badgeImageUrl, imageUrl: saved.imageUrl } : b;
                    }));
                }
            }

            const d = userRes.data?.app_data;
            if (d) {
               if (d.habits) setHabits(d.habits);
               if (d.habitsStatus) setHabitsStatus(d.habitsStatus);
               if (d.tasks) setTasks(d.tasks);
               if (d.user) setUser({ ...user, ...d.user });
               if (d.avatars) setAvatars({ ...avatars, ...d.avatars });
               if (d.visionBoard) setVisionBoard(d.visionBoard);
               // לא לוקחים badges ו-theme מהמשתמש כדי שלא ידרוס את הגלובלי!
            } else {
               const fullName = currentSession?.user?.user_metadata?.full_name || 'משתמש';
               setUser(prev => ({ ...prev, name: fullName.split(' ')[0], xp: 0, level: 1, shields: 0, perfectDaysStreak: 0, lastLoginDate: getTodayDate() }));
            }

        } catch (e) { console.error("Error loading user data:", e); } finally { setIsDataLoaded(true); checkNewDayAndShields(); }
      };

      const checkNewDayAndShields = () => {
        const today = getTodayDate();
        setUser(prevUser => {
          if (prevUser.lastLoginDate !== today) {
            let shieldsToUse = 0;
            let currentShields = prevUser.shields || 0;
            let missedHabits = false;
            let allCompletedYesterday = true;
            
            habits.forEach(h => {
               if (habitsStatus[h.id] === 'none' || !habitsStatus[h.id]) {
                  missedHabits = true;
                  allCompletedYesterday = false;
                  if (currentShields > shieldsToUse) shieldsToUse++;
               }
            });

            let newShields = currentShields - shieldsToUse;
            let newPerfectStreak = prevUser.perfectDaysStreak || 0;

            if (allCompletedYesterday) {
               newPerfectStreak++;
               if (newPerfectStreak % 10 === 0 && newShields < 3) newShields++;
            } else {
               const missedCount = habits.filter(h => habitsStatus[h.id] === 'none' || !habitsStatus[h.id]).length;
               if (missedCount > currentShields) newPerfectStreak = 0; 
            }

            return { ...prevUser, lastLoginDate: today, shields: newShields, perfectDaysStreak: newPerfectStreak };
          }
          return prevUser;
        });
      };

      useEffect(() => {
        const interval = setInterval(checkNewDayAndShields, 60000 * 60); 
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (!isDataLoaded) return;
        // לא שומרים אם זה אורח מוחלט (שלא אדמין)
        if (!session && !isAdmin) return;

        setSyncStatus('saving');
        const timer = setTimeout(async () => {
           try {
               let hasError = false;

               // 1. שמירת נתונים אישיים של משתמש מחובר בלבד (בלי עיצוב ואייקונים!)
               if (session) {
                   const appDataToSave = { habits, habitsStatus, tasks, user, avatars, visionBoard };
                   const { error } = await supabase.from('user_data').upsert({ user_id: session.user.id, app_data: appDataToSave });
                   if (error) hasError = true;
               }
               
               // 2. שמירת נתונים גלובליים *רק* אם זה אדמין (עובד גם בטסט מקומי!)
               if (isAdmin) {
                   const { error } = await supabase.from('user_data').upsert({ 
                       user_id: 'GLOBAL_ADMIN_DATA', 
                       app_data: { badges, theme } 
                   });
                   if (error) hasError = true;
               }

               if (hasError) { setSyncStatus('error'); } else { setSyncStatus('synced'); }
           } catch(e) { setSyncStatus('error'); }
        }, 1500); 
        return () => clearTimeout(timer);
      }, [habits, habitsStatus, tasks, user, theme, badges, avatars, visionBoard, isDataLoaded, session, isAdmin]);

      // פונקציית טסט להחלפת משתמש
      const handleSwitchToMockUser = (mockUser) => {
        setIsDataLoaded(false);
        setTimeout(() => {
          setUser(mockUser.user);
          setHabits(mockUser.habits);
          setTasks(mockUser.tasks);
          setVisionBoard(mockUser.visionBoard);
          setHabitsStatus({});
          setIsDataLoaded(true);
          setIsGuest(true); // מגדיר אותו כאורח לצורך הטסט
          setIsAdmin(mockUser.isAdmin || false); // יגדיר כאדמין אם זה חשבון האדמין
          setIsSettingsOpen(false);
          setSettingsView('main');
        }, 300);
      };

      const activeAvatar = useMemo(() => {
        if (session && session?.user?.user_metadata?.avatar_url && !avatars.start) return session.user.user_metadata.avatar_url;
        if (user.level > 1 && avatars.levelUp) return avatars.levelUp;
        if (CURRENT_DAY >= 10 && avatars.day10) return avatars.day10;
        const hasDoneSomething = Object.values(habitsStatus).some(s => s !== 'none') || tasks.some(t => t.isDone);
        if (hasDoneSomething && avatars.firstAction) return avatars.firstAction;
        return avatars.start;
      }, [user.level, CURRENT_DAY, habitsStatus, tasks, avatars, session]);

      const handleAvatarUpload = (e, stage) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setAvatars(prev => ({ ...prev, [stage]: event.target.result }));
          reader.readAsDataURL(file);
        }
      };

      const handleBadgeImageUpload = (badgeId, type, e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setBadges(prev => prev.map(b => b.id === badgeId ? { ...b, [type]: event.target.result } : b));
          reader.readAsDataURL(file);
        }
      };

      const addXP = (amount) => {
        setUser(prev => {
          const currentXp = prev.xp || 0;
          const currentLevel = prev.level || 1;
          const xpNeeded = currentLevel * 100;
          const totalXp = currentXp + amount;
          if (totalXp >= xpNeeded) return { ...prev, level: currentLevel + 1, xp: totalXp - xpNeeded };
          return { ...prev, xp: totalXp };
        });
      };

      const activeTasks = tasks.filter(t => !t.isDone) || [];
      const completedTasks = tasks.filter(t => t.isDone) || [];
      const [isCardCompletedAnim, setIsCardCompletedAnim] = useState(false);
      const [showTrophyReminder, setShowTrophyReminder] = useState(CURRENT_DAY < TARGET_DAY - 2);

      const updateTask = (id, updates) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, ...updates } : t));
      };

      const getSimulatedAIBreakdown = (habit) => {
        const now = new Date();
        const [bestH, bestM] = habit.bestTime.split(':').map(Number);
        const bestTimeDate = new Date();
        bestTimeDate.setHours(bestH, bestM, 0);
        
        const diffInHours = (now - bestTimeDate) / (1000 * 60 * 60);
        
        if (diffInHours <= 0) return { title: habit.title, target: habit.targetValue, unit: habit.unit, level: 'standard' };
        if (diffInHours <= 1) return { title: habit.title, target: 1, unit: habit.unit === 'חזרות' ? 'חזרה' : habit.unit === 'כוסות' ? 'כוס' : 'מינימום', level: 'minimum' };
        
        if (habit.id === 1) { 
            if (diffInHours <= 2) return { title: 'חצי שכיבת סמיכה', target: '0.5', unit: 'חזרה', level: 'micro' };
            return { title: 'לשכב על הרצפה במנח שכיבות סמיכה', target: '0.1', unit: 'חזרות', level: 'nano' }; 
        }
        if (habit.id === 2) { 
            if (diffInHours <= 2) return { title: 'חצי כוס מים', target: '0.5', unit: 'כוס', level: 'micro' };
            return { title: 'למלא ולהחזיק כוס מים', target: '0.1', unit: 'כוס', level: 'nano' };
        }
        if (habit.id === 3) { 
            if (diffInHours <= 2) return { title: 'חצי דקת מדיטציה', target: '0.5', unit: 'דקה', level: 'micro' };
            return { title: 'נשימה אחת מודעת', target: '0.1', unit: 'דקות', level: 'nano' };
        }
        
        if (diffInHours <= 2) return { title: `קצת ${habit.title}`, target: '0.5', unit: habit.unit, level: 'micro' };
        return { title: `פעולה מינימלית של ${habit.title}`, target: '0.1', unit: habit.unit, level: 'nano' };
      };

      useEffect(() => {
        const dayElement = document.getElementById(`day-${CURRENT_DAY}`);
        if (dayElement && calendarRef.current) setTimeout(() => dayElement.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }), 150);
      }, []);

      useEffect(() => {
        const badgeElement = document.getElementById(`badge-${user.level}`);
        if (badgeElement && badgesRef.current) setTimeout(() => badgeElement.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }), 250);
      }, [user.level, isDataLoaded]);

      const scrollToDayBouncy = (day) => {
        const container = calendarRef.current;
        const targetEl = document.getElementById(`day-${day}`);
        if (!container || !targetEl) return;
        isAnimatingRef.current = true;
        const start = container.scrollLeft;
        container.style.scrollSnapType = 'none';
        targetEl.scrollIntoView({ behavior: 'auto', inline: 'center', block: 'nearest' });
        const target = container.scrollLeft;
        container.scrollLeft = start;
        if (Math.abs(target - start) < 5) { isAnimatingRef.current = false; return; }
        const distance = target - start;
        const duration = 1200;
        let startTime = null;
        const easeOutElastic = (x) => x === 0 ? 0 : x === 1 ? 1 : Math.pow(2, -10 * x) * Math.sin((x * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
        const animation = (currentTime) => {
          if (startTime === null) startTime = currentTime;
          const timeElapsed = currentTime - startTime;
          const progress = Math.min(timeElapsed / duration, 1);
          container.scrollLeft = start + distance * easeOutElastic(progress);
          if (timeElapsed < duration) animationFrameRef.current = requestAnimationFrame(animation);
          else {
            container.scrollLeft = target;
            container.style.scrollSnapType = 'x mandatory';
            setTimeout(() => { isAnimatingRef.current = false; }, 100);
          }
        };
        animationFrameRef.current = requestAnimationFrame(animation);
      };

      const handleUserInteraction = () => {
        if (isAnimatingRef.current && animationFrameRef.current) {
          cancelAnimationFrame(animationFrameRef.current);
          isAnimatingRef.current = false;
          if (calendarRef.current) calendarRef.current.style.scrollSnapType = '';
        }
      };

      const handleBadgesInteraction = () => { if (badgesTimeoutRef.current) clearTimeout(badgesTimeoutRef.current); };

      const addTask = () => {
        if(!newTaskText || !newTaskText.trim()) return;
        setTasks(prevTasks => [...prevTasks, { id: Date.now().toString(), text: newTaskText.trim(), date: getTodayDate(), time: '', notes: '', isDone: false, color: newTaskColor }]);
        setNewTaskText('');
        setNewTaskColor('bg-white');
      };
      
      const handleTaskInputKeyDown = (e) => { if (e.key === 'Enter') { e.preventDefault(); addTask(); } };

      const toggleTaskDone = (id) => {
        setTasks(tasks.map(t => {
            if (t.id === id) {
               if (!t.isDone) addXP(10); 
               return { ...t, isDone: !t.isDone };
            }
            return t;
        }));
      };
      
      const deleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));
      
      const onDragStart = (e, index) => { 
          e.dataTransfer.effectAllowed = "move"; 
          e.dataTransfer.setData('text/plain', index.toString());
          setTimeout(() => setDraggedIdx(index), 0); 
      };
      const onDragEnd = () => { setDraggedIdx(null); setDragOverIdx(null); };
      const onDragOver = (e, index) => { 
          e.preventDefault(); 
          e.dataTransfer.dropEffect = "move";
          if (dragOverIdx !== index) setDragOverIdx(index); 
      };
      
      const onDrop = (e, index) => {
        e.preventDefault();
        if(draggedIdx === null || draggedIdx === index) { setDraggedIdx(null); setDragOverIdx(null); return; }
        
        const active = tasks.filter(t => !t.isDone);
        const completed = tasks.filter(t => t.isDone);
        const draggedTask = active[draggedIdx];
        
        const newActive = active.filter((_, i) => i !== draggedIdx);
        newActive.splice(index, 0, draggedTask);
        
        setTasks([...newActive, ...completed]);
        setDraggedIdx(null); setDragOverIdx(null);
      };

      const handleWizardNext = () => {
        setWizardError('');
        if (wizardStep === 1) {
          if (newHabitData.action.trim().length < 2) { setWizardError("אנא הגדר מה הפעולה."); return; }
          setWizardStep(2);
        } else if (wizardStep === 2) {
          const finalHabit = { 
            id: Date.now(), title: newHabitData.action, targetValue: parseInt(newHabitData.quantityValue) || 1, unit: newHabitData.quantityUnit, bestTime: '10:00', streak: 0
          };
          setHabits([...habits, finalHabit]);
          setIsHabitWizardOpen(false);
          setWizardStep(1);
          setNewHabitData({ action: '', quantityValue: 1, quantityUnit: 'דקות', bestTime: '10:00' });
        }
      };

      const handleHabitClick = (habit) => {
        let status = habitsStatus[habit.id] || 'none';
        if (status === 'done') status = 'std_done'; 
        
        const aiData = getSimulatedAIBreakdown(habit);

        if (status === 'none') {
            const newState = aiData.level === 'standard' ? 'std_done' : 'min_done';
            
            setHabitsStatus(prev => ({ ...prev, [habit.id]: newState }));
            addXP(aiData.level === 'standard' ? 15 : 10); 
            setAnimatingHabitId(habit.id);
            setTimeout(() => setAnimatingHabitId(null), 1000); 

            setHabits(prev => prev.map(h => h.id === habit.id ? { ...h, streak: (h.streak || 0) + 1 } : h));
            
            const allDone = habits.every(h => h.id === habit.id || habitsStatus[h.id] === 'std_done' || habitsStatus[h.id] === 'min_done' || habitsStatus[h.id] === 'extra');
            if (allDone) {
               let newStreak = (user.perfectDaysStreak || 0) + 1;
               let newShields = user.shields || 0;
               if (newStreak % 10 === 0 && newShields < 3) newShields++;
               setUser(prev => ({...prev, perfectDaysStreak: newStreak, shields: newShields}));
            }

        }
        else if (status === 'min_done') {
            setHabitsStatus(prev => ({ ...prev, [habit.id]: 'std_done' }));
            addXP(5); 
            setAnimatingHabitId(habit.id);
            setTimeout(() => setAnimatingHabitId(null), 1000);
        }
        else if (status === 'std_done') {
            setHabitsStatus(prev => ({ ...prev, [habit.id]: 'extra' }));
            addXP(10); 
            setAnimatingHabitId(habit.id);
            setTimeout(() => setAnimatingHabitId(null), 1000);
        }
      };

      const handleCalendarScroll = () => {
        if (!calendarRef.current) return;
        const container = calendarRef.current;
        const containerCenter = container.getBoundingClientRect().left + container.offsetWidth / 2;
        let closestDay = CURRENT_DAY;
        let minDistance = Infinity;
        container.querySelectorAll('.day-item').forEach(el => {
            const dist = Math.abs(containerCenter - (el.getBoundingClientRect().left + el.offsetWidth / 2));
            if (dist < minDistance) { minDistance = dist; closestDay = parseInt(el.dataset.day, 10); }
        });
        setShowTrophyReminder(closestDay < TARGET_DAY - 2);
        if (calendarTimeoutRef.current) clearTimeout(calendarTimeoutRef.current);
        if (!isAnimatingRef.current) calendarTimeoutRef.current = setTimeout(() => { scrollToDayBouncy(CURRENT_DAY); }, 3000);
      };

      const handleBadgesScroll = () => {
        if (!badgesRef.current) return;
        if (badgesTimeoutRef.current) clearTimeout(badgesTimeoutRef.current);
        if (!isAnimatingBadgesRef.current) {
            badgesTimeoutRef.current = setTimeout(() => {
                const badgeElement = document.getElementById(`badge-${user.level}`);
                if (badgeElement) {
                   isAnimatingBadgesRef.current = true;
                   badgesRef.current.style.scrollSnapType = 'none';
                   badgeElement.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                   setTimeout(() => {
                       if (badgesRef.current) badgesRef.current.style.scrollSnapType = 'x mandatory';
                       isAnimatingBadgesRef.current = false;
                   }, 500);
                }
            }, 3000);
        }
      };

      const handleVisionSend = () => {
        if (!visionAnswer.trim()) return;
        const ans = visionAnswer.trim();
        setVisionAnswer('');
        addXP(5); 

        let aiAddition = '';
        switch(nlpQuestionIdx) {
            case 0: aiAddition = `\n\nכדי להגשים את המטרה שלי, אני מתחייב לרכוש את ההרגלים והתכונות הבאות:\n"${ans}"\nהסיבה שזה כל כך קריטי עבורי היא שזה יאפשר לי לפרוץ את הגבולות של עצמי ולחיות את החזון שלי במלואו.`; break;
            case 1: aiAddition = `\n\nאני בוחר להקיף את עצמי באנשים ש:\n"${ans}"\nהסביבה הזו קריטית כי היא תמשוך אותי למעלה ותיתן לי השראה וכוח ברגעי האמת.`; break;
            case 2: aiAddition = `\n\nאני משחרר את האמונות הישנות ומאמץ את האמת החדשה הזו:\n"${ans}"\nזה משחרר אותי, כי ברגע שהראש נקי ממחסומים ופחדים, הדרך להצלחה פתוחה לגמרי.`; break;
            case 3: aiAddition = `\n\nהיום האידיאלי שלי נראה כך:\n"${ans}"\nאני שואף לשם בכל כוחי כי זה מייצג את החופש האמיתי וההגשמה העצמית שתמיד חלמתי עליהם.`; break;
            case 4: aiAddition = `\n\nהצעד הראשון והמיידי שלי במסע הזה הוא:\n"${ans}"\nזה כל כך חשוב, כי פעולה קטנה היום היא זו שיוצרת את המומנטום העוצמתי של מחר.`; break;
        }

        setVisionBoard(prev => ({
            ...prev,
            text: (prev.text ? prev.text + aiAddition : aiAddition.trim())
        }));

        setNlpQuestionIdx((prev) => (prev + 1) % NLP_QUESTIONS.length);
      };

      const handleMainScroll = (e) => setIsScrolled(e.target.scrollTop > 20);

      const scrollToTargetDay = () => document.getElementById(`day-${TARGET_DAY}`)?.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      const cardClassName = "w-full flex-shrink-0 snap-center snap-always flex items-center justify-center px-1";

      const handleLogout = async () => {
        if (!isGuest) await supabase.auth.signOut();
        setIsGuest(false);
        setSession(null);
      };

      if (!session && !isGuest) return <LoginScreen onLogin={() => {}} onGuestLogin={handleGuestLogin} />;
      if (!isDataLoaded) return <div className="min-h-screen flex items-center justify-center bg-[#F0F2F5] text-gray-500 font-bold"><Loader2 className="w-8 h-8 animate-spin ml-2"/> טוען נתונים...</div>;

      const currentXp = user.xp || 0;
      const currentLevel = user.level || 1;
      const xpNeeded = currentLevel * 100;
      const currentBadge = badges.find(b => b.id === currentLevel);
      const activeCharacterImg = currentBadge?.characterImageUrl || activeAvatar; 
      const headerAvatar = currentBadge?.badgeImageUrl || currentBadge?.imageUrl || activeCharacterImg; 
      const shieldsCount = user.shields || 0;

      const stackTasks = activeTasks.slice(0, 3);

      return (
        <div className="min-h-screen bg-[#F0F2F5] flex items-center justify-center font-sans" dir="rtl">
          
          <style>{`
            .theme-bg-gradient { background: linear-gradient(180deg, ${theme.bgStart} 0%, ${theme.bgEnd} 100%) !important; }
            .c-primary { color: ${theme.primary} !important; }
            .bg-primary { background-color: ${theme.primary} !important; }
            .border-primary { border-color: ${theme.primary} !important; }
            .c-gold { color: ${theme.gold} !important; }
            .bg-gold { background-color: ${theme.gold} !important; }
            .border-gold { border-color: ${theme.gold} !important; }
            .c-accent { color: ${theme.accent} !important; }
            .bg-accent { background-color: ${theme.accent} !important; }
            .c-dark { color: ${theme.dark} !important; }
            .bg-dark { background-color: ${theme.dark} !important; }
            .bg-primary-10 { background-color: ${theme.primary}1A !important; }
            .bg-accent-10 { background-color: ${theme.accent}1A !important; }
            .shadow-gold-glow { box-shadow: 0 4px 15px ${theme.gold}66 !important; }
            .shadow-primary-glow { box-shadow: 0 8px 15px ${theme.primary}1A !important; }
            .no-scrollbar::-webkit-scrollbar { display: none; }
            .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
          `}</style>

          <div className="w-full h-screen md:h-[844px] md:max-w-[390px] bg-white md:rounded-[3rem] md:shadow-2xl md:border-[12px] md:border-[#1C1C1E] relative overflow-hidden flex flex-col transition-all">
            
            <div className={`absolute top-0 left-0 w-full z-[150] px-4 py-3 flex items-center justify-between transition-all duration-300 ${isScrolled ? 'bg-white/95 backdrop-blur-xl border-b border-gray-100 shadow-sm' : 'bg-transparent border-transparent shadow-none'}`}>
              <button onClick={() => setIsSettingsOpen(true)} className="flex items-center gap-2 hover:opacity-80 transition-opacity drop-shadow-md">
                <div className="w-10 h-10 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center overflow-hidden shrink-0 shadow-sm">
                  {headerAvatar ? <img src={headerAvatar} className="w-full h-full object-cover" /> : <User className="w-5 h-5 text-gray-400" />}
                </div>
                <div className="flex flex-col text-right bg-white/40 px-2 py-0.5 rounded-lg backdrop-blur-sm">
                  <span className="text-[13px] font-black c-dark leading-tight">{user.name}</span>
                  <span className="text-[10px] font-bold text-gray-700 leading-tight mt-0.5">רמה {currentLevel}</span>
                </div>
              </button>

              <div className="flex flex-col items-center justify-center drop-shadow-md bg-white/40 px-3 py-1 rounded-xl backdrop-blur-sm">
                <span className="text-[11px] font-black text-gray-700">{todayFormatted}</span>
                {shieldsCount > 0 && (
                  <div className="flex items-center gap-1 mt-1">
                    {[1, 2, 3].map((num) => (
                      <Shield key={num} className={`w-3.5 h-3.5 ${num <= shieldsCount ? 'text-yellow-500 fill-yellow-500 drop-shadow-sm' : 'text-gray-300 fill-gray-200'}`} />
                    ))}
                  </div>
                )}
              </div>

              <div className="flex items-center gap-1 drop-shadow-md bg-white/40 rounded-full backdrop-blur-sm px-1">
                 {isGuest ? (
                   <div className="p-1.5"><CloudOff className="w-4 h-4 text-gray-400"/></div>
                 ) : syncStatus === 'saving' ? (
                   <div className="p-1.5"><Loader2 className="w-4 h-4 animate-spin text-blue-500"/></div>
                 ) : syncStatus === 'error' ? (
                   <div className="p-1.5"><AlertCircle className="w-4 h-4 text-red-500"/></div>
                 ) : (
                   <div className="p-1.5"><Cloud className="w-4 h-4 text-green-500"/></div>
                 )}
              </div>
            </div>

            <div onScroll={handleMainScroll} className="flex-1 overflow-y-auto overflow-x-hidden theme-bg-gradient c-dark select-none relative no-scrollbar">
              <div className="w-full px-4 pb-24 pt-20 mt-0">
                
                {activeCharacterImg && (
                  <div className="relative w-[calc(100%+32px)] -mx-4 h-[280px] md:h-[340px] mb-2 flex items-center justify-center shrink-0 animate-in zoom-in-95 duration-700 p-4">
                     <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-56 h-56 md:w-72 md:h-72 bg-gray-300/40 rounded-full blur-3xl z-0 pointer-events-none"></div>
                     <img src={activeCharacterImg} alt="Avatar" className="relative z-10 max-w-full max-h-full object-contain drop-shadow-2xl" />
                  </div>

                <div className="relative w-[calc(100%+32px)] -mx-4 z-20 -mt-16 mb-4">
                  <div ref={badgesRef} onScroll={handleBadgesScroll} onTouchStart={handleBadgesInteraction} onMouseDown={handleBadgesInteraction} className="flex flex-row-reverse w-full overflow-x-auto no-scrollbar snap-x snap-mandatory py-4">
                    <div className="flex-shrink-0 w-[calc(50%-45px)]" />
                    {badges.map((badge) => {
                      const isCompleted = currentLevel >= badge.id;
                      const isCurrent = currentLevel === badge.id;
                      const displayBadgeImage = badge.badgeImageUrl || badge.imageUrl;
                      return (
                        <div key={badge.id} id={`badge-${badge.id}`} className="snap-center flex-shrink-0 w-[90px] flex flex-col items-center justify-center transition-all duration-300">
                          <div className="relative w-16 h-16 flex items-center justify-center mb-2">
                            {isCurrent && <div className="absolute top-1/2 left-1/2 w-20 h-20 rounded-full animate-halo-current pointer-events-none" style={{ background: 'radial-gradient(circle, #FFCC00 20%, transparent 70%)', zIndex: 0 }}></div>}
                            <div className={`relative z-10 w-full h-full flex items-center justify-center transition-all duration-500 ${isCurrent ? 'animate-badge-current drop-shadow-xl' : isCompleted ? 'scale-100 drop-shadow-md' : 'opacity-40 grayscale scale-90'}`}>
                              {displayBadgeImage ? (
                                 <img src={displayBadgeImage} alt={badge.label} className="w-full h-full object-contain" />
                              ) : (
                                 <div className={`w-[80%] h-[80%] rounded-full border-2 border-dashed ${isCompleted ? 'border-gold' : 'border-gray-300'} opacity-50`}></div>
                              )}
