  <style>
    body { margin: 0; padding: 0; background-color: #F0F2F5; font-family: 'Rubik', system-ui, -apple-system, sans-serif; }
    .btn-google { background: white; color: #1f2937; transition: all 0.2s; border: 1px solid #e5e7eb; }
    .btn-google:hover { background: #f9fafb; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    
    @keyframes badge-float-scale {
      0%, 100% { transform: translateY(0px) scale(1.25); }
      50% { transform: translateY(-8px) scale(1.35); }
    }
    .animate-badge-current { animation: badge-float-scale 2.5s ease-in-out infinite; }
    
    @keyframes halo-oppose-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0.15; }
      50% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
    }
    .animate-halo-current { animation: halo-oppose-pulse 2.5s ease-in-out infinite; }

    @keyframes pop-in {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes spark {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(1.5) translateY(-20px) rotate(45deg); opacity: 0; }
    }
    .sparkle { position: absolute; width: 6px; height: 6px; border-radius: 50%; opacity: 0; z-index: 20; pointer-events: none; }
    .sparkle-1 { background: #FFCC00; animation: spark 0.6s ease-out forwards; top: 10px; right: 10px; }
    .sparkle-2 { background: #007AFF; animation: spark 0.6s ease-out forwards 0.1s; bottom: 10px; left: 10px; }
    .sparkle-3 { background: #34C759; animation: spark 0.6s ease-out forwards 0.2s; top: 20px; left: 20px; }
    .sparkle-4 { background: #FF9500; animation: spark 0.6s ease-out forwards 0.05s; bottom: 20px; right: 20px; }
  </style>
</head>

      }
    ];

    const INITIAL_HABITS_DATA = [
      { id: 1, title: 'שכיבות סמיכה', targetValue: 15, unit: 'חזרות', bestTime: '09:00', streak: 12 },
      { id: 2, title: 'שתיית מים', targetValue: 8, unit: 'כוסות', bestTime: '12:00', streak: 5 },
      { id: 3, title: 'מדיטציה', targetValue: 15, unit: 'דקות', bestTime: '18:00', streak: 0 }
    ];

    const getTodayDate = () => new Date().toISOString().split('T')[0];

    const BADGE_NAMES = [
      'יסוד', 'מומנטום', 'קצב', 'רצף', 'שגרה', 'משמעת',
      'מיקוד', 'עקביות', 'החלטה', 'נחישות', 'רצון', 'חוסן',
      'יציבות', 'כוח', 'סיבולת', 'התמדה', 'עיקשות', 'אחיזה',
      'מסירות', 'מחויבות', 'שורשים', 'עוגן', 'אמונה', 'אופי',
      'חציבה', 'ברזל', 'איתנות', 'זרימה', 'דרך', 'נוכחות'
    ];
    
    const INITIAL_BADGES = BADGE_NAMES.map((name, idx) => ({
      id: idx + 1, completed: idx === 0, label: name, imageUrl: null, characterImageUrl: null
    }));

    const NLP_QUESTIONS = [
      "אילו הרגלים ותכונות תרצה לרכוש כדי להגשים את החזון?",
      "אילו אנשים תרצה לפגוש יותר בחייך שיקדמו אותך למטרה?",
      "אילו אמונות מגבילות היית רוצה להטיל בהן ספק ולאמץ חדשות?",
      "איך ייראה יום אידיאלי בחייך בעוד שנה מהיום?",
      "מהו הצעד הקטן והפשוט ביותר שאתה יכול לעשות כבר היום?"
    ];

    const CURRENT_DAY = 10;
    const TARGET_DAY = 17;

    const TASK_COLORS = [
      { id: 'white', class: 'bg-white', border: 'border-gray-200' },
      { id: 'blue', class: 'bg-blue-50', border: 'border-blue-200' },
      { id: 'red', class: 'bg-red-50', border: 'border-red-200' },
      { id: 'orange', class: 'bg-orange-50', border: 'border-orange-200' },
      { id: 'green', class: 'bg-green-50', border: 'border-green-200' },
      { id: 'purple', class: 'bg-purple-50', border: 'border-purple-200' }
    ];

    const ALL_DAYS = Array.from({ length: 28 }, (_, i) => {
      const date = i + 1;
      const labels = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];
      const status = date < CURRENT_DAY ? 'past' : (date === CURRENT_DAY ? 'today' : 'future');
      let completionLevel = 'none';
      if (status === 'past') {
        if (date % 4 === 0) completionLevel = 'all_extra';
        else if (date % 3 === 0) completionLevel = 'some_extra';
        else if (date % 2 === 0) completionLevel = 'all_done';
        else completionLevel = 'partial';
      }
      return { date, label: labels[(date - 1) % 7], status, isToday: date === CURRENT_DAY, isTarget: date === TARGET_DAY, completionLevel };
    });

    const HEADER_TABS = [
      { id: 'daily', label: 'משימה יומית' },
      { id: 'news', label: 'קהילה' },
      { id: 'vision', label: 'חזון' }
    ];

    const SettingsMenuItem = ({ icon, label, onClick }) => (
      <button onClick={onClick} className="w-full bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:border-gray-200 active:scale-[0.98] transition-all">
          <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-gray-500">{icon}</div>
              <span className="font-bold text-sm c-dark">{label}</span>
          </div>
          <ChevronLeft className="w-4 h-4 text-gray-300" />
      </button>
    );

    const LoginScreen = ({ onLogin, onGuestLogin }) => {
      const [isLoading, setIsLoading] = useState(false);
      const handleLogin = async () => {
        setIsLoading(true);
        try {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
            if (error) throw error;
        } catch (error) {
            console.error("Login error:", error);
            setIsLoading(false);
            alert("שגיאה בהתחברות - ייתכן שהסביבה חוסמת פתיחת חלונות. נסה 'המשך כאורח'.");
        }
      };
      return (
        <div className="min-h-screen bg-[#F0F2F5] flex items-center justify-center font-sans" dir="rtl">
          <div className="w-full h-screen md:h-[844px] md:max-w-[390px] bg-white md:rounded-[3rem] shadow-2xl flex flex-col items-center justify-center p-8">
            <Trophy className="w-20 h-20 text-[#007AFF] mb-6 drop-shadow-lg" />
            <h1 className="text-3xl font-black mb-2 text-center text-gray-900">ברוכים הבאים</h1>
            <p className="text-gray-500 text-center mb-10 px-4">התחבר כדי לשמור את ההרגלים וההתקדמות שלך בענן, או המשך כאורח כדי לנסות את האפליקציה.</p>
            <button onClick={handleLogin} disabled={isLoading} className="btn-google w-full flex items-center justify-center gap-3 px-6 py-4 rounded-2xl font-bold text-lg shadow-sm">
              {isLoading ? <Loader2 className="w-6 h-6 animate-spin" /> : <img src="https://www.google.com/favicon.ico" className="w-6 h-6" alt="G" />}
              התחברות עם Google
            </button>
            <button onClick={onGuestLogin} className="mt-6 text-sm font-bold text-gray-400 hover:text-gray-600 transition-colors">
              המשך כאורח (ללא שמירה בענן)
            </button>
          </div>
        </div>
      );
    };

    function App() {
      const [session, setSession] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [isGuest, setIsGuest] = useState(false); 
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [syncStatus, setSyncStatus] = useState('synced');
      
      const [headerView, setHeaderView] = useState('daily'); 
      const [habitsStatus, setHabitsStatus] = useState({});
      const [habits, setHabits] = useState(INITIAL_HABITS_DATA);
      const [isTaskDrawerOpen, setIsTaskDrawerOpen] = useState(false);
      const [editingTaskId, setEditingTaskId] = useState(null);
      
      const [animatingHabitId, setAnimatingHabitId] = useState(null);

      const calendarRef = useRef(null);
      const badgesRef = useRef(null); 
      const scrollRef = useRef(null);
      const isAutoScrolling = useRef(false);
      
      const calendarTimeoutRef = useRef(null);
      const badgesTimeoutRef = useRef(null);
      const isAnimatingRef = useRef(false);
      const isAnimatingBadgesRef = useRef(false);
      const animationFrameRef = useRef(null);
      
      const [user, setUser] = useState({ level: 1, xp: 0, shields: 0, perfectDaysStreak: 0, name: 'אורח', lastLoginDate: getTodayDate() });
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [settingsView, setSettingsView] = useState('main'); 
      const [badges, setBadges] = useState(INITIAL_BADGES);
      const [theme, setTheme] = useState({ primary: '#007AFF', gold: '#FFCC00', accent: '#FF9500', dark: '#1C1C1E', bgStart: '#F4F7F9', bgEnd: '#FFFFFF' });
      const [avatars, setAvatars] = useState({ start: null, firstAction: null, day10: null, levelUp: null });
      const [isHabitWizardOpen, setIsHabitWizardOpen] = useState(false);
      const [wizardStep, setWizardStep] = useState(1);
      const [newHabitData, setNewHabitData] = useState({ action: '', quantityValue: 1, quantityUnit: 'דקות', bestTime: '10:00' });
      const [wizardError, setWizardError] = useState('');
      const [tasks, setTasks] = useState([
          { id: '1', text: 'לקרוא 5 עמודים בספר', date: getTodayDate(), time: '09:00', notes: '', isDone: false, color: 'bg-white' },
          { id: '2', text: 'משימה נוספת להדגמה', date: getTodayDate(), time: '10:00', notes: '', isDone: false, color: 'bg-blue-50' },
          { id: '3', text: 'עוד אחת קטנה', date: getTodayDate(), time: '11:00', notes: '', isDone: false, color: 'bg-red-50' }
      ]);
      const [newTaskText, setNewTaskText] = useState('');
      const [newTaskColor, setNewTaskColor] = useState('bg-white');
      const [draggedIdx, setDraggedIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);
      const [visionAnswer, setVisionAnswer] = useState('');
      const [nlpQuestionIdx, setNlpQuestionIdx] = useState(0);
      const [showCommunityPopup, setShowCommunityPopup] = useState(false);
      
      const [showVisionPopup, setShowVisionPopup] = useState(false);
      const [visionBoard, setVisionBoard] = useState({ text: '', imageUrl: null });

      const tasksListRef = useRef(null);
      const completedTasksListRef = useRef(null);

      useEffect(() => {
          if (tasksListRef.current) autoAnimate(tasksListRef.current, { duration: 300, easing: 'ease-in-out' });
          if (completedTasksListRef.current) autoAnimate(completedTasksListRef.current, { duration: 300, easing: 'ease-in-out' });
      }, [tasksListRef, completedTasksListRef]);

      useEffect(() => {
        try {
            supabase.auth.getSession().then(({ data: { session } }) => {
              setSession(session);
              if (session) {
                  setIsAdmin(session.user.email === 'mosheally@gmail.com');
                  loadUserData(session);
              }
            });
            const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
              setSession(session);
              if (session) {
                  setIsAdmin(session.user.email === 'mosheally@gmail.com');
                  loadUserData(session);
              } else {
                  setIsAdmin(false);
              }
            });
            return () => subscription.unsubscribe();
        } catch (e) { console.error("Supabase init error:", e); }
      }, []);

      const loadGlobalAdminData = async () => {
          try {
              const { data } = await supabase.from('user_data').select('app_data').eq('user_id', 'GLOBAL_ADMIN_DATA').single();
              if (data && data.app_data) return data.app_data;
          } catch (e) { console.error("No global admin data yet", e); }
          return null;
      };

      const handleGuestLogin = async () => { 
          setIsGuest(true); 
          const globalData = await loadGlobalAdminData();
          if (globalData) {
              if (globalData.theme) setTheme(prev => ({ ...prev, ...globalData.theme }));
              if (globalData.badges) setBadges(globalData.badges);
          }
          setIsDataLoaded(true); 
          checkNewDayAndShields(); 
      };
      
      const todayFormatted = useMemo(() => new Intl.DateTimeFormat('he-IL', { day: 'numeric', month: 'long' }).format(new Date()), []);

      const loadUserData = async (currentSession) => {
        try {
            const [userRes, globalData] = await Promise.all([
                supabase.from('user_data').select('app_data').eq('user_id', currentSession.user.id).single(),
                loadGlobalAdminData()
            ]);
            
            const d = userRes.data?.app_data;
            
            if (d) {
               if (d.habits) setHabits(d.habits);
               if (d.habitsStatus) setHabitsStatus(d.habitsStatus);
               if (d.tasks) setTasks(d.tasks);
               if (d.user) setUser({ ...user, ...d.user });
               if (d.avatars) setAvatars({ ...avatars, ...d.avatars });
               if (d.visionBoard) setVisionBoard(d.visionBoard);
            } else {
               const fullName = currentSession?.user?.user_metadata?.full_name || 'משתמש';
               setUser(prev => ({ ...prev, name: fullName.split(' ')[0], xp: 0, level: 1, shields: 0, perfectDaysStreak: 0, lastLoginDate: getTodayDate() }));
            }

            // קדימות לנתוני האדמין (עיצוב וסמלים), ואם אין אז לנתוני המשתמש
            if (globalData?.theme) setTheme(prev => ({ ...prev, ...globalData.theme }));
            else if (d?.theme) setTheme(prev => ({ ...prev, ...d.theme }));

            if (globalData?.badges) setBadges(globalData.badges);
            else if (d?.badges) setBadges(d.badges);

        } catch (e) { console.error("Error loading user data:", e); } finally { setIsDataLoaded(true); checkNewDayAndShields(); }
      };

      const checkNewDayAndShields = () => {
        const today = getTodayDate();
        setUser(prevUser => {
          if (prevUser.lastLoginDate !== today) {
            let shieldsToUse = 0;
            let currentShields = prevUser.shields || 0;
            let missedHabits = false;
            let allCompletedYesterday = true;
            
            habits.forEach(h => {
               if (habitsStatus[h.id] === 'none' || !habitsStatus[h.id]) {
                  missedHabits = true;
                  allCompletedYesterday = false;
                  if (currentShields > shieldsToUse) shieldsToUse++;
               }
            });

            let newShields = currentShields - shieldsToUse;
            let newPerfectStreak = prevUser.perfectDaysStreak || 0;

            if (allCompletedYesterday) {
               newPerfectStreak++;
               if (newPerfectStreak % 10 === 0 && newShields < 3) newShields++;
            } else {
               const missedCount = habits.filter(h => habitsStatus[h.id] === 'none' || !habitsStatus[h.id]).length;
               if (missedCount > currentShields) newPerfectStreak = 0; 
            }

            return { ...prevUser, lastLoginDate: today, shields: newShields, perfectDaysStreak: newPerfectStreak };
          }
          return prevUser;
        });
      };

      useEffect(() => {
        const interval = setInterval(checkNewDayAndShields, 60000 * 60); 
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (!isDataLoaded || !session || isGuest) return;
        setSyncStatus('saving');
        const timer = setTimeout(async () => {
           try {
               const appDataToSave = { habits, habitsStatus, tasks, user, theme, badges, avatars, visionBoard };
               const { error } = await supabase.from('user_data').upsert({ user_id: session.user.id, app_data: appDataToSave });
               
               // שמירת נתונים גלובליים אם המשתמש הוא האדמין
               if (isAdmin) {
                   await supabase.from('user_data').upsert({ 
                       user_id: 'GLOBAL_ADMIN_DATA', 
                       app_data: { badges, theme } 
                   });
               }

               if (error) { setSyncStatus('error'); } else { setSyncStatus('synced'); }
           } catch(e) { setSyncStatus('error'); }
        }, 1500); 
        return () => clearTimeout(timer);
      }, [habits, habitsStatus, tasks, user, theme, badges, avatars, visionBoard, isDataLoaded, session, isGuest, isAdmin]);

      // פונקציית טסט להחלפת משתמש
      const handleSwitchToMockUser = (mockUser) => {
        setIsDataLoaded(false);
        setTimeout(() => {
          setUser(mockUser.user);
          setHabits(mockUser.habits);
          setTasks(mockUser.tasks);
          setVisionBoard(mockUser.visionBoard);
          setHabitsStatus({});
          setIsDataLoaded(true);
          setIsGuest(true); // מגדיר אותו כאורח לצורך הטסט
          setIsSettingsOpen(false);
          setSettingsView('main');
        }, 300);
      };

      const activeAvatar = useMemo(() => {
        if (session && session?.user?.user_metadata?.avatar_url && !avatars.start) return session.user.user_metadata.avatar_url;
        if (user.level > 1 && avatars.levelUp) return avatars.levelUp;
        if (CURRENT_DAY >= 10 && avatars.day10) return avatars.day10;
        const hasDoneSomething = Object.values(habitsStatus).some(s => s !== 'none') || tasks.some(t => t.isDone);
        if (hasDoneSomething && avatars.firstAction) return avatars.firstAction;
        return avatars.start;
      }, [user.level, CURRENT_DAY, habitsStatus, tasks, avatars, session]);

      const handleAvatarUpload = (e, stage) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setAvatars(prev => ({ ...prev, [stage]: event.target.result }));
          reader.readAsDataURL(file);
        }
      };

      const handleBadgeImageUpload = (badgeId, type, e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setBadges(prev => prev.map(b => b.id === badgeId ? { ...b, [type]: event.target.result } : b));
          reader.readAsDataURL(file);
        }
      };

      const addXP = (amount) => {
        setUser(prev => {
          const currentXp = prev.xp || 0;
          const currentLevel = prev.level || 1;
          const xpNeeded = currentLevel * 100;
          const totalXp = currentXp + amount;
          if (totalXp >= xpNeeded) return { ...prev, level: currentLevel + 1, xp: totalXp - xpNeeded };
          return { ...prev, xp: totalXp };
        });
      };

      const activeTasks = tasks.filter(t => !t.isDone) || [];
      const completedTasks = tasks.filter(t => t.isDone) || [];
      const [isCardCompletedAnim, setIsCardCompletedAnim] = useState(false);
      const [showTrophyReminder, setShowTrophyReminder] = useState(CURRENT_DAY < TARGET_DAY - 2);

      const updateTask = (id, updates) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, ...updates } : t));
      };

      const getSimulatedAIBreakdown = (habit) => {
        const now = new Date();
        const [bestH, bestM] = habit.bestTime.split(':').map(Number);
        const bestTimeDate = new Date();
        bestTimeDate.setHours(bestH, bestM, 0);
        
        const diffInHours = (now - bestTimeDate) / (1000 * 60 * 60);
        
        if (diffInHours <= 0) return { title: habit.title, target: habit.targetValue, unit: habit.unit, level: 'standard' };
        if (diffInHours <= 1) return { title: habit.title, target: 1, unit: habit.unit === 'חזרות' ? 'חזרה' : habit.unit === 'כוסות' ? 'כוס' : 'מינימום', level: 'minimum' };
        
        if (habit.id === 1) { 
            if (diffInHours <= 2) return { title: 'חצי שכיבת סמיכה', target: '0.5', unit: 'חזרה', level: 'micro' };
            return { title: 'לשכב על הרצפה במנח שכיבות סמיכה', target: '0.1', unit: 'חזרות', level: 'nano' }; 
        }
        if (habit.id === 2) { 
            if (diffInHours <= 2) return { title: 'חצי כוס מים', target: '0.5', unit: 'כוס', level: 'micro' };
            return { title: 'למלא ולהחזיק כוס מים', target: '0.1', unit: 'כוס', level: 'nano' };
        }
        if (habit.id === 3) { 
            if (diffInHours <= 2) return { title: 'חצי דקת מדיטציה', target: '0.5', unit: 'דקה', level: 'micro' };
            return { title: 'נשימה אחת מודעת', target: '0.1', unit: 'דקות', level: 'nano' };
        }
        
        if (diffInHours <= 2) return { title: `קצת ${habit.title}`, target: '0.5', unit: habit.unit, level: 'micro' };
        return { title: `פעולה מינימלית של ${habit.title}`, target: '0.1', unit: habit.unit, level: 'nano' };
      };

      useEffect(() => {
        const dayElement = document.getElementById(`day-${CURRENT_DAY}`);
        if (dayElement && calendarRef.current) setTimeout(() => dayElement.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }), 150);
      }, []);

      useEffect(() => {
        const badgeElement = document.getElementById(`badge-${user.level}`);
        if (badgeElement && badgesRef.current) setTimeout(() => badgeElement.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }), 250);
      }, [user.level, isDataLoaded]);

      const scrollToDayBouncy = (day) => {
        const container = calendarRef.current;
        const targetEl = document.getElementById(`day-${day}`);
        if (!container || !targetEl) return;
        isAnimatingRef.current = true;
        const start = container.scrollLeft;
        container.style.scrollSnapType = 'none';
        targetEl.scrollIntoView({ behavior: 'auto', inline: 'center', block: 'nearest' });
        const target = container.scrollLeft;
        container.scrollLeft = start;
        if (Math.abs(target - start) < 5) { isAnimatingRef.current = false; return; }
        const distance = target - start;
        const duration = 1200;
        let startTime = null;
        const easeOutElastic = (x) => x === 0 ? 0 : x === 1 ? 1 : Math.pow(2, -10 * x) * Math.sin((x * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
        const animation = (currentTime) => {
          if (startTime === null) startTime = currentTime;
          const timeElapsed = currentTime - startTime;
          const progress = Math.min(timeElapsed / duration, 1);
          container.scrollLeft = start + distance * easeOutElastic(progress);
          if (timeElapsed < duration) animationFrameRef.current = requestAnimationFrame(animation);
          else {
            container.scrollLeft = target;
            container.style.scrollSnapType = 'x mandatory';
            setTimeout(() => { isAnimatingRef.current = false; }, 100);
          }
        };
        animationFrameRef.current = requestAnimationFrame(animation);
      };

      const handleUserInteraction = () => {
        if (isAnimatingRef.current && animationFrameRef.current) {

        setTasks(prevTasks => [...prevTasks, { id: Date.now().toString(), text: newTaskText.trim(), date: getTodayDate(), time: '', notes: '', isDone: false, color: newTaskColor }]);
        setNewTaskText('');
        setNewTaskColor('bg-white');
      };
      
      const handleTaskInputKeyDown = (e) => { if (e.key === 'Enter') { e.preventDefault(); addTask(); } };

      const toggleTaskDone = (id) => {
        setTasks(tasks.map(t => {

               if (!t.isDone) addXP(10);

            return t;
        }));

      const deleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));
      
      const onDragStart = (e, index) => {

          e.dataTransfer.setData('text/plain', index.toString());
          setTimeout(() => setDraggedIdx(index), 0); 
      };
      const onDragEnd = () => { setDraggedIdx(null); setDragOverIdx(null); };
      const onDragOver = (e, index) => { 
          e.preventDefault(); 
          e.dataTransfer.dropEffect = "move";
          if (dragOverIdx !== index) setDragOverIdx(index); 
      };
      
      const onDrop = (e, index) => {
        e.preventDefault();
        if(draggedIdx === null || draggedIdx === index) { setDraggedIdx(null); setDragOverIdx(null); return; }
        
        const active = tasks.filter(t => !t.isDone);
        const completed = tasks.filter(t => t.isDone);
        const draggedTask = active[draggedIdx];
        
        const newActive = active.filter((_, i) => i !== draggedIdx);
        newActive.splice(index, 0, draggedTask);
        
        setTasks([...newActive, ...completed]);
        setDraggedIdx(null); setDragOverIdx(null);
      };

      const handleWizardNext = () => {
        setWizardError('');

          const finalHabit = { 
            id: Date.now(), title: newHabitData.action, targetValue: parseInt(newHabitData.quantityValue) || 1, unit: newHabitData.quantityUnit, bestTime: '10:00', streak: 0
          };

          setIsHabitWizardOpen(false);
          setWizardStep(1);
          setNewHabitData({ action: '', quantityValue: 1, quantityUnit: 'דקות', bestTime: '10:00' });
        }
      };

        let status = habitsStatus[habit.id] || 'none';

        if (status === 'none') {
            const newState = aiData.level === 'standard' ? 'std_done' : 'min_done';
            
            setHabitsStatus(prev => ({ ...prev, [habit.id]: newState }));
            addXP(aiData.level === 'standard' ? 15 : 10); 
            setAnimatingHabitId(habit.id);

            const allDone = habits.every(h => h.id === habit.id || habitsStatus[h.id] === 'std_done' || habitsStatus[h.id] === 'min_done' || habitsStatus[h.id] === 'extra');
            if (allDone) {
               let newStreak = (user.perfectDaysStreak || 0) + 1;
               let newShields = user.shields || 0;
               if (newStreak % 10 === 0 && newShields < 3) newShields++;
               setUser(prev => ({...prev, perfectDaysStreak: newStreak, shields: newShields}));
            }

        }
        else if (status === 'min_done') {
            setHabitsStatus(prev => ({ ...prev, [habit.id]: 'std_done' }));
            addXP(5); 
            setAnimatingHabitId(habit.id);
            setTimeout(() => setAnimatingHabitId(null), 1000);
        }

            setHabitsStatus(prev => ({ ...prev, [habit.id]: 'extra' }));
            addXP(10); 
            setAnimatingHabitId(habit.id);
            setTimeout(() => setAnimatingHabitId(null), 1000);
        }
      };

        container.querySelectorAll('.day-item').forEach(el => {

      };

      const handleBadgesScroll = () => {
        if (!badgesRef.current) return;

                const badgeElement = document.getElementById(`badge-${user.level}`);

                   isAnimatingBadgesRef.current = true;
                   badgesRef.current.style.scrollSnapType = 'none';

                       if (badgesRef.current) badgesRef.current.style.scrollSnapType = 'x mandatory';
                       isAnimatingBadgesRef.current = false;
                   }, 500);
                }
            }, 3000);
        }
      };

      const handleVisionSend = () => {

            case 1: aiAddition = `\n\nאני בוחר להקיף את עצמי באנשים ש:\n"${ans}"\nהסביבה הזו קריטית כי היא תמשוך אותי למעלה ותיתן לי השראה וכוח ברגעי האמת.`; break;
            case 2: aiAddition = `\n\nאני משחרר את האמונות הישנות ומאמץ את האמת החדשה הזו:\n"${ans}"\nזה משחרר אותי, כי ברגע שהראש נקי ממחסומים ופחדים, הדרך להצלחה פתוחה לגמרי.`; break;
            case 3: aiAddition = `\n\nהיום האידיאלי שלי נראה כך:\n"${ans}"\nאני שואף לשם בכל כוחי כי זה מייצג את החופש האמיתי וההגשמה העצמית שתמיד חלמתי עליהם.`; break;
            case 4: aiAddition = `\n\nהצעד הראשון והמיידי שלי במסע הזה הוא:\n"${ans}"\nזה כל כך חשוב, כי פעולה קטנה היום היא זו שיוצרת את המומנטום העוצמתי של מחר.`; break;
        }

        setVisionBoard(prev => ({
            ...prev,
            text: (prev.text ? prev.text + aiAddition : aiAddition.trim())
        }));

        setNlpQuestionIdx((prev) => (prev + 1) % NLP_QUESTIONS.length);
      };

      const goToTab = (id) => {
        const el = document.getElementById(`card-${id}`);
        if (el && scrollRef.current) {
          isAutoScrolling.current = true;
          el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          setHeaderView(id);
          setTimeout(() => { isAutoScrolling.current = false; }, 600);
        }
      };

      const handleScroll = () => {
        if (isAutoScrolling.current || !scrollRef.current) return;
        const container = scrollRef.current;
        const idx = Math.round(Math.abs(container.scrollLeft) / container.offsetWidth);
        if (HEADER_TABS[idx] && headerView !== HEADER_TABS[idx].id) setHeaderView(HEADER_TABS[idx].id);
      };

      const currentXp = user.xp || 0;

          <style>{`

          <div className="w-full h-screen md:h-[844px] md:max-w-[390px] bg-white md:rounded-[3rem] md:shadow-2xl md:border-[12px] md:border-[#1C1C1E] relative overflow-hidden flex flex-col transition-all">
            
            <div className="absolute top-0 left-0 w-full z-[150] bg-white/95 backdrop-blur-xl border-b border-gray-100 px-4 py-3 flex items-center justify-between shadow-sm">
              <button onClick={() => setIsSettingsOpen(true)} className="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <div className="w-10 h-10 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center overflow-hidden shrink-0 shadow-sm">
                  {headerAvatar ? <img src={headerAvatar} className="w-full h-full object-cover" /> : <User className="w-5 h-5 text-gray-400" />}
                </div>
                <div className="flex flex-col text-right">
                  <span className="text-[13px] font-black c-dark leading-tight">{user.name}</span>
                  <span className="text-[10px] font-bold text-gray-500 leading-tight mt-0.5">רמה {currentLevel}</span>

                                        </div>
                                    </div>
                                    <div className="bg-gray-50 rounded-xl flex flex-row-reverse px-3 py-2 border border-gray-100">
                                        <AlignLeft className="w-4 h-4 text-gray-400 shrink-0 ml-2 mt-0.5" />
                                        <textarea value={t.notes || ''} onChange={(e) => updateTask(t.id, {notes: e.target.value})} placeholder="הוסף הערות למשימה..." rows="2" className="bg-transparent w-full text-xs font-bold c-dark outline-none resize-none no-scrollbar text-right" />
                                    </div>
                                </div>
                            )}
                          </div>
                          
                          {showAfter && (
                            <div key={`ph-after-${t.id}`} onDragOver={(e) => onDragOver(e, i)} onDrop={(e) => onDrop(e, i)} className="p-3 bg-primary/5 rounded-2xl border-2 border-dashed border-primary/40 flex items-center gap-3 opacity-80 scale-[0.98] shadow-inner cursor-pointer">
                                <GripVertical className="w-5 h-5 text-primary/40 shrink-0" />
                                <span className="text-sm font-bold flex-1 text-right truncate c-dark">{draggedTask?.text}</span>
                            </div>
                          )}
                        </React.Fragment>
                      );
                    })}
                    
                    {activeTasks.length === 0 && (
                      <div className="flex flex-col items-center justify-center h-32 text-gray-400 gap-2 opacity-60">
                         <Target className="w-10 h-10" />
                         <span className="text-sm font-bold">אין משימות פתוחות</span>
                      </div>
                    )}

                    {completedTasks.length > 0 && (
                      <div className="mt-8 mb-4">
                         <h4 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 px-1 text-right">הושלמו ({completedTasks.length})</h4>
                         <div className="flex flex-col gap-2" ref={completedTasksListRef}>
                             {completedTasks.map(t => (
                                <div key={t.id} className={`p-3 ${t.color || 'bg-gray-50'}/80 rounded-2xl border border-gray-100 flex items-center gap-3 opacity-60 hover:opacity-100 transition-opacity`}>
                                    <div className="w-5" /> 
                                    <span className="text-sm font-bold flex-1 text-right line-through c-dark truncate">{t.text}</span>
                                    <div className="flex gap-2 shrink-0 items-center">
                                        <button onClick={() => deleteTask(t.id)} className="w-7 h-7 rounded-full flex items-center justify-center text-red-400 hover:bg-red-50 transition-colors"><Trash2 className="w-4 h-4"/></button>
                                        <button onClick={() => toggleTaskDone(t.id)} className="w-7 h-7 rounded-full bg-green-100 text-green-600 flex items-center justify-center active:scale-90 transition-transform shadow-inner"><Check className="w-4 h-4 stroke-[3px]"/></button>
                                    </div>
                                </div>
                             ))}
                         </div>
                      </div>
                    )}
                </div>
                
                <div className="p-4 bg-white border-t border-gray-100 shrink-0 pb-8 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.05)] flex flex-col gap-3">
                   <div className="flex gap-2.5 items-center justify-end px-1">
                      {TASK_COLORS.map(c => (
                         <button 
                            key={c.id} 
                            onClick={() => setNewTaskColor(c.class)} 
                            className={`w-6 h-6 rounded-full border-2 ${c.border} ${c.class} ${newTaskColor === c.class ? 'scale-110 shadow-sm border-primary' : 'hover:scale-105'} transition-all`}
                         />
                      ))}
                   </div>
                   
                   <div className="flex gap-3 relative">
                     <button onClick={addTask} className="w-12 h-12 bg-primary text-white rounded-2xl flex items-center justify-center shrink-0 shadow-lg shadow-primary-glow active:scale-90 transition-transform"><Plus className="w-5 h-5"/></button>
                     <input value={newTaskText} onChange={e => setNewTaskText(e.target.value)} onKeyDown={handleTaskInputKeyDown} placeholder="הוסף משימה קטנה..." className="flex-1 bg-gray-50 rounded-2xl px-4 text-right text-sm font-bold outline-none border-2 border-transparent focus:border-primary focus:bg-white transition-all shadow-inner" />
                   </div>
                </div>
              </div>

              {/* Habit Wizard */}
              {isHabitWizardOpen && (
                <div className="absolute inset-0 z-[3100] flex items-center justify-center p-4 animate-in fade-in duration-300">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-md" />
                  <div className="w-full bg-white rounded-[40px] p-8 shadow-2xl relative overflow-hidden flex flex-col min-h-[460px] animate-in slide-in-from-bottom-4">
                     <div className="relative z-10 flex-1 flex flex-col justify-center items-center text-center">
                       {wizardStep === 1 && (
                         <div className="animate-in fade-in w-full">
                           <Zap className="w-12 h-12 c-primary mx-auto mb-4" />
                           <h3 className="text-xl font-black mb-4">איזו פעולה קטנה נוסיף?</h3>
                           <input value={newHabitData.action} onChange={e => setNewHabitData({...newHabitData, action: e.target.value})} placeholder="דוגמה: הליכה, קריאה..." className="w-full border-2 border-gray-100 rounded-2xl p-4 text-center font-bold outline-none focus:border-primary transition-all shadow-sm" />
                         </div>
                       )}
                       {wizardStep === 2 && (
                         <div className="animate-in fade-in w-full">
                           <TrendingUp className="w-12 h-12 c-accent mx-auto mb-4" />
                           <h3 className="text-xl font-black mb-6">כמה תרצה לבצע?</h3>
                           <div className="flex items-center justify-center gap-6 mb-8">
                             <button onClick={() => setNewHabitData(p => ({...p, quantityValue: Math.max(1, p.quantityValue - 1)}))} className="w-12 h-12 rounded-full border border-gray-100 flex items-center justify-center"><Minus /></button>
                             <span className="text-5xl font-black tabular-nums">{newHabitData.quantityValue}</span>
                             <button onClick={() => setNewHabitData(p => ({...p, quantityValue: p.quantityValue + 1}))} className="w-12 h-12 rounded-full bg-dark text-white flex items-center justify-center"><Plus /></button>
                           </div>
                         </div>
                       )}
                     </div>
                     <button onClick={handleWizardNext} className="relative z-10 w-full bg-dark text-white py-5 rounded-3xl font-black text-lg mt-4 shadow-xl active:scale-95 transition-all">סיום והוספה</button>
                     <button onClick={() => setIsHabitWizardOpen(false)} className="mt-4 text-gray-400 text-xs font-black self-center">ביטול</button>
                  </div>
                </div>
              )}

              {/* Vision Board */}
              {showVisionPopup && (
                <div className="absolute inset-0 z-[3100] flex items-center justify-center p-4 animate-in fade-in duration-300">
                  <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setShowVisionPopup(false)} />
                  <div className="w-full max-h-[85vh] bg-white rounded-[2rem] shadow-2xl relative overflow-hidden flex flex-col animate-in zoom-in-95">
                     
                     <div className="relative w-full h-40 bg-gray-100 shrink-0 group">
                        {visionBoard.imageUrl ? (
                           <img src={visionBoard.imageUrl} className="w-full h-full object-cover" alt="Vision Board" />
                        ) : (
                           <div className="w-full h-full flex items-center justify-center text-gray-400 flex-col gap-2 bg-gray-50">
                              <Camera className="w-8 h-8 opacity-50" />
                              <span className="text-xs font-bold">לחץ להוספת תמונת השראה</span>
                           </div>
                        )}
                        <label className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer">
                           <Camera className="w-8 h-8 text-white" />
                           <input type="file" accept="image/*" className="hidden" onChange={(e) => {
                              const file = e.target.files[0];
                              if (file) {
                                const reader = new FileReader();
                                reader.onload = (event) => setVisionBoard(prev => ({ ...prev, imageUrl: event.target.result }));
                                reader.readAsDataURL(file);
                              }
                           }} />
                        </label>
                        <button onClick={() => setShowVisionPopup(false)} className="absolute top-4 right-4 w-8 h-8 bg-black/50 text-white rounded-full flex items-center justify-center backdrop-blur-md hover:bg-black/70 transition-colors z-20">
                           <ChevronDown className="w-5 h-5" />
                        </button>
                     </div>
                     
                     <div className="p-6 flex-1 flex flex-col bg-[#F8F9FB] overflow-hidden">
                        <div className="flex items-center gap-2 mb-6 shrink-0">
                           <Star className="w-6 h-6 text-gold fill-gold" />
                           <h2 className="text-xl font-black c-dark">החזון הגדול שלי</h2>
                        </div>
                        <div className="w-full flex-1 bg-white rounded-2xl p-6 shadow-sm border border-gray-100 overflow-y-auto no-scrollbar">
                           {visionBoard.text ? (
                               <p className="text-base font-medium c-dark leading-loose text-right whitespace-pre-wrap">
                                   {visionBoard.text}
                               </p>
                           ) : (
                               <div className="flex flex-col items-center justify-center h-full text-gray-400 opacity-60 gap-4">
                                   <Star className="w-12 h-12" />
                                   <span className="font-bold text-center text-sm leading-relaxed">
                                       החזון שלך מתגבש כאן...<br/>
                                       ענה על השאלות במסך הראשי כדי לבנות אותו!
                                   </span>
                               </div>
                           )}
                        </div>
                     </div>
                  </div>
                </div>
              )}

              {/* Community Popup */}
              {showCommunityPopup && (
                <div className="absolute inset-0 z-[3100] flex items-end justify-center animate-in fade-in duration-300">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setShowCommunityPopup(false)} />
                  <div className="w-full h-[70%] bg-[#F8F9FB] rounded-t-[2.5rem] p-6 shadow-2xl relative flex flex-col animate-in slide-in-from-bottom-8">
                    <div className="flex items-center justify-between mb-4 shrink-0">
                      <h2 className="font-black text-xl c-dark flex items-center gap-2"><Users className="w-6 h-6 c-primary"/> קהילת המצליחנים</h2>
                      <button onClick={() => setShowCommunityPopup(false)} className="p-2 bg-white rounded-full border border-gray-100 shadow-sm"><ChevronDown className="w-5 h-5 text-gray-500"/></button>
                    </div>
                    
                    <div className="flex-1 flex flex-col items-center justify-center text-center pb-8 pt-4 overflow-y-auto no-scrollbar">
                        <div className="w-20 h-20 bg-white border border-gray-100 rounded-full flex items-center justify-center mb-4 shadow-sm">
                            <Lock className="w-10 h-10 text-gray-300" />
                        </div>
                        <h3 className="text-2xl font-black c-dark mb-2">הקהילה בדרך!</h3>
                        <p className="text-sm text-gray-500 mb-8 px-6 leading-relaxed font-medium">
                            הגישה לקהילה נפתחת בשלב ה<strong className="c-dark font-black">מומנטום</strong> (ביום ה-10 שלך).<br/>תמשיך להתמיד, אתה קרוב!
                        </p>
                        
                        <div className="w-full space-y-4 px-2">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="h-px bg-gray-200 flex-1"></div>
                                <span className="text-[10px] font-black text-gray-400">בינתיים, אפשר להצטרף כאן</span>
                                <div className="h-px bg-gray-200 flex-1"></div>
                            </div>
                            
                            <button className="w-full py-4 bg-[#25D366] text-white rounded-2xl font-black text-sm shadow-lg shadow-[#25D366]/20 flex items-center justify-center gap-3 active:scale-95 transition-transform">
                                <svg className="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                                קבוצת ה-WhatsApp
                            </button>

                            <button className="w-full py-4 bg-[#1877F2] text-white rounded-2xl font-black text-sm shadow-lg shadow-[#1877F2]/20 flex items-center justify-center gap-3 active:scale-95 transition-transform">
                                <svg className="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                קבוצת ה-Facebook
                            </button>
                        </div>
                    </div>
                  </div>
                </div>
              )}

            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
