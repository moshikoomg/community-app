\<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minimum Winner</title>
  
  <!-- CDN Libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,700;1,300&display=swap');
    
    body { font-family: 'Heebo', sans-serif; user-select: none; margin: 0; position: fixed; width: 100%; height: 100%; overflow: hidden; }
    #physics-container { position: absolute; inset: 0; z-index: 10; pointer-events: auto; cursor: grab; }
    #physics-container:active { cursor: grabbing; }

    @keyframes clickBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.4); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    .click-bounce-anim { animation: clickBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    .sidebar { position: absolute; right: 0; top: 0; bottom: 0; display: flex; flex-direction: column; transition: width 500ms cubic-bezier(0.19, 1, 0.22, 1), transform 500ms cubic-bezier(0.19, 1, 0.22, 1); z-index: 50; overflow: hidden; background: white; pointer-events: auto; }
    .sidebar-btn { width: 56px; height: 56px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); position: relative; border: none; flex-shrink: 0; transition: all 0.4s; overflow: hidden; cursor: pointer; }
    
    @keyframes exitUp { 0% { transform: translate(-50%, 0) scale(1); opacity: 1; } 100% { transform: translate(-50%, -120vh) scale(1.1); opacity: 0; } }
    .animate-exit-up { animation: exitUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    @keyframes bouncePop { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    .bounce-pop { animation: bouncePop 0.4s ease-out; }
    @keyframes glowPulse { 0% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); } 50% { box-shadow: 0 0 60px rgba(251, 191, 36, 0.8); } 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); } }
    .active-ball-glow { animation: glowPulse 2s infinite ease-in-out; }
    @keyframes yellowPing { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.8); } 100% { box-shadow: 0 0 0 60px rgba(251, 191, 36, 0); } }
    .yellow-halo-flash { animation: yellowPing 0.7s ease-out forwards; }
    @keyframes buttonPump { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .animate-button-pop { animation: buttonPump 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    
    .habit-list-container { position: absolute; top: 25%; bottom: 180px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    .habit-item { transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .slide-in-right { animation: slideInRight 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
    @keyframes slideInRight { 0% { transform: translateX(100%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
    .slide-out-right { animation: slideOutRight 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
    @keyframes slideOutRight { 0% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(150%); opacity: 0; } }
    
    .explanation-sphere { position: absolute; width: 160px; height: 160px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); cursor: pointer; overflow: hidden; }
    .explanation-sphere.center { transform: translate3d(0, 0, 100px); z-index: 50; opacity: 1; box-shadow: 0 30px 60px -10px rgba(0,0,0,0.2); }
    .explanation-sphere.side { z-index: 10; opacity: 0.15; filter: blur(8px) grayscale(50%); }
    .explanation-sphere.left { transform: translate3d(-140px, 20px, -150px) rotateY(20deg); }
    .explanation-sphere.right { transform: translate3d(140px, 20px, -150px) rotateY(-20deg); }
    .explanation-sphere.hidden { transform: translate3d(0, 50px, -300px); opacity: 0; }
    .majest-card { width: 90%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); border-radius: 40px; padding: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.08); transition: all 0.6s ease; }
    .info-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-style: italic; color: #000; }
    
    /* סגנונות מותאמים אישית למסכים רחבים יותר */
    @media (min-width: 640px) {
      .majest-card { padding: 30px; }
      .info-title { font-size: 38px; }
    }
    
    .backlight-spot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 70%); pointer-events: none; z-index: -1; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    // --- Inline Lucide Icons to prevent UMD loading errors ---
    const Icon = ({ children, className = "", size = 24, ...rest }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...rest}>
        {children}
      </svg>
    );

    const User = (props) => <Icon {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
    const Check = (props) => <Icon {...props}><polyline points="20 6 9 17 4 12"/></Icon>;
    const X = (props) => <Icon {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const ChevronLeft = (props) => <Icon {...props}><polyline points="15 18 9 12 15 6"/></Icon>;
    const Plus = (props) => <Icon {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Minus = (props) => <Icon {...props}><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Lock = (props) => <Icon {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
    const Shield = (props) => <Icon {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></Icon>;
    const Flag = (props) => <Icon {...props}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></Icon>;

    // --- נתוני פתיחה ---
    const introCardsData = [
      { title: 'כוח רצון הוא משאב זמני.', desc: 'אם נבנה על מוטיבציה בלבד כדי להתמיד, ההרגל פשוט לא יחזיק מעמד.' },
      { title: 'הסוד הוא בפעולות מגוחכות.', desc: 'פעולה כל כך קטנה, שאין שום סיכוי או תירוץ לא לעשות אותה, גם ביום הכי קשה.' },
      { title: 'הניצחון כבר מובטח.', desc: 'מתחייבים למינימום. כל יום. הבונוס הוא רק אם מתחשק לך, אבל הרצף נשמר.' }
    ];

    // --- לוגיקת יחידות מידה ---
    const getUnits = (name) => {
      const lowerName = name.toLowerCase();
      if (lowerName.includes('ספר') || lowerName.includes('קריאה')) return { minU: 'עמוד', maxU: 'עמודים' };
      if (lowerName.includes('ריצה') || lowerName.includes('הליכה')) return { minU: 'ק"מ', maxU: 'ק"מ' };
      if (lowerName.includes('מים')) return { minU: 'כוס', maxU: 'כוסות' };
      if (lowerName.includes('מדיטציה')) return { minU: 'דקה', maxU: 'דקות' };
      return { minU: 'פעם', maxU: 'פעמים' }; 
    };

    // יצירת טקסטורה לכדורים בפיזיקה (אחידות מלאה בין תמונה לאייקון)
    const createBallTexture = (emoji, colorStr, customImgUrl = null, size = 128) => {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, size, size);
        ctx.save();
        ctx.beginPath(); ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2); ctx.clip();

        if (customImgUrl) {
          const img = new Image();
          img.crossOrigin = "Anonymous";
          img.onload = () => {
            const aspect = img.width / img.height;
            let drawW = size, drawH = size, drawX = 0, drawY = 0;
            if (aspect > 1) { drawW = size * aspect; drawX = -(drawW - size) / 2; }
            else { drawH = size / aspect; drawY = -(drawH - size) / 2; }
            ctx.drawImage(img, drawX, drawY, drawW, drawH);
            ctx.restore();
            const highlight = ctx.createRadialGradient(size * 0.28, size * 0.28, 0, size * 0.28, size * 0.28, size * 0.4);
            highlight.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            highlight.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = highlight;
            ctx.beginPath(); ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2); ctx.fill();
            resolve(canvas.toDataURL());
          };
          img.src = customImgUrl;
        } else {
          let c1 = '#a78bfa', c2 = '#8b5cf6';
          const matches = colorStr.match(/#[a-fA-F0-9]{3,6}/g);
          if (matches) { c1 = matches[0]; c2 = matches[1] || matches[0]; }
          const mainGrad = ctx.createRadialGradient(size * 0.3, size * 0.3, size * 0.1, size / 2, size / 2, size / 2);
          mainGrad.addColorStop(0, c1); mainGrad.addColorStop(1, c2);
          ctx.fillStyle = mainGrad;
          ctx.fill();
          ctx.restore();
          ctx.font = `${size * 0.55}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = 'white'; ctx.fillText(emoji, size / 2, size / 2 + size * 0.05);
          resolve(canvas.toDataURL());
        }
      });
    };

    const emotions = [
      { id: 1, colorFull: 'from-[#a78bfa] to-[#8b5cf6]', face: '🤩', hex: '#a78bfa', label: "אנרגיית שיא", desc: "מצב שבו אתה מרגיש בשיא הכוח והתשוקה שלך. זמן לפעולות המורכבות ביותר." }, 
      { id: 2, colorFull: 'from-[#f472b6] to-[#ec4899]', face: '😮', hex: '#f472b6', label: "סקרנות וגילוי", desc: "רגע של פתיחות ללמידה ודברים חדשים. מצוין להרגלי קריאה ומחקר." }, 
      { id: 3, colorFull: 'from-[#60a5fa] to-[#3b82f6]', face: '😉', hex: '#60a5fa', label: "שלווה ממוקדת", desc: "ריכוז שקט וחד. מתאים להרגלי עבודה עמוקה ומשימות מנטליות." }, 
      { id: 4, colorFull: 'from-[#fbbf24] to-[#f59e0b]', face: '😋', hex: '#fbbf24', label: "הנאה וסיפוק", desc: "הנאה מהדרך ומהניצחונות הקטנים. הרגע שבו ההרגל הופך לתענוג." }, 
      { id: 5, colorFull: 'from-[#4ade80] to-[#2dd4bf]', face: '😊', hex: '#4ade80', label: "הרמוניה פנימית", desc: "חיבור פנימי עדין. זמן מעולה למדיטציה, יוגה או פשוט נשימה עמוקה." }, 
    ];

    const unitOptions = ['פעמים', 'כוסות', 'עמודים', 'דקות', 'ק״מ'];
    const habitSuggestions = ['כוס מים', 'הליכה', 'שכיבות סמיכה', 'קריאה', 'מדיטציה'];

    function App() {
      const [appFlow, setAppFlow] = useState('SCREEN_1_LOGIN'); 
      const [introIndex, setIntroIndex] = useState(0);
      const [explanationIndex, setExplanationIndex] = useState(0);
      const [dragStartX, setDragStartX] = useState(null);
      const [dragOffset, setDragOffset] = useState(0);

      const [showTopPopup, setShowTopPopup] = useState(false);
      const [wizardStep, setWizardStep] = useState(1);
      const [newHabit, setNewHabit] = useState({ name: '', amount: 1, unit: 'פעמים', ridiculousAction: '' });
      
      const [tasks, setTasks] = useState([]);
      const [gameState, setGameState] = useState('EMOTION'); 
      const [activeEmotion, setActiveEmotion] = useState(null);
      const [activeEmoStartPos, setActiveEmoStartPos] = useState(0); 
      const [activeIndex, setActiveIndex] = useState(0);
      
      const [pulseData, setPulseData] = useState({ active: false, x: 0, y: 0, power: 0 });

      const [lottoPhase, setLottoPhase] = useState('IDLE');
      const [poppingId, setPoppingId] = useState(null);

      const [settingsData, setSettingsData] = useState({ 
        ballSprites: {}, stageImages: {}, profilePic: null, drawerBgColor: '#ffffff', drawerOpacity: 0.95, drawerBlur: 20, 
        primaryBtnColor: '#0f172a', primaryBtnTextColor: '#ffffff', userName: 'משה אלי', totalDays: 0,
      });

      const [workspace, setWorkspace] = useState({ isOpen: false, activeTab: 'profile' });

      // --- משתנים נגזרים ---
      const MAX_HABITS = 5;
      const currentShields = Math.min(3, Math.floor(settingsData.totalDays / 10));
      const lockedHabitsCount = Math.max(0, MAX_HABITS - tasks.length);
      const isDrawerFullyClosed = lottoPhase === 'IDLE' || ['EXIT_STAGE_1', 'EXIT_STAGE_2', 'DROPPING'].includes(gameState);
      const isDrawerExpanded = ['PARALLEL_TRANSITION', 'BALL_HALO', 'SELECTING'].includes(gameState);

      const appContainerRef = useRef(null);
      const sceneRef = useRef(null);
      const engineRef = useRef(null);

      const UnifiedBall = ({ emo, sizeClass = "w-14 h-14", fontClass = "text-3xl", isFloating = false }) => {
        const customImg = settingsData.ballSprites[emo.id];
        return (
          <div className={`${sizeClass} rounded-full flex items-center justify-center overflow-hidden shadow-2xl transition-all duration-700
              ${!customImg ? `bg-gradient-to-t ${emo.colorFull}` : ''}
              ${isFloating && gameState === 'EMOTION_POP' ? 'click-bounce-anim' : ''}
              ${isFloating && gameState === 'BALL_HALO' ? 'yellow-halo-flash' : ''}
              ${isFloating && gameState === 'SELECTING' ? 'active-ball-glow animate-profile-hover' : ''}`}
              style={{ backgroundImage: customImg ? `url(${customImg})` : 'none', backgroundSize: 'cover', backgroundPosition: 'center' }}>
              {!customImg && <span className={fontClass}>{emo.face}</span>}
          </div>
        );
      };

      const handleNextIntro = () => {
        if (introIndex < 2) setIntroIndex(p => p + 1);
        else setAppFlow('SCREEN_EXPLANATION');
      };

      const handleDragEnd = () => {
        if (dragStartX === null) return;
        if (Math.abs(dragOffset) > 100) handleNextIntro();
        setDragStartX(null); setDragOffset(0);
      };

      useEffect(() => {
        if (appFlow === 'MAIN') {
          initMatter();
        }
      }, [appFlow]);

      const initMatter = async () => {
        if (!sceneRef.current) return;
        const Matter = window.Matter;
        const engine = Matter.Engine.create();
        engineRef.current = engine;
        engine.world.gravity.y = 5.0; 

        // --- אינטראקציית "זריקה" וגרירה (Throw & Flick) ---
        const mouse = Matter.Mouse.create(sceneRef.current);
        const mouseConstraint = Matter.MouseConstraint.create(engine, {
          mouse: mouse,
          constraint: {
            stiffness: 0.2, // גמישות לתפיסה וזריקה
            render: { visible: false }
          }
        });

        // מאזין התנגשות להתכווצות
        Matter.Events.on(engine, 'collisionStart', (event) => {
          event.pairs.forEach((pair) => {
            if (pair.bodyA.label === 'currentDay' || pair.bodyB.label === 'currentDay') {
              const body = pair.bodyA.label === 'currentDay' ? pair.bodyA : pair.bodyB;
              if (body.label === 'currentDay') {
                smoothShrink(body);
                body.label = 'settled';
                if (navigator.vibrate) navigator.vibrate(30);
              }
            }
          });
        });

        const width = sceneRef.current.clientWidth;
        const height = sceneRef.current.clientHeight;
        const render = Matter.Render.create({
          element: sceneRef.current, engine: engine,
          options: { width, height, wireframes: false, background: 'transparent', pixelRatio: window.devicePixelRatio || 1 }
        });
        
        const wallOptions = { isStatic: true, render: { visible: false }, friction: 0.1, restitution: 0.4 };
        const introFloor = Matter.Bodies.rectangle(width / 2, height - 10, width, 40, { isStatic: true, render: { visible: false } });
        
        Matter.Composite.add(engine.world, [
          introFloor,
          Matter.Bodies.rectangle(-20, height / 2, 40, height * 2, wallOptions),
          Matter.Bodies.rectangle(width + 20, height / 2, 40, height * 2, wallOptions),
          mouseConstraint // הוספת המנגנון שמאפשר העפה
        ]);
        
        Matter.Render.run(render); 
        Matter.Runner.run(Matter.Runner.create(), engine);
        
        const textures = await Promise.all(emotions.map(emo => createBallTexture(emo.face, emo.hex, settingsData.ballSprites[emo.id], 128)));
        const introBalls = [];
        for (let i = 0; i < 35; i++) {
          const radius = Math.random() * 10 + 35; 
          const texIndex = Math.floor(Math.random() * 5);
          const ball = Matter.Bodies.circle((Math.random() * (width - 40)) + 20, -Math.random() * 1500 - 100, radius, { restitution: 0.7, friction: 0.05, render: { sprite: { texture: textures[texIndex], xScale: (radius * 2) / 128, yScale: (radius * 2) / 128 } } });
          introBalls.push(ball);
        }
        Matter.Composite.add(engine.world, introBalls);
        setShowTopPopup(true);
        setTimeout(() => { if(introFloor) Matter.Body.setPosition(introFloor, { x: width / 2, y: height + 500 }); }, 4500);
        setTimeout(() => {
          Matter.Composite.remove(engine.world, introBalls);
          Matter.Composite.remove(engine.world, introFloor);
          Matter.Composite.add(engine.world, Matter.Bodies.rectangle(width / 2, height + 20, width, 40, wallOptions)); 
        }, 7000);
      };

      const smoothShrink = (body) => {
        const Matter = window.Matter;
        const steps = 10;
        const stepSize = (1.35 - 1.0) / steps;
        let count = 0;
        const interval = setInterval(() => {
          if (count >= steps) clearInterval(interval);
          else {
            const scaleFactor = (1.35 - stepSize * (count + 1)) / (1.35 - stepSize * count);
            Matter.Body.scale(body, scaleFactor, scaleFactor);
            if (body.render.sprite) {
               body.render.sprite.xScale *= scaleFactor;
               body.render.sprite.yScale *= scaleFactor;
            }
            count++;
          }
        }, 15);
      };

      const startSidebarSequence = () => {
        setLottoPhase('SIDEBAR_OPEN');
        setTimeout(() => setLottoPhase('BALLS_DROP'), 250); 
        setTimeout(() => setLottoPhase('PROFILE_APPEAR'), 700); 
        setTimeout(() => { playPopSeq(); }, 1100); 
      };

      const playPopSeq = () => {
        setLottoPhase('SEQUENCE_POP');
        let idx = 0;
        const interval = setInterval(() => {
          if (idx < emotions.length) { setPoppingId(emotions[idx].id); idx++; }
          else { clearInterval(interval); setPoppingId(null); setLottoPhase('READY'); }
        }, 200);
      };

      const handleStartSelection = (e, emo) => {
        if (gameState !== 'EMOTION' || workspace.isOpen || lottoPhase !== 'READY' || tasks.length === 0) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const containerRect = appContainerRef.current.getBoundingClientRect();
        setActiveEmoStartPos(rect.top - containerRect.top);
        setActiveEmotion(emo);
        
        setGameState('EMOTION_POP'); 
        setTimeout(() => setGameState('PARALLEL_TRANSITION'), 100);
        setTimeout(() => setGameState('BALL_HALO'), 300);
        setTimeout(() => setGameState('SELECTING'), 450); 
      };

      const executeDrop = async () => {
        if (!activeEmotion) return;
        setGameState('EXIT_STAGE_1');
        setTimeout(() => {
          setGameState('EXIT_STAGE_2');
          setTimeout(async () => {
            setGameState('DROPPING');
            const Matter = window.Matter;
            const width = appContainerRef.current.clientWidth;
            const radius = Math.min(width * 0.12, 38);
            const texture = await createBallTexture(activeEmotion.face, activeEmotion.hex, settingsData.ballSprites[activeEmotion.id]);
            const spawnRadius = radius * 1.35;
            const ball = Matter.Bodies.circle(width / 2, -60, spawnRadius, { 
              label: 'currentDay', restitution: 0.5, friction: 0.1, 
              render: { sprite: { texture, xScale: (spawnRadius * 2) / 128, yScale: (spawnRadius * 2) / 128 } } 
            });
            Matter.Composite.add(engineRef.current.world, ball);
            setTimeout(() => { setGameState('EMOTION'); setActiveEmotion(null); }, 2000);
          }, 50); 
        }, 300); 
      };

      const handleCreateHabitFinish = () => {
        const habit = { id: Date.now(), name: newHabit.name, amount: newHabit.amount, ridiculousAction: newHabit.ridiculousAction, minU: newHabit.unit, maxU: newHabit.unit };
        setTasks([habit, ...tasks]);
        setShowTopPopup(false); setWizardStep(1); setGameState('EMOTION');
        setTimeout(() => startSidebarSequence(), 200); 
      };

      return (
        <div className="fixed inset-0 bg-[#0F172A] flex justify-center items-center font-sans overflow-hidden" 
             onMouseDown={e => { if(appFlow==='SCREEN_2_CARDS') setDragStartX(e.clientX); }}
             onMouseMove={e => { if(dragStartX!==null) setDragOffset(e.clientX - dragStartX); }}

                                     {settingsData.ballSprites[emo.id] ? <img src={settingsData.ballSprites[emo.id]} className="w-full h-full rounded-full object-cover" alt="emo" /> : emo.face}
                                   </div>
                                   <div className="flex-1 text-[11px] font-black text-slate-300">העלה אייקון {emo.face}<input type="file" accept="image/*" className="mt-1 w-full text-slate-400 font-heebo" onChange={e => { const f = e.target.files?.[0]; if (f) setSettingsData(s => ({...s, ballSprites: {...s.ballSprites, [emo.id]: URL.createObjectURL(f)}})) }} /></div>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    // ציור האפליקציה למסך (כפי שביקשת)
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
