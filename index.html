<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>אפליקציית הרגלים</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3",
        "@formkit/auto-animate": "https://esm.sh/@formkit/auto-animate@0.8.2"
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #F0F2F5; font-family: 'Rubik', system-ui, -apple-system, sans-serif; }
    .btn-google { background: white; color: #1f2937; transition: all 0.2s; border: 1px solid #e5e7eb; }
    .btn-google:hover { background: #f9fafb; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    
    @keyframes badge-float-scale {
      0%, 100% { transform: translateY(0px) scale(1.25); }
      50% { transform: translateY(-8px) scale(1.35); }
    }
    .animate-badge-current { animation: badge-float-scale 2.5s ease-in-out infinite; }
    
    @keyframes halo-oppose-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0.15; }
      50% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
    }
    .animate-halo-current { animation: halo-oppose-pulse 2.5s ease-in-out infinite; }

    @keyframes pop-in {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes spark {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(1.5) translateY(-20px) rotate(45deg); opacity: 0; }
    }
    .sparkle { position: absolute; width: 6px; height: 6px; border-radius: 50%; opacity: 0; z-index: 20; pointer-events: none; }
    .sparkle-1 { background: #FFCC00; animation: spark 0.6s ease-out forwards; top: 10px; right: 10px; }
    .sparkle-2 { background: #007AFF; animation: spark 0.6s ease-out forwards 0.1s; bottom: 10px; left: 10px; }
    .sparkle-3 { background: #34C759; animation: spark 0.6s ease-out forwards 0.2s; top: 20px; left: 20px; }
    .sparkle-4 { background: #FF9500; animation: spark 0.6s ease-out forwards 0.05s; bottom: 20px; right: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { createClient } from '@supabase/supabase-js';
    import autoAnimate from '@formkit/auto-animate';
    import { 
      Star, Check, Lightbulb, Trophy, Crown, Medal, Award, Users, ArrowLeft, TrendingUp, Menu, Plus, Clock, Trash2, GripVertical, ArrowUpToLine, ArrowDownAZ, Sun, Sunset, Moon, AlignLeft, ChevronDown, ChevronUp, Lock, Target, Send, Sparkles, PartyPopper, Search, AlertCircle, Move, Droplet, Zap, Edit3, Minus, Calendar, Camera, Settings, ArrowRight, User, Palette, CreditCard, Wrench, Share2, ChevronLeft, Flag, Loader2, Cloud, CloudOff, Shield, Flame
    } from 'lucide-react';

    const SUPABASE_URL = 'https://igpzawemolsajreiuxck.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlncHphd2Vtb2xzYWpyZWl1eGNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTE3MTIsImV4cCI6MjA5MTEyNzcxMn0.b3Q1nlHddqAgg8AJS4gV73USVvujno0-HRpLFPny7Ww';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const INITIAL_HABITS_DATA = [
      { id: 1, title: 'שכיבות סמיכה', targetValue: 15, unit: 'חזרות', bestTime: '09:00', streak: 12 },
      { id: 2, title: 'שתיית מים', targetValue: 8, unit: 'כוסות', bestTime: '12:00', streak: 5 },
      { id: 3, title: 'מדיטציה', targetValue: 15, unit: 'דקות', bestTime: '18:00', streak: 0 }
    ];

    const getTodayDate = () => new Date().toISOString().split('T')[0];

    const ICONS_POOL = [<Trophy />, <Crown />, <Medal />, <Award />, <Star />, <Zap />];
    
    const BADGE_NAMES = [
      'יסוד', 'מומנטום', 'קצב', 'רצף', 'שגרה', 'משמעת',
      'מיקוד', 'עקביות', 'החלטה', 'נחישות', 'רצון', 'חוסן',
      'יציבות', 'כוח', 'סיבולת', 'התמדה', 'עיקשות', 'אחיזה',
      'מסירות', 'מחויבות', 'שורשים', 'עוגן', 'אמונה', 'אופי',
      'חציבה', 'ברזל', 'איתנות', 'זרימה', 'דרך', 'נוכחות'
    ];
    
    const INITIAL_BADGES = BADGE_NAMES.map((name, idx) => ({
      id: idx + 1, icon: ICONS_POOL[idx % ICONS_POOL.length], completed: idx === 0, label: name, imageUrl: null
    }));

    const NLP_QUESTIONS = [
      "אילו הרגלים ותכונות תרצה לרכוש כדי להגשים את החזון?",
      "אילו אנשים תרצה לפגוש יותר בחייך שיקדמו אותך למטרה?",
      "אילו אמונות מגבילות היית רוצה להטיל בהן ספק ולאמץ חדשות?",
      "איך ייראה יום אידיאלי בחייך בעוד שנה מהיום?",
      "מהו הצעד הקטן והפשוט ביותר שאתה יכול לעשות כבר היום?"
    ];

    const CURRENT_DAY = 10;
    const TARGET_DAY = 17;

    const TASK_COLORS = [
      { id: 'white', class: 'bg-white', border: 'border-gray-200' },
      { id: 'blue', class: 'bg-blue-50', border: 'border-blue-200' },
      { id: 'red', class: 'bg-red-50', border: 'border-red-200' },
      { id: 'orange', class: 'bg-orange-50', border: 'border-orange-200' },
      { id: 'green', class: 'bg-green-50', border: 'border-green-200' },
      { id: 'purple', class: 'bg-purple-50', border: 'border-purple-200' }
    ];

    const ALL_DAYS = Array.from({ length: 28 }, (_, i) => {
      const date = i + 1;
      const labels = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];
      const status = date < CURRENT_DAY ? 'past' : (date === CURRENT_DAY ? 'today' : 'future');
      let completionLevel = 'none';
      if (status === 'past') {
        if (date % 4 === 0) completionLevel = 'all_extra';
        else if (date % 3 === 0) completionLevel = 'some_extra';
        else if (date % 2 === 0) completionLevel = 'all_done';
        else completionLevel = 'partial';
      }
      return { date, label: labels[(date - 1) % 7], status, isToday: date === CURRENT_DAY, isTarget: date === TARGET_DAY, completionLevel };
    });

    const HEADER_TABS = [
      { id: 'daily', label: 'משימה יומית' },
      { id: 'news', label: 'קהילה' },
      { id: 'vision', label: 'חזון' }
    ];

    const SettingsMenuItem = ({ icon, label, onClick }) => (
      <button onClick={onClick} className="w-full bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:border-gray-200 active:scale-[0.98] transition-all">
          <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-gray-500">{icon}</div>
              <span className="font-bold text-sm c-dark">{label}</span>
          </div>
          <ChevronLeft className="w-4 h-4 text-gray-300" />
      </button>
    );

    const LoginScreen = ({ onLogin, onGuestLogin }) => {
      const [isLoading, setIsLoading] = useState(false);
      const handleLogin = async () => {
        setIsLoading(true);
        try {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
            if (error) throw error;
        } catch (error) {
            console.error("Login error:", error);
            setIsLoading(false);
        }
      };
      return (
        <div className="min-h-screen bg-[#F0F2F5] flex items-center justify-center font-sans" dir="rtl">
          <div className="w-full h-screen md:h-[844px] md:max-w-[390px] bg-white md:rounded-[3rem] shadow-2xl flex flex-col items-center justify-center p-8">
            <Trophy className="w-20 h-20 text-[#007AFF] mb-6 drop-shadow-lg" />
            <h1 className="text-3xl font-black mb-2 text-center text-gray-900">ברוכים הבאים</h1>
            <p className="text-gray-500 text-center mb-10 px-4">התחבר כדי לשמור את ההרגלים וההתקדמות שלך בענן.</p>
            <button onClick={handleLogin} disabled={isLoading} className="btn-google w-full flex items-center justify-center gap-3 px-6 py-4 rounded-2xl font-bold text-lg shadow-sm">
              {isLoading ? <Loader2 className="w-6 h-6 animate-spin" /> : <img src="https://www.google.com/favicon.ico" className="w-6 h-6" alt="G" />}
              התחברות עם Google
            </button>
            <button onClick={onGuestLogin} className="mt-6 text-sm font-bold text-gray-400 hover:text-gray-600 transition-colors">
              המשך כאורח (ללא שמירה)
            </button>
          </div>
        </div>
      );
    };

    function App() {
      // --- ALL STATES FROM YOUR ORIGINAL CODE ---
      const [session, setSession] = useState(null);
      const [isGuest, setIsGuest] = useState(false); 
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [syncStatus, setSyncStatus] = useState('synced');
      const [headerView, setHeaderView] = useState('daily'); 
      const [habitsStatus, setHabitsStatus] = useState({});
      const [habits, setHabits] = useState(INITIAL_HABITS_DATA);
      const [isTaskDrawerOpen, setIsTaskDrawerOpen] = useState(false);
      const [editingTaskId, setEditingTaskId] = useState(null);
      const [animatingHabitId, setAnimatingHabitId] = useState(null);
      const [user, setUser] = useState({ level: 1, xp: 0, shields: 0, perfectDaysStreak: 0, name: 'אורח', lastLoginDate: getTodayDate() });
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [settingsView, setSettingsView] = useState('main'); 
      const [badges, setBadges] = useState(INITIAL_BADGES);
      const [theme, setTheme] = useState({ primary: '#007AFF', gold: '#FFCC00', accent: '#FF9500', dark: '#1C1C1E', bgStart: '#F4F7F9', bgEnd: '#FFFFFF' });
      const [avatars, setAvatars] = useState({ start: null, firstAction: null, day10: null, levelUp: null });
      const [isHabitWizardOpen, setIsHabitWizardOpen] = useState(false);
      const [wizardStep, setWizardStep] = useState(1);
      const [newHabitData, setNewHabitData] = useState({ action: '', quantityValue: 1, quantityUnit: 'דקות', bestTime: '10:00' });
      const [tasks, setTasks] = useState([]);
      const [newTaskText, setNewTaskText] = useState('');
      const [newTaskColor, setNewTaskColor] = useState('bg-white');
      const [draggedIdx, setDraggedIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);
      const [visionAnswer, setVisionAnswer] = useState('');
      const [nlpQuestionIdx, setNlpQuestionIdx] = useState(0);
      const [showCommunityPopup, setShowCommunityPopup] = useState(false);
      const [showVisionPopup, setShowVisionPopup] = useState(false);
      const [visionBoard, setVisionBoard] = useState({ text: '', imageUrl: null });

      const calendarRef = useRef(null);
      const badgesRef = useRef(null); 
      const scrollRef = useRef(null);
      const tasksListRef = useRef(null);
      const completedTasksListRef = useRef(null);

      // --- SUPABASE CONNECTIVITY ---
      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (session) loadUserData(session);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          if (session) loadUserData(session);
        });
        return () => subscription.unsubscribe();
      }, []);

      const loadUserData = async (currentSession) => {
        const { data } = await supabase.from('user_data').select('app_data').eq('user_id', currentSession.user.id).single();
        if (data && data.app_data) {
           const d = data.app_data;
           if (d.habits) setHabits(d.habits);
           if (d.habitsStatus) setHabitsStatus(d.habitsStatus);
           if (d.tasks) setTasks(d.tasks);
           if (d.user) setUser(d.user);
           if (d.theme) setTheme(d.theme);
           if (d.avatars) setAvatars(d.avatars);
           if (d.visionBoard) setVisionBoard(d.visionBoard);
           if (d.badges) {
             const restored = d.badges.map(b => ({...b, icon: INITIAL_BADGES.find(ib => ib.id === b.id)?.icon}));
             setBadges(restored);
           }
        }
        setIsDataLoaded(true);
      };

      useEffect(() => {
        if (!isDataLoaded || !session || isGuest) return;
        setSyncStatus('saving');
        const timer = setTimeout(async () => {
           const appDataToSave = { habits, habitsStatus, tasks, user, theme, badges, avatars, visionBoard };
           await supabase.from('user_data').upsert({ user_id: session.user.id, app_data: appDataToSave });
           setSyncStatus('synced');
        }, 1500);
        return () => clearTimeout(timer);
      }, [habits, habitsStatus, tasks, user, theme, badges, avatars, visionBoard]);

      // --- LOGIC & HELPERS ---
      const activeAvatar = useMemo(() => {
        if (session && session?.user?.user_metadata?.avatar_url && !avatars.start) return session.user.user_metadata.avatar_url;
        return user.level > 1 ? avatars.levelUp : avatars.start;
      }, [user.level, avatars, session]);

      const handleGuestLogin = () => { setIsGuest(true); setIsDataLoaded(true); };
      const todayFormatted = useMemo(() => new Intl.DateTimeFormat('he-IL', { day: 'numeric', month: 'long' }).format(new Date()), []);

      const addTask = () => {
        if(!newTaskText.trim()) return;
        setTasks([...tasks, { id: Date.now().toString(), text: newTaskText.trim(), isDone: false, color: newTaskColor }]);
        setNewTaskText('');
      };

      const toggleTaskDone = (id) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, isDone: !t.isDone } : t));
      };

      const handleHabitClick = (habit) => {
        const status = habitsStatus[habit.id] || 'none';
        const nextStatus = status === 'none' ? 'std_done' : status === 'std_done' ? 'extra' : 'std_done';
        setHabitsStatus(prev => ({ ...prev, [habit.id]: nextStatus }));
        setAnimatingHabitId(habit.id);
        setTimeout(() => setAnimatingHabitId(null), 1000);
      };

      const goToTab = (id) => {
        const el = document.getElementById(`card-${id}`);
        if (el && scrollRef.current) {
          el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          setHeaderView(id);
        }
      };

      const activeTasks = tasks.filter(t => !t.isDone);
      const stackTasks = activeTasks.slice(0, 3);

      if (!session && !isGuest) return <LoginScreen onGuestLogin={handleGuestLogin} />;
      if (!isDataLoaded) return <div className="min-h-screen flex items-center justify-center bg-[#F0F2F5] text-gray-500 font-bold"><Loader2 className="w-8 h-8 animate-spin ml-2"/> טוען...</div>;

      const currentBadge = badges.find(b => b.id === user.level);
      const headerAvatar = currentBadge?.badgeImageUrl || currentBadge?.imageUrl || activeAvatar;

      return (
        <div className="min-h-screen bg-[#F0F2F5] flex items-center justify-center font-sans" dir="rtl">
          <style>{`
            .theme-bg-gradient { background: linear-gradient(180deg, ${theme.bgStart} 0%, ${theme.bgEnd} 100%) !important; }
            .c-primary { color: ${theme.primary} !important; }
            .bg-primary { background-color: ${theme.primary} !important; }
            .c-gold { color: ${theme.gold} !important; }
            .bg-gold { background-color: ${theme.gold} !important; }
            .c-accent { color: ${theme.accent} !important; }
            .bg-accent { background-color: ${theme.accent} !important; }
            .c-dark { color: ${theme.dark} !important; }
            .bg-dark { background-color: ${theme.dark} !important; }
            .no-scrollbar::-webkit-scrollbar { display: none; }
          `}</style>

          <div className="w-full h-screen md:h-[844px] md:max-w-[390px] bg-white md:rounded-[3rem] shadow-2xl relative overflow-hidden flex flex-col">
            
            {/* Header - ORIGINAL DESIGN */}
            <div className="absolute top-0 left-0 w-full z-[150] bg-white/95 backdrop-blur-xl border-b border-gray-100 px-4 py-3 flex items-center justify-between">
              <button onClick={() => setIsSettingsOpen(true)} className="flex items-center gap-2">
                <div className="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 overflow-hidden flex items-center justify-center">
                  {headerAvatar ? <img src={headerAvatar} className="w-full h-full object-cover" /> : <User className="w-5 h-5 text-gray-400" />}
                </div>
                <div className="flex flex-col text-right">
                  <span className="text-[13px] font-black c-dark">{user.name}</span>
                  <span className="text-[10px] font-bold text-gray-500">רמה {user.level}</span>
                </div>
              </button>
              <span className="text-[11px] font-black text-gray-500">{todayFormatted}</span>
              <div className="flex items-center gap-1">
                {syncStatus === 'saving' ? <Loader2 className="w-4 h-4 animate-spin text-blue-500"/> : <Cloud className="w-4 h-4 text-green-500"/>}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto no-scrollbar theme-bg-gradient pt-20">
              
              {/* Avatar Area - ORIGINAL DESIGN */}
              <div className="relative w-full h-[280px] flex items-center justify-center p-4">
                 {activeAvatar && <img src={activeAvatar} className="max-w-full max-h-full object-contain drop-shadow-2xl" />}
              </div>

              {/* Badges Slider - ORIGINAL DESIGN */}
              <div className="relative w-full overflow-x-auto no-scrollbar flex flex-row-reverse px-4 gap-4 mb-8">
                 {badges.map(b => (
                   <div key={b.id} className={`shrink-0 flex flex-col items-center ${user.level >= b.id ? 'opacity-100' : 'opacity-30 grayscale'}`}>
                      <div className="w-12 h-12 flex items-center justify-center bg-white rounded-full shadow-sm mb-1">
                        {b.icon}
                      </div>
                      <span className="text-[10px] font-bold">{b.label}</span>
                   </div>
                 ))}
              </div>

              {/* Tabs & Content - ORIGINAL DESIGN */}
              <div className="px-4 pb-12">
                <nav className="flex gap-4 mb-4 border-b border-gray-100 pb-2">
                   {HEADER_TABS.map(tab => (
                     <button key={tab.id} onClick={() => setHeaderView(tab.id)} className={`text-xs font-black ${headerView === tab.id ? 'c-primary border-b-2 border-primary' : 'text-gray-400'}`}>{tab.label}</button>
                   ))}
                </nav>

                {headerView === 'daily' && (
                  <div className="space-y-6">
                    {/* Tasks Stack */}
                    <div className="h-40 relative flex items-center justify-center">
                       {stackTasks.length > 0 ? (
                         stackTasks.map((t, i) => (
                           <div key={t.id} onClick={() => toggleTaskDone(t.id)} className={`absolute w-full p-6 rounded-3xl bg-white border border-gray-100 shadow-xl transition-all cursor-pointer`} style={{transform: `translateY(${i*10}px) scale(${1-(i*0.05)})`, zIndex: 10-i}}>
                              <h3 className="font-black c-dark">{t.text}</h3>
                           </div>
                         ))
                       ) : <div onClick={() => setIsTaskDrawerOpen(true)} className="w-full p-6 rounded-3xl border-2 border-dashed border-gray-200 text-center text-gray-400 font-bold">הוסף משימה +</div>}
                    </div>

                    {/* Habits List */}
                    <section className="space-y-4">
                      <div className="flex justify-between items-center">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase">הרגלים</h3>
                        <button onClick={() => setIsHabitWizardOpen(true)} className="text-xs font-bold c-primary">+ חדש</button>
                      </div>
                      {habits.map(habit => (
                        <div key={habit.id} onClick={() => handleHabitClick(habit)} className={`p-4 rounded-2xl border flex items-center justify-between bg-white shadow-sm transition-all ${animatingHabitId === habit.id ? 'animate-pop scale-105' : ''}`}>
                           <div className="text-right">
                             <h4 className="font-black text-sm c-dark">{habit.title}</h4>
                             <span className="text-[10px] text-gray-400">{habit.bestTime}</span>
                           </div>
                           <Check className={`w-6 h-6 ${habitsStatus[habit.id] !== 'none' ? 'text-green-500' : 'text-gray-200'}`} />
                        </div>
                      ))}
                    </section>
                  </div>
                )}

                {headerView === 'vision' && (
                  <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm min-h-[300px] flex flex-col">
                     <h3 className="font-black mb-4 c-dark">{NLP_QUESTIONS[nlpQuestionIdx]}</h3>
                     <textarea 
                      value={visionAnswer} 
                      onChange={e => setVisionAnswer(e.target.value)}
                      className="flex-1 bg-gray-50 rounded-2xl p-4 outline-none text-sm font-bold"
                      placeholder="התשובה שלך..."
                     />
                     <button onClick={handleVisionSend} className="mt-4 bg-primary text-white py-3 rounded-2xl font-black">שלח לחזון</button>
                  </div>
                )}
              </div>
            </div>

            {/* Task Drawer - ORIGINAL DESIGN */}
            {isTaskDrawerOpen && (
              <div className="fixed inset-0 z-[500] flex items-end">
                <div className="absolute inset-0 bg-black/40" onClick={() => setIsTaskDrawerOpen(false)} />
                <div className="relative w-full h-[80%] bg-white rounded-t-[3rem] p-8 shadow-2xl animate-in slide-in-from-bottom-full">
                   <h2 className="text-xl font-black mb-6">משימות פתוחות</h2>
                   <div className="flex gap-2 mb-6">
                      <input value={newTaskText} onChange={e => setNewTaskText(e.target.value)} onKeyDown={e => e.key === 'Enter' && addTask()} placeholder="משימה חדשה..." className="flex-1 bg-gray-100 p-4 rounded-2xl outline-none" />
                      <button onClick={addTask} className="bg-dark text-white px-6 rounded-2xl font-bold">+</button>
                   </div>
                   <div className="space-y-3 overflow-y-auto">
                      {activeTasks.map(t => (
                        <div key={t.id} className="p-4 bg-gray-50 rounded-2xl flex justify-between items-center">
                           <span className="font-bold">{t.text}</span>
                           <button onClick={() => toggleTaskDone(t.id)} className="w-6 h-6 border-2 border-gray-200 rounded-full" />
                        </div>
                      ))}
                   </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
