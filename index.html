<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אפליקציית קהילה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); }
    .btn-primary { background: linear-gradient(135deg,#667eea,#764ba2); transition: all 0.2s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }
    .btn-google { background: white; color: #1f2937; transition: all 0.2s; border: 1px solid #e5e7eb; }
    .btn-google:hover { background: #f9fafb; transform: translateY(-2px); }
    .btn-danger { background: linear-gradient(135deg,#f093fb,#f5576c); transition: all 0.2s; }
  </style>
</head>
<body class="bg-gray-950 min-h-screen text-white">
  <div class="max-w-2xl mx-auto p-4">
    <header class="flex justify-between items-center mb-8 bg-gray-900 p-4 rounded-2xl border border-gray-800">
      <h1 class="text-xl font-bold">קהילת המפתחים</h1>
      <div id="auth-status"></div>
    </header>

    <div id="login-section" class="text-center py-20">
      <h2 class="text-3xl font-bold mb-4">ברוכים הבאים</h2>
      <p class="text-gray-400 mb-8">התחברו כדי לשתף ולהתעדכן</p>
      <button id="google-login" class="btn-google inline-flex items-center gap-2 px-6 py-3 rounded-xl font-medium">
        <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="G">
        התחברות עם Google
      </button>
      <div id="login-error" class="mt-4 text-red-400 text-sm hidden"></div>
      <div id="login-loading" class="mt-4 text-gray-400 text-sm hidden">מתחבר...</div>
    </div>

    <div id="content-section" style="display:none">
      <div class="mb-6">
        <textarea id="post-content" class="w-full bg-gray-900 border border-gray-800 rounded-xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none" rows="3" placeholder="מה חדש בקהילה?"></textarea>
        <button id="send-post" class="btn-primary mt-2 px-6 py-2 rounded-xl font-medium text-white">פרסם פוסט</button>
      </div>
      <div id="posts-container"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://igpzawemolsajreiuxck.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlncHphd2Vtb2xzYWpyZWl1eGNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTE3MTIsImV4cCI6MjA5MTEyNzcxMn0.b3Q1nlHddqAgg8AJS4gV73USVvujno0-HRpLFPny7Ww';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        flowType: 'pkce',
        autoRefreshToken: true,
        detectSessionInUrl: true,
        persistSession: true
      }
    });

    const loginSection = document.getElementById('login-section');
    const contentSection = document.getElementById('content-section');
    const authStatus = document.getElementById('auth-status');
    const postsContainer = document.getElementById('posts-container');
    const postInput = document.getElementById('post-content');
    const loginError = document.getElementById('login-error');
    const loginLoading = document.getElementById('login-loading');

    function showError(msg) {
      loginError.textContent = msg;
      loginError.classList.remove('hidden');
      loginLoading.classList.add('hidden');
    }

    function showContent(user) {
      loginSection.style.display = 'none';
      contentSection.style.display = 'block';
      authStatus.innerHTML = `<div class="flex items-center gap-2">
        <img src="${user.user_metadata.avatar_url||''}" class="w-8 h-8 rounded-full" onerror="this.style.display='none'">
        <span class="text-sm font-medium">${user.user_metadata.full_name||user.email}</span>
        <button onclick="sb.auth.signOut()" class="text-xs text-red-400 hover:underline ml-2">יציאה</button>
      </div>`;
      fetchPosts();
    }

    function showLogin() {
      loginSection.style.display = 'block';
      contentSection.style.display = 'none';
      authStatus.innerHTML = '';
      loginLoading.classList.add('hidden');
    }

    sb.auth.onAuthStateChange((event, session) => {
      console.log('Auth event:', event, session?.user?.email);
      if (session && session.user) {
        showContent(session.user);
      } else {
        showLogin();
      }
    });

    document.getElementById('google-login').addEventListener('click', async () => {
      loginError.classList.add('hidden');
      loginLoading.classList.remove('hidden');
      try {
        const { data, error } = await sb.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: 'https://moshikoomg.github.io/community-app/',
            skipBrowserRedirect: false
          }
        });
        if (error) {
          console.error('OAuth error:', error);
          showError('שגיאה: ' + error.message);
        }
      } catch(e) {
        console.error('Catch error:', e);
        showError('שגיאה: ' + e.message);
      }
    });

    async function fetchPosts() {
      const { data, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
      if (error) { console.error('Fetch error:', error); return; }
      postsContainer.innerHTML = !data || data.length === 0
        ? '<p class="text-gray-500 text-center py-8">אין פוסטים עדיין. היו הראשונים!</p>'
        : data.map(p => `<div class="card p-4 rounded-2xl mb-4">
            <div class="flex items-center gap-3 mb-2">
              <img src="${p.author_avatar||''}" class="w-10 h-10 rounded-full border border-gray-700" onerror="this.style.display='none'">
              <div>
                <p class="font-bold text-sm">${p.author_name||'אנונימי'}</p>
                <p class="text-xs text-gray-400">${new Date(p.created_at).toLocaleString('he-IL')}</p>
              </div>
            </div>
            <p class="text-gray-200 leading-relaxed">${p.content}</p>
          </div>`).join('');
    }

    document.getElementById('send-post').addEventListener('click', async () => {
      const content = postInput.value.trim();
      if (!content) return;
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { showLogin(); return; }
      const { error } = await sb.from('posts').insert([{
        content,
        user_id: user.id,
        author_name: user.user_metadata.full_name || user.email,
        author_avatar: user.user_metadata.avatar_url || ''
      }]);
      if (error) alert('שגיאה: ' + error.message);
      else { postInput.value = ''; fetchPosts(); }
    });
  </script>
</body>
</html>
