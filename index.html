<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>בועות הרגלים | Habit Bubbles</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Matter.js for Physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background: #0f172a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none; /* Disable selection for long press */
            user-select: none;
        }

        /* Responsive Container */
        .app-container {
            position: relative;
            background: linear-gradient(180deg, rgba(30,41,59,0.7) 0%, rgba(15,23,42,0.9) 100%);
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(255,255,255,0.05);
            transition: background 0.5s ease;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,23,42,0.8);
            z-index: 1;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        @media (min-width: 768px) {
            .app-container {
                width: 390px;
                height: 844px;
                border-radius: 50px;
                border: 12px solid #1e293b;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.1), 0 0 0 2px #334155;
            }
            .app-container::before {
                content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
                width: 120px; height: 30px; background: #1e293b; border-bottom-left-radius: 20px;
                border-bottom-right-radius: 20px; z-index: 50; box-shadow: inset 0 -2px 5px rgba(255,255,255,0.1);
            }
        }

        @media (max-width: 767px) {
            .app-container { width: 100vw; height: 100vh; height: 100dvh; border-radius: 0; border: none; }
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        .ui-layer { position: relative; z-index: 20; display: flex; flex-direction: column; height: 100%; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pulse-anim { animation: pulse-soft 2s infinite; }
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        <div class="bg-overlay" id="bgOverlay"></div>
        
        <!-- Canvas for Matter.js & Custom Rendering -->
        <canvas id="gameCanvas"></canvas>

        <!-- UI Layer -->
        <div class="ui-layer justify-between pt-10">
            
            <!-- Top Bar -->
            <div class="flex justify-between items-center pointer-events-auto px-4 pb-6">
                <button onclick="window.toggleSettings()" class="p-2 rounded-full glass-panel text-white hover:bg-white/10 transition">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
                
                <div class="text-center">
                    <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-purple-400 drop-shadow-md">
                        בועות הרגלים
                    </h1>
                    <p id="viewSubtitle" class="text-xs text-slate-300 font-medium tracking-wider">טוען נתונים...</p>
                </div>
                
                <button onclick="window.toggleFilter()" class="p-2 rounded-full glass-panel text-white hover:bg-white/10 transition relative opacity-0 pointer-events-none">
                    <!-- Filter visually hidden since there's no UI for it now, kept for spacing -->
                    <i data-lucide="filter" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Settings Modal -->
            <div id="settingsModal" class="absolute top-24 left-4 right-4 glass-panel rounded-2xl p-4 pointer-events-auto transform transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none flex flex-col gap-4 shadow-2xl z-40 max-h-[70vh] overflow-y-auto no-scrollbar">
                <h3 class="text-white font-bold text-lg mb-2">הגדרות תצוגה</h3>
                
                <div class="mt-2 flex flex-col gap-2">
                    <button onclick="window.openManageHabitsModal()" class="w-full py-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl text-white text-sm font-bold shadow-md transition flex items-center justify-center gap-2">
                        <i data-lucide="list-edit" class="w-4 h-4"></i> ניהול הרגלים (עריכה/מחיקה)
                    </button>
                    
                    <button onclick="window.advanceDebugDay()" class="w-full py-2 bg-purple-500/20 border border-purple-500/50 rounded-xl text-purple-300 text-sm font-medium transition">
                        טסט: התקדם יום אחד קדימה
                    </button>
                    
                    <div id="adminControlsContainer" class="hidden flex-col gap-2 mt-2 pt-2 border-t border-white/10">
                        <button onclick="window.openAdminPanel()" class="w-full py-2 bg-gradient-to-r from-red-500 to-orange-500 rounded-xl text-white text-sm font-bold shadow-lg">
                            👑 ניהול שלבים (מנהל)
                        </button>
                    </div>

                    <button onclick="window.openAuthModal()" id="btnAuth" class="w-full py-2 mt-2 bg-transparent border border-slate-600 rounded-xl text-slate-400 text-xs font-medium transition hover:bg-slate-800">
                        התחברות לחשבון (למנהלים/שמירה)
                    </button>
                </div>
            </div>

            <!-- Manage Habits Modal -->
            <div id="manageHabitsModal" class="absolute inset-0 bg-slate-900/95 backdrop-blur-md z-[60] hidden flex-col items-center pt-10 px-4 pb-4 pointer-events-auto overflow-y-auto">
                <div class="w-full max-w-md">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-white">ניהול הרגלים</h2>
                        <button onclick="window.closeManageHabitsModal()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
                    </div>
                    <p class="text-slate-400 text-sm mb-4">כאן תוכל לשנות את השמות של ההרגלים שלך או למחוק אותם לחלוטין.</p>
                    <div id="manageHabitsList" class="space-y-3">
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </div>

            <!-- Floating Add Button -->
            <button onclick="window.openAddHabitModal()" class="absolute bottom-[170px] left-6 w-14 h-14 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full text-white font-bold text-3xl shadow-[0_10px_20px_rgba(0,0,0,0.5)] flex items-center justify-center hover:scale-105 active:scale-95 transition-transform z-40 pointer-events-auto border-2 border-white/20">
                +
            </button>

            <!-- Add Habit Modal -->
            <div id="addHabitModal" class="absolute bottom-0 left-0 right-0 transform translate-y-full glass-panel md:rounded-b-[38px] rounded-t-[40px] p-8 pointer-events-auto transition-transform duration-300 shadow-[0_-15px_40px_rgba(0,0,0,0.5)] z-50 bg-slate-900/95 border-t border-slate-700">
                <h3 class="text-white font-bold text-xl mb-4 text-center">הרגל חדש</h3>
                <input type="text" id="newHabitName" placeholder="שם ההרגל (לדוג: קריאה)" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white mb-4 outline-none focus:border-blue-500">
                
                <div class="flex justify-between gap-3 mt-6">
                    <button onclick="window.closeAddHabitModal()" class="flex-1 py-2 rounded-xl bg-white/10 text-white font-medium">ביטול</button>
                    <button onclick="window.saveNewHabit()" class="flex-1 py-3 rounded-xl bg-blue-500 text-white font-bold shadow-lg shadow-blue-500/30">שמור והתחל</button>
                </div>
            </div>

            <!-- Auth Modal (Google Login) -->
            <div id="authModal" class="absolute inset-0 bg-slate-900/90 backdrop-blur-sm z-50 hidden flex-col items-center justify-center px-6 pointer-events-auto">
                <div class="w-full max-w-sm glass-panel rounded-3xl p-8 shadow-2xl relative text-center">
                    <button onclick="window.closeAuthModal()" class="absolute top-4 left-4 text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                    <div class="w-16 h-16 bg-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 drop-shadow-lg">
                        <i data-lucide="cloud" class="w-8 h-8 text-white"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2">אפליקציית הרגלים</h2>
                    <p class="text-slate-400 text-sm mb-8">התחבר כדי לשמור את ההתקדמות והשלבים שלך בענן</p>
                    
                    <button onclick="window.loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white text-gray-900 px-6 py-4 rounded-xl font-bold text-lg shadow-md mb-4 border border-gray-200 hover:bg-gray-50 transition active:scale-95">
                        <img src="https://www.google.com/favicon.ico" class="w-6 h-6" alt="G" />
                        התחברות עם Google
                    </button>
                    <button onclick="window.closeAuthModal()" class="text-slate-500 mt-2 text-sm underline hover:text-white transition">המשך ללא חשבון (מצב מקומי)</button>
                    <p id="authError" class="text-red-400 text-xs text-center mt-4 hidden"></p>
                </div>
            </div>

            <!-- Admin Panel Modal -->
            <div id="adminModal" class="absolute inset-0 bg-slate-900/95 backdrop-blur-md z-[60] hidden flex-col items-center pt-10 px-4 pb-4 pointer-events-auto overflow-y-auto">
                <div class="w-full max-w-md">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-red-400">ניהול שלבים</h2>
                        <button onclick="window.closeAdminPanel()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
                    </div>

                    <div class="bg-black/30 p-4 rounded-2xl border border-white/10 mb-4">
                        <label class="block text-slate-300 text-sm mb-2 font-bold">בחר שלב לעריכה:</label>
                        <select id="adminStageSelect" onchange="window.loadAdminStageData()" class="w-full bg-slate-800 border border-slate-600 text-white rounded-lg p-2 mb-2">
                            <!-- Options injected by JS -->
                        </select>
                        <p id="adminStageInfo" class="text-xs text-slate-400"></p>
                    </div>

                    <div class="space-y-4">
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <h4 class="text-white font-bold mb-2">תמונת רקע לשלב</h4>
                            <input type="file" id="adminBgImage" accept="image/*" class="text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-
