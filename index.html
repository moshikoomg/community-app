<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>צנצנת ההרגלים שלי</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        :root {
            --bg-color: #f4f6f8;
            --jar-glass: rgba(255, 255, 255, 0.4);
            --jar-highlight: rgba(255, 255, 255, 0.9);
            --jar-shadow: rgba(0, 0, 0, 0.1);
            --jar-border: rgba(255, 255, 255, 0.15); 
            --primary-color: #239B62;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Heebo', sans-serif;
            background-color: #d1d8e0;
            background-image: radial-gradient(circle at top right, #e2e8f0, #cbd5e1); 
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden;
            touch-action: manipulation;
        }

        .app-container {
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        @media (min-width: 420px) {
            .app-container {
                width: 390px; height: 844px; max-height: 90vh; 
                border-radius: 50px; border: 14px solid #111; 
                box-shadow: 0 30px 60px rgba(0,0,0,0.3), inset 0 0 0 2px #333; 
            }
            .app-container::before {
                content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
                width: 130px; height: 32px; background-color: #111;
                border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 1000;
            }
            .app-container::after {
                content: ''; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
                width: 130px; height: 5px; background-color: #111; border-radius: 10px; z-index: 1000;
            }
        }

        /* --- פרופיל --- */
        .profile-header {
            position: absolute; top: max(25px, env(safe-area-inset-top)); right: 25px;
            z-index: 20; display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.6); padding: 6px 14px 6px 6px;
            border-radius: 30px; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.8);
            cursor: pointer; transition: transform 0.2s;
        }
        .profile-header:active { transform: scale(0.95); }

        .profile-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex; justify-content: center; align-items: center; color: #555;
        }

        .bg-day-indicator {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 110px; font-weight: 800; color: rgba(0, 0, 0, 0.04);
            z-index: 0; white-space: nowrap; user-select: none; cursor: pointer; letter-spacing: -2px;
        }

        .top-section { flex: 1; position: relative; background: radial-gradient(circle at center, #ffffff 0%, #eef1f5 100%); width: 100%; height: 100%; }

        .jars-slider {
            display: flex; width: 100%; height: 100%; overflow-x: auto;
            scroll-snap-type: x mandatory; align-items: center; scrollbar-width: none;
            direction: ltr; scroll-behavior: smooth;
        }
        .jars-slider::-webkit-scrollbar { display: none; }

        .jar-slide { 
            flex: 0 0 100%; height: 100%; display: flex; justify-content: center; 
            align-items: center; scroll-snap-align: center; position: relative; 
            box-sizing: border-box; 
        }
        .jar-slide.locked { filter: blur(8px) grayscale(40%); opacity: 0.5; }
        .jar-wrapper { position: relative; width: 340px; height: 480px; direction: rtl; }

        canvas#physics-canvas { position: absolute; top: 0; left: 0; z-index: 1; touch-action: none; }

        .jar-glass-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .jar-neck {
            position: absolute; top: 50px; left: 100px; width: 140px; height: 40px;
            border: 6px solid var(--jar-border); border-bottom: none; border-radius: 10px 10px 0 0;
            background: linear-gradient(to right, rgba(255,255,255,0.8), rgba(255,255,255,0.2) 20%, rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.8));
        }
        .jar-body {
            position: absolute; top: 90px; left: 30px; width: 280px; height: 340px;
            border-radius: 70px 70px 60px 60px; border: 8px solid var(--jar-border);
            box-shadow: inset 20px 0 30px rgba(255,255,255,0.9), inset -15px -15px 30px var(--jar-shadow), 0 20px 40px var(--jar-shadow); 
            background: rgba(255, 255, 255, 0.1);
        }
        .jar-opening {
            position: absolute; top: 40px; left: 95px; width: 150px; height: 20px;
            border-radius: 50%; border: 4px solid var(--jar-border); background: rgba(255, 255, 255, 0.5); z-index: 3;
        }

        /* --- המגירה - כשכבה עליונה צפה בלבד --- */
        .bottom-section {
            background: #FDFBF7; border-radius: 30px 30px 0 0; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.08); 
            z-index: 100; display: flex; flex-direction: column; align-items: center; 
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 220px; /* גובה קבוע */
            box-sizing: border-box;
            transition: height 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .bottom-section.edit-mode {
            height: 340px; /* גדל מעט רק במצב עריכה */
        }
        .bottom-section::before {
            content: ''; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 4px; background-color: #E2DFD9; border-radius: 4px;
        }

        .drawer-view { width: 100%; display: none; flex-direction: column; align-items: center; flex: 1; }
        .drawer-view.active { display: flex; }

        .edit-btn { position: absolute; top: 22px; right: 22px; color: #C0C0C0; cursor: pointer; padding: 5px; z-index: 15; }
        .breakthrough-badge {
            position: absolute; top: 25px; left: 20px; font-size: 13px; font-weight: 800; color: #999;
            background: rgba(0,0,0,0.04); padding: 4px 10px; border-radius: 12px; opacity: 0; transform: translateY(5px); transition: 0.3s;
        }
        .breakthrough-badge.show { opacity: 1; transform: translateY(0); }

        .picker-top { display: flex; flex-direction: column; align-items: center; user-select: none; margin-top: -38px; min-height: 100px; }
        .active-icon-bg {
            width: 76px; height: 76px; background: #FDFBF7; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; position: relative; z-index: 1; 
        }
        .active-icon-bg::before { content: ''; position: absolute; bottom: 37px; left: -12px; width: 14px; height: 12px; background: radial-gradient(circle at 0% 0%, transparent 11.5px, #FDFBF7 12px); z-index: -1; }
        .active-icon-bg::after { content: ''; position: absolute; bottom: 37px; right: -12px; width: 14px; height: 12px; background: radial-gradient(circle at 100% 0%, transparent 11.5px, #FDFBF7 12px); z-index: -1; }

        #marble-drop-zone { width: 55px; height: 55px; }
        #floating-marble {
            position: absolute; z-index: 1000; cursor: grab; touch-action: none; transform-origin: center center;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1.2), opacity 0.2s, filter 0.3s;
        }
        #floating-marble.dragging { transition: none !important; }

        .habit-time { color: #999; font-size: 15px; font-weight: 600; margin-top: -2px; margin-bottom: 5px; }

        .habit-scroller-mask {
            width: 100%; overflow: hidden; position: relative;
            mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
            margin-top: 5px;
        }
        .habit-scroller { display: flex; align-items: center; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; padding-bottom: 5px; }
        .habit-scroller::-webkit-scrollbar { display: none; }
        .habit-scroller::before, .habit-scroller::after { content: ''; flex: 0 0 calc(50% - 40px); }
        .habit-item { flex: 0 0 auto; scroll-snap-align: center; padding: 10px 20px; font-size: 22px; color: #A0A0A0; font-weight: 600; transition: 0.2s; cursor: pointer; white-space: nowrap; }
        .habit-item.active { font-size: 34px; color: #111; font-weight: 800; }

        .picker-dots { display: flex; gap: 8px; margin-top: 5px; align-items: center; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; transition: all 0.3s; }
        .dot.active { width: 24px; background: #222; border-radius: 4px; }

        /* --- עריכה במגירה --- */
        .drawer-edit-content { width: 100%; padding: 25px 25px; box-sizing: border-box; }
        .drawer-edit-title { font-size: 20px; font-weight: 800; color: #111; margin-bottom: 15px; text-align: center; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 600; color: #666; font-size: 14px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; font-family: inherit; box-sizing: border-box; background: #fff; }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-primary, .btn-secondary, .btn-danger { flex: 1; padding: 12px; border-radius: 12px; font-size: 15px; font-weight: 800; border: none; cursor: pointer; transition: 0.1s; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: #E2DFD9; color: #444; }
        .btn-danger { background: #e86a92; color: white; width: 100%; margin-top: 10px; }

        /* --- פופ-אפ פרופיל --- */
        .popup-backdrop {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .popup-backdrop.active { opacity: 1; pointer-events: all; }
        .popup-content {
            background: #FDFBF7; width: 85%; max-width: 320px; border-radius: 24px; padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); transform: scale(0.9); transition: 0.3s; position: relative;
        }
        .popup-backdrop.active .popup-content { transform: scale(1); }
        .close-popup-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.05); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="profile-header" onclick="openProfilePopup()">
            <div class="profile-name" id="display-profile-name">הפרופיל שלי</div>
            <div class="profile-avatar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
        </div>

        <!-- הצנצנת עכשיו לוקחת את כל השטח והמגירה צפה מעליה -->
        <div class="top-section" id="clickable-top-section">
            <div id="bg-day-indicator" class="bg-day-indicator" onclick="advanceDay()">1 / 12</div>
            <div class="jars-slider" id="jars-slider"></div>
            <canvas id="physics-canvas"></canvas>
        </div>

        <div class="bottom-section" id="bottom-drawer">
            <div id="drawer-normal-view" class="drawer-view active">
                <div class="edit-btn" onclick="openEditMode()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></div>
                <div class="breakthrough-badge" id="breakthrough-badge"></div>
                <div class="picker-top">
                    <div class="active-icon-bg"><div id="marble-drop-zone"></div></div>
                    <div class="habit-time" id="picker-time"></div>
                </div>
                <div class="habit-scroller-mask"><div class="habit-scroller" id="habit-scroller"></div></div>
                <div class="picker-dots" id="picker-dots"></div>
            </div>

            <div id="drawer-edit-view" class="drawer-view">
                <div class="drawer-edit-content">
                    <div class="drawer-edit-title">ניהול הרגל</div>
                    <div style="display:flex; gap:10px;">
                        <div class="form-group" style="flex:2;"><label>שם</label><input type="text" id="input-habit-name" class="form-control"></div>
                        <div class="form-group" style="flex:1;"><label>צבע</label><input type="color" id="input-habit-color" class="form-control" style="height:45px; padding:2px;"></div>
                    </div>
                    <div class="form-group"><label>יעד</label><input type="text" id="input-habit-time" class="form-control"></div>
                    <div class="btn-row"><button class="btn-primary" onclick="saveHabitChanges()">שמור</button><button class="btn-secondary" onclick="closeEditMode()">ביטול</button></div>
                    <button class="btn-danger" onclick="deleteCurrentHabit()">מחק הרגל</button>
                </div>
            </div>
        </div>

        <canvas id="floating-marble" width="55" height="55"></canvas>

        <div class="popup-backdrop" id="profile-popup" onclick="handleBackdropClick(event, 'profile-popup')">
            <div class="popup-content">
                <button class="close-popup-btn" onclick="closeProfilePopup()">✕</button>
                <div style="font-size:22px; font-weight:800; margin-bottom:15px;">אזור אישי</div>
                <div class="form-group"><label>שם המשתמש</label><input type="text" id="input-profile-name" class="form-control" value="הפרופיל שלי" onkeyup="updateProfileName(this.value)"></div>
            </div>
        </div>
    </div>

    <script>
        const TOTAL_DAYS = 12;
        let unlockedDays = 1, currentDayView = 0, currentHabitIndex = 1;
        let habitsData = [
            { id: 1, name: 'לנשום', time: '10 דקות', color: '#42b6c7' },
            { id: 2, name: 'לרוץ', time: '5 דקות', color: '#e86a92' },
            { id: 3, name: 'לשחק', time: '15 דקות', color: '#f3c13a' },
            { id: 4, name: 'לקרוא', time: '20 דקות', color: '#7bc043' },
            { id: 5, name: 'לשתות', time: '1 כוס', color: '#8e44ad' }
        ];

        const userStats = { daysData: [] };
        function initStatsForDay(idx) {
            if(!userStats.daysData[idx]) userStats.daysData[idx] = { habits: {}, balls: [] };
            habitsData.forEach(h => { if(!userStats.daysData[idx].habits[h.id]) userStats.daysData[idx].habits[h.id] = { min: 0, breakthrough: 0 }; });
        }
        for(let i=0; i<TOTAL_DAYS; i++) initStatsForDay(i);

        const slider = document.getElementById('jars-slider');
        for(let i=0; i<TOTAL_DAYS; i++) {
            const slide = document.createElement('div');
            slide.className = `jar-slide ${i >= unlockedDays ? 'locked' : ''}`;
            slide.dataset.index = i;
            slide.innerHTML = `<div class="jar-wrapper" id="jar-wrapper-${i}"><div class="jar-glass-overlay"><div class="jar-opening"></div><div class="jar-neck"></div><div class="jar-body"></div></div></div>`;
            slider.appendChild(slide);
        }

        const { Engine, Bodies, Composite, Mouse, MouseConstraint } = Matter;
        const engine = Engine.create(), world = engine.world;
        let currentBalls = [];
        const canvas = document.getElementById('physics-canvas'), ctx = canvas.getContext('2d');
        canvas.width = 340; canvas.height = 480;

        const wallOptions = { isStatic: true, friction: 0.1, restitution: 0.3 };
        Composite.add(world, [
            Bodies.rectangle(170, 420, 200, 40, wallOptions),
            Bodies.rectangle(75, 400, 80, 40, { ...wallOptions, angle: Math.PI / 5 }),
            Bodies.rectangle(265, 400, 80, 40, { ...wallOptions, angle: -Math.PI / 5 }),
            Bodies.rectangle(35, 260, 20, 240, wallOptions),
            Bodies.rectangle(305, 260, 20, 240, wallOptions),
            Bodies.rectangle(70, 115, 80, 20, { ...wallOptions, angle: -Math.PI / 4.5 }),
            Bodies.rectangle(270, 115, 80, 20, { ...wallOptions, angle: Math.PI / 4.5 }),
            Bodies.rectangle(105, 70, 20, 60, wallOptions),
            Bodies.rectangle(235, 70, 20, 60, wallOptions)
        ]);
        Composite.add(world, MouseConstraint.create(engine, { mouse: Mouse.create(canvas), constraint: { stiffness: 0.2, render: { visible: false } } }));
        document.getElementById('jar-wrapper-0').insertBefore(canvas, document.getElementById('jar-wrapper-0').firstChild);

        const scroller = document.getElementById('habit-scroller');
        function initHabitScroller() {
            scroller.innerHTML = '';
            habitsData.forEach((h, i) => { 
                const el = document.createElement('div'); 
                el.className = 'habit-item'; el.innerText = h.name; 
                el.onclick = () => el.scrollIntoView({ behavior: 'smooth', inline: 'center' }); 
                scroller.appendChild(el); 
            });
            renderDots();
        }

        function renderDots() {
            const dotsContainer = document.getElementById('picker-dots');
            if(!dotsContainer) return;
            dotsContainer.innerHTML = '';
            habitsData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `dot ${index === currentHabitIndex ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });
        }
        initHabitScroller();

        function updateStatsUI() {
            if(!habitsData[currentHabitIndex]) return;
            const h = habitsData[currentHabitIndex], stats = userStats.daysData[currentDayView].habits[h.id];
            const timeEl = document.getElementById('picker-time'), badge = document.getElementById('breakthrough-badge');
            if(stats && stats.min > 0) {
                timeEl.innerText = '+' + h.time; timeEl.style.color = h.color;
                const total = stats.min + stats.breakthrough;
                if(total > 1) { badge.innerText = `X${total}`; badge.classList.add('show'); } else badge.classList.remove('show');
            } else { timeEl.innerText = h.time; timeEl.style.color = '#999'; badge.classList.remove('show'); }
        }

        function renderActiveHabit() {
            if(!habitsData[currentHabitIndex]) return;
            const h = habitsData[currentHabitIndex], fm = document.getElementById('floating-marble');
            document.querySelectorAll('.habit-item').forEach((it, i) => it.classList.toggle('active', i === currentHabitIndex));
            const uctx = fm.getContext('2d'); uctx.clearRect(0,0,55,55); drawMarble(uctx, 27.5, 27.5, 24, 0, h.color);
            updateFloatingPosition();
            if(fm.style.display !== 'none') fm.style.filter = `drop-shadow(0 0 15px ${h.color}) drop-shadow(0 6px 8px rgba(0,0,0,0.15))`;
            updateStatsUI(); renderDots();
        }

        let lastIdx = -1;
        scroller.addEventListener('scroll', () => {
            const center = scroller.getBoundingClientRect().left + scroller.offsetWidth/2;
            let closest = -1, min = Infinity;
            document.querySelectorAll('.habit-item').forEach((it, i) => { const d = Math.abs(center - (it.getBoundingClientRect().left + it.offsetWidth/2)); if(d < min){ min = d; closest = i; } });
            if(closest !== -1 && closest !== lastIdx) { lastIdx = closest; currentHabitIndex = closest; popMarble(); if(navigator.vibrate) navigator.vibrate(10); }
        });

        function popMarble() {
            const fm = document.getElementById('floating-marble');
            fm.style.transition = 'transform 0.05s'; fm.style.transform = 'scale(0.6)';
            setTimeout(() => { 
                renderActiveHabit(); 
                fm.style.transition = 'transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1.2)'; 
                fm.style.transform = 'scale(1)'; 
            }, 60);
        }

        function moveCanvas(idx) {
            if(currentDayView === idx) return;
            const wrap = document.getElementById(`jar-wrapper-${idx}`);
            if(wrap) wrap.insertBefore(canvas, wrap.firstChild);
            userStats.daysData[currentDayView].balls = [...currentBalls];
            currentBalls.forEach(b => Composite.remove(world, b));
            currentBalls = userStats.daysData[idx].balls || [];
            currentBalls.forEach(b => Composite.add(world, b));
            currentDayView = idx;
            document.getElementById('bg-day-indicator').innerText = `${idx + 1} / 12`;
            updateStatsUI();
        }

        const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) moveCanvas(parseInt(e.target.dataset.index)); }), { threshold:0.6, root:slider });
        document.querySelectorAll('.jar-slide').forEach(s => obs.observe(s));

        function advanceDay() { if(unlockedDays < TOTAL_DAYS){ unlockedDays++; const s = document.querySelector(`.jar-slide[data-index="${unlockedDays-1}"]`); s.classList.remove('locked'); s.scrollIntoView({ behavior:'smooth', inline:'center'}); } }

        function updateFloatingPosition() {
            const dz = document.getElementById('marble-drop-zone'), cont = document.querySelector('.app-container'), fm = document.getElementById('floating-marble');
            if(!dz || !cont || !fm || fm.style.display === 'none') return;
            const r = dz.getBoundingClientRect(), cr = cont.getBoundingClientRect();
            fm.style.left = (r.left - cr.left - cont.clientLeft + r.width/2 - 27.5) + 'px';
            fm.style.top = (r.top - cr.top - cont.clientTop + r.height/2 - 27.5) + 'px';
        }
        window.addEventListener('resize', updateFloatingPosition);

        // Click Outside Logic
        document.getElementById('clickable-top-section').addEventListener('click', () => { if(document.getElementById('drawer-edit-view').classList.contains('active')) closeEditMode(); });
        function handleBackdropClick(e, id) { if(e.target.id === id) closeModal(id); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function openProfilePopup() { document.getElementById('profile-popup').classList.add('active'); }
        function closeProfilePopup() { closeModal('profile-popup'); }
        function updateProfileName(v) { document.getElementById('display-profile-name').innerText = v.trim() || "הפרופיל שלי"; }

        function openEditMode() {
            const h = habitsData[currentHabitIndex]; if(!h) return;
            document.getElementById('input-habit-name').value = h.name;
            document.getElementById('input-habit-time').value = h.time;
            document.getElementById('input-habit-color').value = h.color;
            document.getElementById('bottom-drawer').classList.add('edit-mode');
            document.getElementById('drawer-normal-view').classList.remove('active');
            document.getElementById('drawer-edit-view').classList.add('active');
            document.getElementById('floating-marble').style.display = 'none';
        }
        function closeEditMode() {
            document.getElementById('bottom-drawer').classList.remove('edit-mode');
            document.getElementById('drawer-edit-view').classList.remove('active');
            document.getElementById('drawer-normal-view').classList.add('active');
            const fm = document.getElementById('floating-marble'); fm.style.display = 'block';
            setTimeout(updateFloatingPosition, 20); renderActiveHabit();
        }
        function saveHabitChanges() {
            const h = habitsData[currentHabitIndex];
            h.name = document.getElementById('input-habit-name').value.trim() || h.name;
            h.time = document.getElementById('input-habit-time').value.trim() || h.time;
            h.color = document.getElementById('input-habit-color').value;
            closeEditMode(); initHabitScroller();
            setTimeout(() => { document.querySelectorAll('.habit-item')[currentHabitIndex].scrollIntoView({ inline:'center'}); renderActiveHabit(); }, 50);
        }
        function deleteCurrentHabit() {
            if(habitsData.length <= 1) return alert("חייב להישאר לפחות הרגל אחד!");
            if(confirm("למחוק את ההרגל?")){ habitsData.splice(currentHabitIndex, 1); currentHabitIndex = 0; closeEditMode(); initHabitScroller(); setTimeout(() => { document.querySelectorAll('.habit-item')[0].scrollIntoView({ inline:'center'}); renderActiveHabit(); }, 50); }
        }

        // Physics
        const fm = document.getElementById('floating-marble');
        let isDrag = false, sx, sy, tx=0, ty=0;
        fm.addEventListener('pointerdown', e => { if(document.getElementById('drawer-edit-view').classList.contains('active')) return; isDrag=true; fm.classList.add('dragging'); sx=e.clientX; sy=e.clientY; tx=0; ty=0; fm.setPointerCapture(e.pointerId); });
        fm.addEventListener('pointermove', e => { if(!isDrag) return; tx=e.clientX-sx; ty=e.clientY-sy; fm.style.transform=`translate(${tx}px, ${ty}px) scale(1.1)`; });
        fm.addEventListener('pointerup', e => {
            if(!isDrag) return; isDrag=false; fm.classList.remove('dragging'); fm.releasePointerCapture(e.pointerId);
            const dist = Math.sqrt(tx*tx+ty*ty);
            
            if(dist < 10) { 
                // קליק - הפלה אוטומטית (תמיד לצנצנת)
                if(dropBall()){ 
                    fm.style.opacity='0'; 
                    setTimeout(() => { fm.style.opacity='1'; fm.style.transform='scale(1)'; updateFloatingPosition(); }, 500); 
                } else {
                    fm.style.transform='scale(1)';
                }
            }
            else {
                // גרירה - בדיקה אם שוחרר מעל הצנצנת
                const jr = document.getElementById(`jar-wrapper-${currentDayView}`).getBoundingClientRect();
                const r = fm.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
                
                // תנאי: שוחרר בתוך גבולות הצנצנת (עם שולי ביטחון)
                if(cx > jr.left-20 && cx < jr.right+20 && cy > jr.top-80 && cy < jr.bottom){
                    const cr = canvas.getBoundingClientRect(); 
                    if(dropBall(cx-cr.left, cy-cr.top)){ 
                        fm.style.transition='none'; fm.style.opacity='0'; fm.style.transform='scale(0)'; 
                        setTimeout(() => { fm.style.transition='0.2s'; fm.style.opacity='1'; fm.style.transform='scale(1)'; updateFloatingPosition(); }, 500); 
                    } else {
                        fm.style.transform='scale(1)'; 
                    }
                } else {
                    // שוחרר מחוץ לצנצנת - חזרה למקום ללא ספירה
                    fm.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
                    fm.style.transform='scale(1)'; 
                }
            }
        });

        function dropBall(x=170+(Math.random()*40-20), y=-30) {
            if(currentDayView >= unlockedDays || !habitsData[currentHabitIndex]) return false;
            const h = habitsData[currentHabitIndex], stats = userStats.daysData[currentDayView].habits[h.id];
            
            // רק כאן הנתון נספר
            if(stats.min===0) stats.min=1; else stats.breakthrough++; 
            updateStatsUI();
            
            const b = Bodies.circle(x, y, 22, { restitution:0.6, friction:0.05, density:0.04, label:'habit-ball', render:{fillStyle:h.color} });
            currentBalls.push(b); Composite.add(world, b); 
            return true;
        }

        function drawMarble(c, x, y, r, a, col) {
            c.save(); c.translate(x, y); c.rotate(a);
            c.beginPath(); c.arc(0,0,r,0,Math.PI*2);
            let g = c.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r); g.addColorStop(0,'rgba(255,255,255,0.95)'); g.addColorStop(0.5,'rgba(240,240,240,0.8)'); g.addColorStop(1,'rgba(180,180,180,0.5)');
            c.fillStyle=g; c.fill();
            c.save(); c.globalAlpha=0.85; c.beginPath(); c.moveTo(0,r*0.7); c.quadraticCurveTo(r*0.6,0,0,-r*0.6); c.quadraticCurveTo(-r*0.3,0,0,r*0.7); c.fillStyle=col; c.fill(); c.restore();
            c.lineWidth=1; c.strokeStyle='rgba(255,255,255,0.6)'; c.stroke();
            c.beginPath(); c.arc(-r*0.3,-r*0.3,r*0.2,0,Math.PI*2); c.fillStyle='rgba(255,255,255,0.7)'; c.fill(); c.restore();
        }

        function loop() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            Composite.allBodies(world).forEach(b => { if(b.label==='habit-ball') drawMarble(ctx, b.position.x, b.position.y, b.circleRadius, b.angle, b.render.fillStyle); });
            Engine.update(engine, 1000/60); requestAnimationFrame(loop);
        }
        loop(); setTimeout(() => { scroller.scrollTo({left:0}); lastIdx=1; renderActiveHabit(); }, 100);
    </script>
</body>
</html>
