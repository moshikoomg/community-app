<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>אפליקציית הרגלים</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #F0F2F5; font-family: system-ui, -apple-system, sans-serif; }
    .btn-google { background: white; color: #1f2937; transition: all 0.2s; border: 1px solid #e5e7eb; }
    .btn-google:hover { background: #f9fafb; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { createClient } from '@supabase/supabase-js';
    import { 
      Star, Check, Lightbulb, Trophy, Crown, Medal, Award, Users, ArrowLeft, TrendingUp, Menu, Plus, Clock, Trash2, GripVertical, ArrowUpToLine, ArrowDownAZ, Sun, Sunset, Moon, AlignLeft, ChevronDown, ChevronUp, Lock, Target, Send, Sparkles, PartyPopper, Search, AlertCircle, Move, Droplet, Zap, Edit3, Minus, Calendar, Camera, Settings, ArrowRight, User, Palette, CreditCard, Wrench, Share2, ChevronLeft, Flag, Loader2
    } from 'lucide-react';

    const SUPABASE_URL = 'https://igpzawemolsajreiuxck.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlncHphd2Vtb2xzYWpyZWl1eGNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTE3MTIsImV4cCI6MjA5MTEyNzcxMn0.b3Q1nlHddqAgg8AJS4gV73USVvujno0-HRpLFPny7Ww';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const INITIAL_HABITS_DATA = [
      { id: 1, title: 'שכיבות סמיכה', targetValue: 15, unit: 'חזרות', bestTime: '09:00' },
      { id: 2, title: 'שתיית מים', targetValue: 8, unit: 'כוסות', bestTime: '12:00' },
      { id: 3, title: 'מדיטציה', targetValue: 15, unit: 'דקות', bestTime: '18:00' }
    ];

    const getTodayDate = () => new Date().toISOString().split('T')[0];

    const INITIAL_BADGES = [
      { id: 1, icon: <Trophy />, completed: true, label: 'שלב היסודות', imageUrl: null },
      { id: 2, icon: <Crown />, completed: true, label: 'שלב המנהיגות', imageUrl: null },
      { id: 3, icon: <Medal />, completed: true, label: 'שלב הביצוע', imageUrl: null },
      { id: 4, icon: <Award />, completed: false, label: 'שלב המאסטרי', imageUrl: null },
      { id: 5, icon: <Star />, completed: false, label: 'שלב השפעה', imageUrl: null },
      { id: 6, icon: <Zap />, completed: false, label: 'שלב השיא', imageUrl: null }
    ];

    const NLP_QUESTIONS = [
      "אילו הרגלים ותכונות תרצה לרכוש כדי להגשים את החזון?",
      "אילו אנשים תרצה לפגוש יותר בחייך שיקדמו אותך למטרה?",
      "אילו אמונות מגבילות היית רוצה להטיל בהן ספק ולאמץ חדשות?",
      "איך ייראה יום אידיאלי בחייך בעוד שנה מהיום?",
      "מהו הצעד הקטן והפשוט ביותר שאתה יכול לעשות כבר היום?"
    ];

    const CURRENT_DAY = 10;
    const TARGET_DAY = 17;

    const ALL_DAYS = Array.from({ length: 28 }, (_, i) => {
      const date = i + 1;
      const labels = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];
      const status = date < CURRENT_DAY ? 'past' : (date === CURRENT_DAY ? 'today' : 'future');
      let completionLevel = 'none';
      if (status === 'past') {
        if (date % 4 === 0) completionLevel = 'all_extra';
        else if (date % 3 === 0) completionLevel = 'some_extra';
        else if (date % 2 === 0) completionLevel = 'all_done';
        else completionLevel = 'partial';
      }
      return { date, label: labels[(date - 1) % 7], status, isToday: date === CURRENT_DAY, isTarget: date === TARGET_DAY, completionLevel };
    });

    const HEADER_TABS = [
      { id: 'daily', label: 'משימה יומית' },
      { id: 'news', label: 'קהילה' },
      { id: 'grades', label: 'הישגים' },
      { id: 'vision', label: 'חזון' }
    ];

    const Badge = ({ icon, completed, label, imageUrl }) => (
      <div className="relative flex-shrink-0 px-4 flex flex-col items-center justify-center min-w-[90px]">
        <div className={`relative w-14 h-14 flex items-center justify-center mb-2 ${!completed ? 'opacity-20 grayscale' : 'drop-shadow-md'}`}>
          {imageUrl ? (
             <img src={imageUrl} alt={label} className="w-full h-full object-contain" />
          ) : (
             icon && React.cloneElement(icon, { style: { width: '100%', height: '100%', fill: completed ? 'currentColor' : 'none' }, className: completed ? 'c-gold' : 'text-[#8E8E93]' })
          )}
          {!completed && <div className="absolute inset-0 flex items-center justify-center z-10"><Lock className="w-5 h-5 c-dark fill-white opacity-80" /></div>}
        </div>
        <span className={`text-[9px] font-black text-center leading-tight ${completed ? 'c-dark' : 'text-gray-400'}`}>{label}</span>
      </div>
    );

    const SettingsMenuItem = ({ icon, label, onClick }) => (
      <button onClick={onClick} className="w-full bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:border-gray-200 active:scale-[0.98] transition-all">
          <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-gray-500">{icon}</div>
              <span className="font-bold text-sm c-dark">{label}</span>
          </div>
          <ChevronLeft className="w-4 h-4 text-gray-300" />
      </button>
    );

    const LoginScreen = ({ onLogin }) => {
      const [isLoading, setIsLoading] = useState(false);
      const handleLogin = async () => {
        setIsLoading(true);
        await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + window.location.pathname }
        });
      };
      
      return (
        <div className="min-h-screen bg-[#F0F2F5] flex items-center justify-center font-arial" dir="rtl">
          <div className="w-full h-screen md:h-[844px] md:max-w-[390px] bg-white md:rounded-[3rem] shadow-2xl flex flex-col items-center justify-center p-8">
            <Trophy className="w-20 h-20 text-[#007AFF] mb-6 drop-shadow-lg" />
            <h1 className="text-3xl font-black mb-2 text-center text-gray-900">ברוכים הבאים</h1>
            <p className="text-gray-500 text-center mb-10">התחבר כדי לשמור את ההרגלים וההתקדמות שלך בענן</p>
            <button onClick={handleLogin} disabled={isLoading} className="btn-google w-full flex items-center justify-center gap-3 px-6 py-4 rounded-2xl font-bold text-lg">
              {isLoading ? <Loader2 className="w-6 h-6 animate-spin" /> : <img src="https://www.google.com/favicon.ico" className="w-6 h-6" alt="G" />}
              התחברות עם Google
            </button>
          </div>
        </div>
      );
    };

    function App() {
      const [session, setSession] = useState(null);
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      
      const [headerView, setHeaderView] = useState('daily'); 
      const [habitsStatus, setHabitsStatus] = useState({});
      const [habits, setHabits] = useState(INITIAL_HABITS_DATA);
      const [isTaskDrawerOpen, setIsTaskDrawerOpen] = useState(false);
      const calendarRef = useRef(null);
      const scrollRef = useRef(null);
      const isAutoScrolling = useRef(false);
      const calendarTimeoutRef = useRef(null);
      const isAnimatingRef = useRef(false);
      const animationFrameRef = useRef(null);
      const [isScrolled, setIsScrolled] = useState(false);
      const mainScrollAreaRef = useRef(null);
      const [user, setUser] = useState({ level: 1, name: 'משתמש' });
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [settingsView, setSettingsView] = useState('main'); 
      const [badges, setBadges] = useState(INITIAL_BADGES);
      const [theme, setTheme] = useState({ primary: '#007AFF', gold: '#FFCC00', accent: '#FF9500', dark: '#1C1C1E', bgStart: '#F4F7F9', bgEnd: '#FFFFFF', dailyCardBg: null, wizardBg: null, popupBg: null });
      const [avatars, setAvatars] = useState({ start: null, firstAction: null, day10: null, levelUp: null });
      const [showHabitRewardPopup, setShowHabitRewardPopup] = useState(false);
      const [habitRewardPhase, setHabitRewardPhase] = useState(1); 
      const [isHabitWizardOpen, setIsHabitWizardOpen] = useState(false);
      const [wizardStep, setWizardStep] = useState(1);
      const [newHabitData, setNewHabitData] = useState({ action: '', quantityValue: 1, quantityUnit: 'דקות', bestTime: '10:00', why: '' });
      const [wizardError, setWizardError] = useState('');
      const [tasks, setTasks] = useState([{ id: '1', text: 'לקרוא 5 עמודים בספר', date: getTodayDate(), time: '09:00', notes: '', isDone: false }]);
      const [newTaskText, setNewTaskText] = useState('');
      const [draggedIdx, setDraggedIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);
      const [visionAnswer, setVisionAnswer] = useState('');
      const [nlpQuestionIdx, setNlpQuestionIdx] = useState(0);
      const [showCommunityPopup, setShowCommunityPopup] = useState(false);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (session) loadUserData(session);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          if (session) loadUserData(session);
        });
        return () => subscription.unsubscribe();
      }, []);

      const loadUserData = async (currentSession) => {
        const { data, error } = await supabase.from('user_data').select('app_data').eq('user_id', currentSession.user.id).single();
        if (data && data.app_data) {
           const d = data.app_data;
           if (d.habits) setHabits(d.habits);
           if (d.habitsStatus) setHabitsStatus(d.habitsStatus);
           if (d.tasks) setTasks(d.tasks);
           if (d.user) setUser(d.user);
           if (d.theme) setTheme(d.theme);
           if (d.avatars) setAvatars(d.avatars);
           
           // התיקון שלנו: משחזרים את ציורי האייקונים מהקוד המקומי אחרי הטעינה ממסד הנתונים
           if (d.badges) {
             const restoredBadges = d.badges.map(savedBadge => {
                 const original = INITIAL_BADGES.find(ib => ib.id === savedBadge.id);
                 return { ...savedBadge, icon: original ? original.icon : null };
             });
             setBadges(restoredBadges);
           }
        } else {
           const fullName = currentSession.user.user_metadata?.full_name || 'נבו';
           setUser(prev => ({ ...prev, name: fullName.split(' ')[0] }));
        }
        setIsDataLoaded(true);
      };

      useEffect(() => {
        if (!isDataLoaded || !session) return;
        const timer = setTimeout(async () => {
           const appDataToSave = { habits, habitsStatus, tasks, user, theme, badges, avatars };
           await supabase.from('user_data').upsert({ user_id: session.user.id, app_data: appDataToSave });
        }, 2000);
        return () => clearTimeout(timer);
      }, [habits, habitsStatus, tasks, user, theme, badges, avatars, isDataLoaded, session]);

      const activeAvatar = useMemo(() => {
        if (session && session.user.user_metadata?.avatar_url && !avatars.start) return session.user.user_metadata.avatar_url;
        if (user.level > 1 && avatars.levelUp) return avatars.levelUp;
        if (CURRENT_DAY >= 10 && avatars.day10) return avatars.day10;
        const hasDoneSomething = Object.values(habitsStatus).some(s => s !== 'none') || tasks.some(t => t.isDone);
        if (hasDoneSomething && avatars.firstAction) return avatars.firstAction;
        return avatars.start;
      }, [user.level, CURRENT_DAY, habitsStatus, tasks, avatars, session]);

      const handleMainScroll = (e) => {
        const scrollTop = e.target.scrollTop;
        if (scrollTop > 80 && !isScrolled) setIsScrolled(true);
        else if (scrollTop <= 80 && isScrolled) setIsScrolled(false);
      };

      const handleAvatarUpload = (e, stage) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setAvatars(prev => ({ ...prev, [stage]: event.target.result }));
          reader.readAsDataURL(file);
        }
      };

      const handleThemeImageUpload = (e, key) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setTheme(prev => ({ ...prev, [key]: event.target.result }));
          reader.readAsDataURL(file);
        }
      };

      const activeTasks = tasks.filter(t => !t.isDone);
      const pendingTask = activeTasks[0];
      const [displayTask, setDisplayTask] = useState(pendingTask);
      const [isCardCompletedAnim, setIsCardCompletedAnim] = useState(false);
      const [showTrophyReminder, setShowTrophyReminder] = useState(CURRENT_DAY < TARGET_DAY - 2);

      const calculateDynamicTarget = (habit) => {
        const now = new Date();
        const [bestH, bestM] = habit.bestTime.split(':').map(Number);
        const bestTimeDate = new Date();
        bestTimeDate.setHours(bestH, bestM, 0);
        const diffInHours = (now - bestTimeDate) / (1000 * 60 * 60);
        if (diffInHours <= 0) return habit.targetValue; 
        if (diffInHours <= 1) return Math.max(1, Math.ceil(habit.targetValue * 0.5)); 
        if (diffInHours <= 2) return Math.max(1, Math.ceil(habit.targetValue * 0.25)); 
        return 1; 
      };

      const isLateForHabit = (bestTime) => {
        const now = new Date();
        const [bestH, bestM] = bestTime.split(':').map(Number);
        const bestTimeDate = new Date();
        bestTimeDate.setHours(bestH, bestM, 0);
        return now > bestTimeDate;
      };

      useEffect(() => {
        const dayElement = document.getElementById(`day-${CURRENT_DAY}`);
        if (dayElement && calendarRef.current) setTimeout(() => dayElement.scrollIntoView({ behavior: 'auto', inline: 'center', block: 'nearest' }), 100);
      }, []);

      useEffect(() => { if (!isCardCompletedAnim) setDisplayTask(pendingTask); }, [pendingTask, isCardCompletedAnim]);

      useEffect(() => {
        if (!isSettingsOpen) {
          const timer = setTimeout(() => setSettingsView('main'), 300);
          return () => clearTimeout(timer);
        }
      }, [isSettingsOpen]);

      const scrollToDayBouncy = (day) => {
        const container = calendarRef.current;
        const targetEl = document.getElementById(`day-${day}`);
        if (!container || !targetEl) return;
        isAnimatingRef.current = true;
        const start = container.scrollLeft;
        container.style.scrollSnapType = 'none';
        targetEl.scrollIntoView({ behavior: 'auto', inline: 'center', block: 'nearest' });
        const target = container.scrollLeft;
        container.scrollLeft = start;
        if (Math.abs(target - start) < 5) { isAnimatingRef.current = false; return; }
        const distance = target - start;
        const duration = 1200;
        let startTime = null;
        const easeOutElastic = (x) => x === 0 ? 0 : x === 1 ? 1 : Math.pow(2, -10 * x) * Math.sin((x * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
        const animation = (currentTime) => {
          if (startTime === null) startTime = currentTime;
          const timeElapsed = currentTime - startTime;
          const progress = Math.min(timeElapsed / duration, 1);
          container.scrollLeft = start + distance * easeOutElastic(progress);
          if (timeElapsed < duration) animationFrameRef.current = requestAnimationFrame(animation);
          else {
            container.scrollLeft = target;
            container.style.scrollSnapType = 'x mandatory';
            setTimeout(() => { isAnimatingRef.current = false; }, 100);
          }
        };
        animationFrameRef.current = requestAnimationFrame(animation);
      };

      const handleUserInteraction = () => {
        if (isAnimatingRef.current && animationFrameRef.current) {
          cancelAnimationFrame(animationFrameRef.current);
          isAnimatingRef.current = false;
          if (calendarRef.current) calendarRef.current.style.scrollSnapType = '';
        }
      };

      const addTask = () => {
        if(!newTaskText.trim()) return;
        setTasks([...tasks, { id: Date.now().toString(), text: newTaskText, date: getTodayDate(), time: '', notes: '', isDone: false }]);
        setNewTaskText('');
      };
      const toggleTaskDone = (id) => setTasks(tasks.map(t => t.id === id ? { ...t, isDone: !t.isDone } : t));
      
      const onDragStart = (e, index) => { e.dataTransfer.effectAllowed = "move"; setTimeout(() => setDraggedIdx(index), 0); };
      const onDragEnd = () => { setDraggedIdx(null); setDragOverIdx(null); };
      const onDragOver = (e, index) => { e.preventDefault(); if (dragOverIdx !== index) setDragOverIdx(index); };
      const onDrop = (e, index) => {
        e.preventDefault();
        if(draggedIdx === null || draggedIdx === index) { setDraggedIdx(null); setDragOverIdx(null); return; }
        const active = tasks.filter(t => !t.isDone);
        const dragged = active[draggedIdx];
        let list = tasks.filter(t => t.id !== dragged.id);
        const targetGlobalIdx = list.findIndex(t => t.id === active[index].id);
        list.splice(targetGlobalIdx, 0, dragged);
        setTasks(list);
        setDraggedIdx(null); setDragOverIdx(null);
      };

      const handleWizardNext = () => {
        setWizardError('');
        if (wizardStep === 1) {
          if (newHabitData.action.trim().length < 2) { setWizardError("אנא הגדר מה הפעולה."); return; }
          setWizardStep(2);
        } else if (wizardStep === 2) {
          setWizardStep(3);
        } else {
          const finalHabit = { 
            id: Date.now(), title: newHabitData.action, targetValue: parseInt(newHabitData.quantityValue) || 1, unit: newHabitData.quantityUnit, bestTime: '10:00'
          };
          setHabits([...habits, finalHabit]);
          setIsHabitWizardOpen(false);
          setWizardStep(1);
          setNewHabitData({ action: '', quantityValue: 1, quantityUnit: 'דקות', bestTime: '10:00', why: '' });
        }
      };

      const handleHabitClick = (habit) => {
        const status = habitsStatus[habit.id] || 'none';
        const late = isLateForHabit(habit.bestTime);
        if (status === 'none') setHabitsStatus(prev => ({ ...prev, [habit.id]: 'done' }));
        else if (status === 'done' && !late) setHabitsStatus(prev => ({ ...prev, [habit.id]: 'extra' }));
      };

      const handleCalendarScroll = () => {
        if (!calendarRef.current) return;
        const container = calendarRef.current;
        const containerCenter = container.getBoundingClientRect().left + container.offsetWidth / 2;
        let closestDay = CURRENT_DAY;
        let minDistance = Infinity;
        container.querySelectorAll('.day-item').forEach(el => {
            const dist = Math.abs(containerCenter - (el.getBoundingClientRect().left + el.offsetWidth / 2));
            if (dist < minDistance) { minDistance = dist; closestDay = parseInt(el.dataset.day, 10); }
        });
        setShowTrophyReminder(closestDay < TARGET_DAY - 2);
        if (calendarTimeoutRef.current) clearTimeout(calendarTimeoutRef.current);
        if (!isAnimatingRef.current) calendarTimeoutRef.current = setTimeout(() => { scrollToDayBouncy(CURRENT_DAY); }, 5000);
      };

      const handleVisionSend = () => {
        if (!visionAnswer.trim()) return;
        setVisionAnswer('');
        setNlpQuestionIdx((prev) => (prev + 1) % NLP_QUESTIONS.length);
      };

      const goToTab = (id) => {
        const el = document.getElementById(`card-${id}`);
        if (el && scrollRef.current) {
          isAutoScrolling.current = true;
          el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          setHeaderView(id);
          setTimeout(() => { isAutoScrolling.current = false; }, 600);
        }
      };

      const handleScroll = () => {
        if (isAutoScrolling.current || !scrollRef.current) return;
        const container = scrollRef.current;
        const idx = Math.round(Math.abs(container.scrollLeft) / container.offsetWidth);
        if (HEADER_TABS[idx] && headerView !== HEADER_TABS[idx].id) setHeaderView(HEADER_TABS[idx].id);
      };

      const scrollToTargetDay = () => document.getElementById(`day-${TARGET_DAY}`)?.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      const cardClassName = "w-full flex-shrink-0 snap-center snap-always flex items-center justify-center px-1";

      const handleLogout = async () => {
        await supabase.auth.signOut();
      };

      if (!session) return <LoginScreen />;
      if (!isDataLoaded) return <div className="min-h-screen flex items-center justify-center bg-[#F0F2F5] text-gray-500 font-bold"><Loader2 className="w-8 h-8 animate-spin ml-2"/> טוען נתונים...</div>;

      return (
        <div className="min-h-screen bg-[#F0F2F5] flex items-center justify-center font-arial" dir="rtl">
          
          <style>{`
            .theme-bg-gradient { background: linear-gradient(180deg, ${theme.bgStart} 0%, ${theme.bgEnd} 100%) !important; }
            .c-primary { color: ${theme.primary} !important; }
            .bg-primary { background-color: ${theme.primary} !important; }
            .border-primary { border-color: ${theme.primary} !important; }
            .c-gold { color: ${theme.gold} !important; }
            .bg-gold { background-color: ${theme.gold} !important; }
            .border-gold { border-color: ${theme.gold} !important; }
            .c-accent { color: ${theme.accent} !important; }
            .bg-accent { background-color: ${theme.accent} !important; }
            .c-dark { color: ${theme.dark} !important; }
            .bg-dark { background-color: ${theme.dark} !important; }
            .bg-primary-10 { background-color: ${theme.primary}1A !important; }
            .bg-accent-10 { background-color: ${theme.accent}1A !important; }
            .shadow-gold-glow { box-shadow: 0 4px 15px ${theme.gold}66 !important; }
            .shadow-primary-glow { box-shadow: 0 8px 15px ${theme.primary}1A !important; }
            .no-scrollbar::-webkit-scrollbar { display: none; }
            .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
          `}</style>

          <div className="w-full h-screen md:h-[844px] md:max-w-[390px] bg-white md:rounded-[3rem] md:shadow-2xl md:border-[12px] md:border-[#1C1C1E] relative overflow-hidden flex flex-col transition-all">
            
            <button onClick={() => setIsSettingsOpen(true)} className="absolute top-4 left-4 z-[150] flex items-center gap-2.5 bg-white/90 backdrop-blur-md px-3 py-2 rounded-full shadow-sm border border-gray-100 hover:bg-white transition-all active:scale-95">
              <div className="w-7 h-7 rounded-full bg-gray-100 overflow-hidden border border-gray-200 flex items-center justify-center">
                {activeAvatar ? <img src={activeAvatar} className="w-full h-full object-cover" /> : <User className="w-4 h-4 text-gray-400" />}
              </div>
              <span className="text-[11px] font-black c-dark">{user.name}</span>
            </button>

            <div className={`absolute top-0 left-0 w-full z-[140] bg-white/95 backdrop-blur-xl border-b border-gray-100 pt-12 pb-2 px-4 shadow-sm transition-all duration-500 ease-in-out ${isScrolled ? 'translate-y-0 opacity-100' : '-translate-y-full opacity-0 pointer-events-none'}`}>
              <nav className="flex gap-4 overflow-x-auto no-scrollbar whitespace-nowrap">
                {HEADER_TABS.map(item => (
                  <button key={item.id} onClick={() => goToTab(item.id)} className={`text-[11px] font-black transition-all px-3 py-1.5 rounded-full border-2 ${headerView === item.id ? 'bg-primary text-white border-primary' : 'text-gray-400 border-transparent'}`}>{item.label}</button>
                ))}
              </nav>
            </div>

            <div ref={mainScrollAreaRef} onScroll={handleMainScroll} className="flex-1 overflow-y-auto overflow-x-hidden theme-bg-gradient c-dark select-none relative no-scrollbar">
              <div className="w-full px-4 pb-12 pt-2 mt-12">
                
                {activeAvatar && (
                  <div className="w-full h-32 mb-4 flex items-center justify-center animate-in zoom-in-95 duration-700">
                     <img src={activeAvatar} alt="Avatar" className="max-w-full max-h-full object-contain p-2 drop-shadow-xl rounded-full" />
                  </div>
                )}

                <section className="mb-5 relative w-full h-20">
                  {showTrophyReminder && (
                    <div onClick={scrollToTargetDay} className="absolute right-[-10px] top-[10px] z-20 cursor-pointer">
                      <div className="w-8 h-8 rounded-full bg-gold flex items-center justify-center shadow-gold-glow border-2 border-white">
                        <Trophy className="w-3.5 h-3.5 text-white fill-current" />
                      </div>
                    </div>
                  )}
                  <div ref={calendarRef} onScroll={handleCalendarScroll} onTouchStart={handleUserInteraction} onMouseDown={handleUserInteraction} className="flex flex-row-reverse w-full overflow-x-auto no-scrollbar snap-x snap-mandatory pb-4 pt-2">
                    <div className="flex-shrink-0 w-[40%]" />
                    {ALL_DAYS.map((day) => (
                      <div key={day.date} id={`day-${day.date}`} data-day={day.date} className="day-item flex flex-col items-center flex-shrink-0 w-[20%] snap-center">
                        <div className={`w-11 h-11 rounded-full flex items-center justify-center transition-all border-2 relative ${day.isToday ? 'bg-dark text-white scale-110 shadow-xl border-transparent' : day.isTarget ? 'bg-gold text-white scale-110 shadow-gold-glow border-transparent' : day.status === 'past' ? (day.completionLevel === 'all_extra' ? 'bg-gold border-transparent shadow-gold-glow' : day.completionLevel === 'some_extra' ? 'bg-accent border-transparent' : day.completionLevel === 'all_done' ? 'bg-dark border-transparent' : 'bg-gray-200 border-transparent') : 'bg-white text-gray-500 border-gray-50'}`}>
                          <span className="text-sm font-black leading-none">{day.isTarget ? <Trophy className="w-5 h-5 fill-current" /> : day.status === 'past' ? <Check className={`w-5 h-5 stroke-[4px] ${day.completionLevel === 'partial' ? 'text-gray-500' : 'text-white'}`} /> : day.date}</span>
                        </div>
                      </div>
                    ))}
                    <div className="flex-shrink-0 w-[40%]" />
                  </div>
                </section>

                <nav className={`flex gap-4 mb-4 overflow-x-auto no-scrollbar whitespace-nowrap border-b border-gray-100 pb-2 transition-opacity duration-300 ${isScrolled ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                  {HEADER_TABS.map(item => (
                    <button key={item.id} onClick={() => goToTab(item.id)} className={`text-[12px] font-bold transition-all px-1 border-b-2 ${headerView === item.id ? 'c-primary border-primary -mb-[10px]' : 'text-gray-400 border-transparent'}`}>{item.label}</button>
                  ))}
                </nav>

                <div ref={scrollRef} onScroll={handleScroll} className="w-full h-[170px] overflow-x-auto snap-x snap-mandatory flex no-scrollbar scroll-smooth mb-8">
                  <div id="card-daily" className={cardClassName}>
                    {displayTask ? (
                      <div onClick={() => !isCardCompletedAnim && setIsCardCompletedAnim(true)} className={`w-full h-full rounded-3xl p-4 border transition-all duration-500 flex flex-col justify-between relative overflow-hidden ${isCardCompletedAnim ? 'bg-dark border-transparent shadow-2xl' : 'bg-white border-gray-100 shadow-sm cursor-pointer'}`}>
                        {theme.dailyCardBg && <div className="absolute inset-0 bg-cover bg-center transition-opacity duration-500 pointer-events-none" style={{ backgroundImage: `url(${theme.dailyCardBg})`, opacity: isCardCompletedAnim ? 0.2 : 0.8 }} />}
                        <div className="relative z-10 flex items-center justify-between mb-3">
                          <div className={`text-[9px] font-black uppercase px-2 py-1 rounded-md tracking-widest ${isCardCompletedAnim ? 'bg-gold-20 c-gold' : 'bg-accent-10 c-accent'}`}>{isCardCompletedAnim ? 'הושלם' : 'משימת היום'}</div>
                          <button onClick={(e) => { e.stopPropagation(); setIsTaskDrawerOpen(true); }} className="p-2 rounded-full bg-white/50 border border-gray-100 shadow-sm"><Menu className="w-4 h-4 text-gray-500" /></button>
                        </div>
                        <div className="relative z-10 flex flex-row-reverse items-center justify-between w-full gap-2">
                          <div className="text-right flex-1 min-w-0"><h3 className={`text-sm font-black truncate ${isCardCompletedAnim ? 'text-white' : 'c-dark'}`}>{displayTask.text}</h3></div>
                          <div className={`w-10 h-10 flex-shrink-0 rounded-full flex items-center justify-center transition-all duration-500 border-2 ${isCardCompletedAnim ? 'bg-gold border-gold scale-110 shadow-lg' : 'bg-white/80 border-gray-100'}`}><Check className={`w-4 h-4 stroke-[3.5px] transition-colors ${isCardCompletedAnim ? 'c-dark' : 'text-gray-300'}`} /></div>
                        </div>
                        {isCardCompletedAnim && <button onClick={(e) => { e.stopPropagation(); toggleTaskDone(displayTask.id); setIsCardCompletedAnim(false); }} className="relative z-10 bg-white c-dark px-6 py-1.5 rounded-xl font-black text-[10px] self-center shadow-lg">הבאה <ArrowLeft className="w-3 h-3" /></button>}
                      </div>
                    ) : <div onClick={() => setIsTaskDrawerOpen(true)} className="w-full h-full rounded-3xl p-5 border border-dashed border-gray-200 bg-white/50 backdrop-blur-sm flex flex-col items-center justify-center cursor-pointer"><Trophy className="w-8 h-8 c-gold mb-2" /><h3 className="font-black c-dark">הכל הושלם!</h3></div>}
                  </div>
                  <div id="card-news" className={cardClassName}>
                    <div className="w-full h-full bg-white rounded-3xl p-5 border border-gray-100 shadow-sm flex flex-col items-center justify-center text-center">
                      <div className="bg-primary-10 p-3 rounded-full mb-3"><Users className="w-6 h-6 c-primary" /></div>
                      <h3 className="text-sm font-black mb-1 c-dark">קהילה</h3>
                      <button onClick={() => setShowCommunityPopup(true)} className="bg-primary text-white px-5 py-1.5 rounded-full text-[10px] font-black border-none shadow-primary-glow">הצטרפות</button>
                    </div>
                  </div>
                  <div id="card-grades" className={cardClassName}>
                    <div className="w-full h-full bg-white rounded-3xl p-4 border border-gray-100 shadow-sm flex flex-col justify-center">
                      <h3 className="text-[10px] font-black text-gray-400 uppercase mb-4 text-right">הישגים</h3>
                      <div className="flex flex-row-reverse items-start overflow-x-auto no-scrollbar gap-1">
                        {badges.map(badge => <Badge key={badge.id} {...badge} />)}
                      </div>
                    </div>
                  </div>
                  <div id="card-vision" className={cardClassName}>
                    <div className="w-full h-full bg-white rounded-3xl p-5 border border-gray-100 shadow-sm flex flex-col items-center justify-center text-center relative">
                      <h3 className="text-sm font-black c-dark leading-tight mb-4">{NLP_QUESTIONS[nlpQuestionIdx]}</h3>
                      <div className="relative w-full">
                        <input type="text" value={visionAnswer} onChange={e => setVisionAnswer(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleVisionSend()} placeholder="..." className="w-full bg-gray-50 border border-gray-100 rounded-2xl p-3 text-xs outline-none text-right pr-4 pl-10" />
                        <button onClick={handleVisionSend} className="absolute left-2 top-1/2 -translate-y-1/2 text-primary border-none bg-transparent p-1"><Send className="w-4 h-4" /></button>
                      </div>
                    </div>
                  </div>
                </div>

                <section className="space-y-4">
                  <div className="flex justify-between items-center px-1">
                    <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest">הרגלים</h3>
                    <button onClick={() => setIsHabitWizardOpen(true)} className="text-xs font-bold c-primary flex items-center gap-1"><Plus className="w-3 h-3"/> חדש</button>
                  </div>
                  {habits.map((habit, index) => {
                    const status = habitsStatus[habit.id] || 'none';
                    const late = isLateForHabit(habit.bestTime);
                    const dynamicTarget = calculateDynamicTarget(habit);
                    const canBreak = status === 'done' && !late;
                    return (
                      <div key={habit.id} className="relative flex flex-row-reverse items-stretch gap-3">
                        <div className={`flex-1 p-4 rounded-2xl border flex flex-row-reverse items-center justify-between transition-all ${status !== 'none' ? 'bg-gray-50/80 border-transparent opacity-70' : 'bg-white border-gray-100 shadow-sm'}`}>
                          <div className="text-right">
                            <h4 className={`font-black text-sm ${status !== 'none' ? 'line-through text-gray-400' : 'c-dark'}`}>{habit.title}</h4>
                            <div className="flex flex-row-reverse items-center gap-1 mt-0.5"><Clock className="w-3 h-3 text-gray-400" /><span className="text-[9px] text-gray-400">{habit.bestTime}</span></div>
                          </div>
                          <div className={`flex flex-col items-center transition-opacity duration-500 ${status === 'done' && !canBreak ? 'opacity-0' : 'opacity-100'}`}>
                            <div className="flex items-center gap-1">
                              <span className={`text-4xl font-black transition-all ${status !== 'none' ? 'c-dark' : (late ? 'c-accent' : 'text-gray-200')}`}>{dynamicTarget}</span>
                              {status === 'extra' && <Plus className="w-6 h-6 c-gold animate-pulse" />}
                            </div>
                            <span className={`text-[8px] font-bold ${late && status === 'none' ? 'c-accent' : 'text-gray-400'}`}>{habit.unit}</span>
                          </div>
                        </div>
                        <div className="relative flex flex-col items-center w-10">
                          {index !== habits.length - 1 && <div className="absolute top-[50%] left-1/2 -translate-x-1/2 w-0 h-[calc(100%+16px)] border-l-2 border-dashed border-gray-200 z-0" />}
                          <div onClick={() => handleHabitClick(habit)} className={`w-10 h-10 rounded-full flex items-center justify-center transition-all relative cursor-pointer border-2 z-10 my-auto ${status === 'none' ? 'bg-gray-100 border-gray-200' : status === 'done' ? `bg-dark border-transparent ${canBreak ? 'shadow-gold-glow' : ''}` : 'bg-gold border-transparent shadow-sm'}`}>
                            <Check className={`w-5 h-5 stroke-[4px] ${status === 'none' ? 'text-gray-400' : 'text-white'}`} />
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </section>
              </div>

              {/* Settings Drawer */}
              <div className={`absolute inset-0 bg-black/40 z-[2000] transition-opacity duration-300 ${isSettingsOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsSettingsOpen(false)} />
              <div className={`absolute top-0 right-0 h-full w-[90%] bg-[#F8F9FB] z-[2100] shadow-2xl transition-transform duration-300 flex flex-col ${isSettingsOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                 {settingsView === 'main' && (
                   <div className="flex flex-col h-full animate-in fade-in slide-in-from-left-4 duration-300">
                     <div className="p-5 bg-white border-b border-gray-100 flex items-center justify-between">
                         <h2 className="font-black text-lg c-dark">הגדרות כלליות</h2>
                         <button onClick={() => setIsSettingsOpen(false)} className="p-2 text-gray-500 bg-gray-50 rounded-full hover:bg-gray-100 transition-colors"><ArrowRight className="w-4 h-4"/></button>
                     </div>
                     <div className="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar pb-20">
                         <SettingsMenuItem icon={<Palette />} label="הגדרות ועיצוב" onClick={() => setSettingsView('design')} />
                         <div className="mt-8 pt-4 border-t border-gray-100">
                           <button onClick={handleLogout} className="w-full py-3 bg-red-50 text-red-500 rounded-2xl font-bold text-sm">התנתק מהחשבון</button>
                         </div>
                     </div>
                   </div>
                 )}
                 {settingsView === 'design' && (
                   <div className="flex flex-col h-full animate-in fade-in slide-in-from-right-4 duration-300">
                     <div className="p-5 bg-white border-b border-gray-100 flex items-center gap-3">
                         <button onClick={() => setSettingsView('main')} className="p-2 text-gray-500 bg-gray-50 rounded-full hover:bg-gray-100 transition-colors"><ArrowRight className="w-4 h-4"/></button>
                         <h2 className="font-black text-lg c-dark">עיצוב</h2>
                     </div>
                     <div className="flex-1 overflow-y-auto p-5 space-y-8 no-scrollbar pb-20">
                         <section className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                            <h3 className="font-black text-sm mb-4 c-dark border-b pb-2">ניהול אווטארים</h3>
                            <div className="space-y-4">
                                {[{ key: 'start', label: 'שלב 1: התחלה' }, { key: 'firstAction', label: 'שלב 2: ביצוע ראשון' }, { key: 'day10', label: 'שלב 3: התמדה (10 ימים)' }, { key: 'levelUp', label: 'שלב 4: מאסטרי' }].map((s) => (
                                  <div key={s.key} className="flex items-center justify-between gap-2">
                                     <span className="text-xs font-bold c-dark">{s.label}</span>
                                     <div className="flex items-center gap-2">
                                       {avatars[s.key] && <img src={avatars[s.key]} className="w-8 h-8 rounded-lg object-contain bg-gray-50" />}
                                       <input type="file" accept="image/*" className="hidden" id={`up-${s.key}`} onChange={(e) => handleAvatarUpload(e, s.key)} />
                                       <label htmlFor={`up-${s.key}`} className="bg-gray-100 px-3 py-1.5 rounded-lg text-[10px] font-bold cursor-pointer">בחר</label>
                                     </div>
                                  </div>
                                ))}
                            </div>
                         </section>
                     </div>
                   </div>
                 )}
              </div>

              {/* Task Drawer Inside Phone */}
              <div className={`absolute inset-0 bg-black/40 z-[400] transition-opacity duration-300 ${isTaskDrawerOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsTaskDrawerOpen(false)} />
              <div className={`absolute bottom-0 left-0 w-full h-[85%] bg-[#F8F9FB] z-[500] shadow-2xl transition-transform duration-300 rounded-t-[2.5rem] flex flex-col ${isTaskDrawerOpen ? 'translate-y-0' : 'translate-y-full'}`}>
                <div className="p-6 border-b border-gray-100 flex items-center justify-between shrink-0">
                  <h2 className="font-black text-sm c-dark">משימות</h2>
                  <button onClick={() => setIsTaskDrawerOpen(false)} className="p-2 bg-gray-50 rounded-full hover:bg-gray-100 transition-colors"><ChevronDown className="w-4 h-4"/></button>
                </div>
                <div className="p-4 flex-1 overflow-y-auto no-scrollbar space-y-3">
                    {activeTasks.map((t, i) => (
                      <div key={t.id} draggable onDragStart={(e) => onDragStart(e, i)} onDragEnd={onDragEnd} onDragOver={(e) => onDragOver(e, i)} onDrop={(e) => onDrop(e, i)} className="p-3 bg-white rounded-2xl border border-gray-100 flex items-center gap-3">
                        <GripVertical className="w-4 h-4 text-gray-300 shrink-0" />
                        <span className="text-sm font-bold flex-1 text-right truncate">{t.text}</span>
                        <button onClick={() => toggleTaskDone(t.id)} className="w-7 h-7 rounded-full border-2 border-gray-100 text-transparent active:scale-90 transition-transform"><Check className="w-4 h-4 fill-current"/></button>
                      </div>
                    ))}
                </div>
                <div className="p-5 bg-white border-t border-gray-100 shrink-0">
                   <div className="flex gap-2">
                     <button onClick={addTask} className="w-12 h-12 bg-dark text-white rounded-2xl flex items-center justify-center shrink-0 shadow-md active:scale-90 transition-transform"><Plus className="w-5 h-5"/></button>
                     <input value={newTaskText} onChange={e => setNewTaskText(e.target.value)} onKeyDown={e => e.key === 'Enter' && addTask()} placeholder="הוסף משימה..." className="flex-1 bg-gray-50 rounded-2xl px-4 text-right text-sm font-bold outline-none border border-transparent focus:border-primary transition-all" />
                   </div>
                </div>
              </div>

              {/* Wizard Popup */}
              {isHabitWizardOpen && (
                <div className="absolute inset-0 z-[3100] flex items-center justify-center p-4 animate-in fade-in duration-300">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-md" />
                  <div className="w-full bg-white rounded-[40px] p-8 shadow-2xl relative overflow-hidden flex flex-col min-h-[460px] animate-in slide-in-from-bottom-4">
                     <div className="relative z-10 flex-1 flex flex-col justify-center items-center text-center">
                       {wizardStep === 1 && (
                         <div className="animate-in fade-in w-full">
                           <Zap className="w-12 h-12 c-primary mx-auto mb-4" />
                           <h3 className="text-xl font-black mb-4">איזו פעולה קטנה נוסיף?</h3>
                           <input value={newHabitData.action} onChange={e => setNewHabitData({...newHabitData, action: e.target.value})} placeholder="דוגמה: הליכה, קריאה..." className="w-full border-2 border-gray-100 rounded-2xl p-4 text-center font-bold outline-none focus:border-primary transition-all shadow-sm" />
                         </div>
                       )}
                       {wizardStep === 2 && (
                         <div className="animate-in fade-in w-full">
                           <TrendingUp className="w-12 h-12 c-accent mx-auto mb-4" />
                           <h3 className="text-xl font-black mb-6">כמה תרצה לבצע?</h3>
                           <div className="flex items-center justify-center gap-6 mb-8">
                             <button onClick={() => setNewHabitData(p => ({...p, quantityValue: Math.max(1, p.quantityValue - 1)}))} className="w-12 h-12 rounded-full border border-gray-100 flex items-center justify-center"><Minus /></button>
                             <span className="text-5xl font-black tabular-nums">{newHabitData.quantityValue}</span>
                             <button onClick={() => setNewHabitData(p => ({...p, quantityValue: p.quantityValue + 1}))} className="w-12 h-12 rounded-full bg-dark text-white flex items-center justify-center"><Plus /></button>
                           </div>
                           <div className="flex flex-wrap gap-2 justify-center">
                              {['דקות', 'חזרות', 'ק״מ'].map(u => (
                                <button key={u} onClick={() => setNewHabitData({...newHabitData, quantityUnit: u})} className={`px-4 py-2 rounded-full text-xs font-black transition-all ${newHabitData.quantityUnit === u ? 'bg-accent text-white' : 'bg-gray-100'}`}>{u}</button>
                              ))}
                           </div>
                         </div>
                       )}
                     </div>
                     <button onClick={handleWizardNext} className="relative z-10 w-full bg-dark text-white py-5 rounded-3xl font-black text-lg mt-4 shadow-xl active:scale-95 transition-all">סיום והוספה</button>
                     <button onClick={() => setIsHabitWizardOpen(false)} className="mt-4 text-gray-400 text-xs font-black self-center">ביטול</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
