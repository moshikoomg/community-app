<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <title>Community App – Supabase Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- אפשר לעצב אחר כך, כרגע הכי פשוט ועובד -->
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
      direction: rtl;
    }
    h1 {
      margin-top: 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      margin: 8px 0 4px;
      font-weight: 500;
    }
    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 14px;
      margin-bottom: 8px;
    }
    button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #3ecf8e;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .list {
      margin-top: 24px;
    }
    .item {
      border-bottom: 1px solid #eee;
      padding: 8px 0;
    }
    .item:last-child {
      border-bottom: none;
    }
    .error {
      color: #d00;
      margin-top: 8px;
    }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: #555;
    }
    .debug {
      margin-top: 16px;
      font-size: 12px;
      direction: ltr;
      background: #fafafa;
      border-radius: 4px;
      padding: 8px;
      border: 1px dashed #ddd;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Community App – חיבור Supabase</h1>
    <p>טופס דוגמה שמדבר עם Supabase דרך ה־Data API (REST) שלך.</p>

    <form id="create-form">
      <label for="title">כותרת</label>
      <input id="title" name="title" placeholder="למשל: פוסט בדיקה ראשון" required />

      <label for="content">תוכן</label>
      <textarea id="content" name="content" rows="3" placeholder="תיאור קצר של הפוסט" required></textarea>

      <label for="author">מחבר</label>
      <input id="author" name="author" placeholder="השם שלך" required />

      <button type="submit" id="submit-btn">שמור</button>
      <div class="status" id="status"></div>
      <div class="error" id="error"></div>
    </form>

    <div class="list">
      <h2>רשומות אחרונות</h2>
      <button id="refresh-btn">רענן רשימה</button>
      <div id="list"></div>
    </div>

    <div class="debug" id="debug"></div>
  </div>

  <script type="module">
    // הפרטים שלך – אל תיגע בזה אלא אם תחליף פרויקט
    const SUPABASE_URL = 'https://igpzawemolsajreiuxck.supabase.co';
    const SUPABASE_REST_URL = 'https://igpzawemolsajreiuxck.supabase.co/rest/v1';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_VWqg5KanuCRMFAAMCBWnuA_ZtSWIBWr';

    // שם הטבלה – תחליף לשם הטבלה האמיתית שלך (למשל: posts / community_posts / messages)
    const TABLE_NAME = 'posts';

    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const listEl = document.getElementById('list');
    const debugEl = document.getElementById('debug');
    const form = document.getElementById('create-form');
    const submitBtn = document.getElementById('submit-btn');
    const refreshBtn = document.getElementById('refresh-btn');

    function setStatus(msg) {
      statusEl.textContent = msg || '';
    }

    function setError(msg) {
      errorEl.textContent = msg || '';
    }

    function setDebug(obj) {
      try {
        debugEl.textContent = JSON.stringify(obj, null, 2);
      } catch (e) {
        debugEl.textContent = String(obj);
      }
    }

    async function fetchPosts() {
      setStatus('טוען רשומות...');
      setError('');

      try {
        const url = `${SUPABASE_REST_URL}/${TABLE_NAME}?select=*&order=created_at.desc&limit=20`;

        const res = await fetch(url, {
          headers: {
            apikey: SUPABASE_PUBLISHABLE_KEY,
            Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
            'Content-Type': 'application/json',
          },
        });

        const text = await res.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch (e) {
          setError('בעיה בפענוח תגובת השרת');
          setDebug({ text });
          setStatus('');
          return;
        }

        if (!res.ok) {
          setError('שגיאה בטעינה מה־Supabase');
          setDebug({ status: res.status, data });
          setStatus('');
          return;
        }

        if (!Array.isArray(data)) {
          setError('התגובה מה־Supabase לא במבנה המצופה (לא מערך).');
          setDebug(data);
          setStatus('');
          return;
        }

        if (data.length === 0) {
          listEl.innerHTML = '<p>אין עדיין רשומות.</p>';
        } else {
          listEl.innerHTML = data
            .map((row) => {
              const title = row.title || '(ללא כותרת)';
              const content = row.content || '';
              const author = row.author || '';
              const created = row.created_at || '';
              return `
                <div class="item">
                  <strong>${title}</strong><br />
                  <small>${author} • ${created}</small><br />
                  <div>${content}</div>
                </div>
              `;
            })
            .join('');
        }

        setDebug({ lastFetch: data });
        setStatus('הרשימה עודכנה.');
      } catch (err) {
        console.error(err);
        setError('שגיאה כללית בטעינת נתונים.');
        setDebug(err);
        setStatus('');
      }
    }

    async function createPost(payload) {
      setStatus('שומר לרשומה חדשה...');
      setError('');
      submitBtn.disabled = true;

      try {
        const url = `${SUPABASE_REST_URL}/${TABLE_NAME}`;
        const res = await fetch(url, {
          method: 'POST',
          headers: {
            apikey: SUPABASE_PUBLISHABLE_KEY,
            Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation',
          },
          body: JSON.stringify(payload),
        });

        const text = await res.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch (e) {
          setError('בעיה בפענוח תגובת השרת בעת שמירה.');
          setDebug({ text });
          setStatus('');
          submitBtn.disabled = false;
          return null;
        }

        if (!res.ok) {
          setError('שגיאה בשמירה ל־Supabase.');
          setDebug({ status: res.status, data });
          setStatus('');
          submitBtn.disabled = false;
          return null;
        }

        setDebug({ lastInsert: data });
        setStatus('נשמר בהצלחה!');
        submitBtn.disabled = false;
        return data;
      } catch (err) {
        console.error(err);
        setError('שגיאה כללית בשמירה.');
        setDebug(err);
        setStatus('');
        submitBtn.disabled = false;
        return null;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const author = document.getElementById('author').value.trim();

      if (!title || !content || !author) {
        setError('נא למלא את כל השדות.');
        return;
      }

      const payload = {
        title,
        content,
        author,
        // created_at אפשר לתת ל-DB ברירת מחדל NOW()
      };

      const result = await createPost(payload);
      if (result) {
        form.reset();
        fetchPosts();
      }
    });

    refreshBtn.addEventListener('click', () => {
      fetchPosts();
    });

    // טעינה ראשונית
    fetchPosts();
  </script>
</body>
</html>
